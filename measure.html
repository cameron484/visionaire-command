<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { overscroll-behavior-y: contain; background: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
    .field-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.4rem; }
    .spec-pill { font-size: 0.7rem; font-weight: 700; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1.5px solid #cbd5e1; background: white; color: #475569; }
    .active-pill { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .input-field { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.875rem; font-weight: 700; color: #1e293b; outline: none; }
    .input-field:focus { border-color: #1a3a5c; box-shadow: 0 0 0 3px rgba(26,58,92,0.1); }
    .contract-spec-box { white-space: pre-line; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [prefs] = useState(() => JSON.parse(localStorage.getItem('vhub_v2')) || {});
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(() => JSON.parse(localStorage.getItem('activeJobId')) || null);
      
      const [activeTab, setActiveTab] = useState('measure'); 
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');
      const [loading, setLoading] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex] || {};
      const headerData = activeJob?.header || {};
      const signoffData = activeJob?.signoff || {};

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const goBackToHub = () => { 
          window.speechSynthesis.cancel(); 
          window.location.href = 'index.html'; 
      };

      const cleanCustomerName = (name) => {
        if (!name) return '';
        return name.replace(/^[^a-zA-Z0-9]+/, '').trim();
      };

      const playBriefing = (text) => {
        if (!window.speechSynthesis) return alert("Audio not supported.");
        window.speechSynthesis.cancel(); 
        if (isPlaying) { setIsPlaying(false); return; }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.onend = () => setIsPlaying(false);
        utterance.onerror = () => setIsPlaying(false);
        setIsPlaying(true);
        window.speechSynthesis.speak(utterance);
      };

      const exportData = () => {
        if(!activeJob) return alert('No data to export.');
        let text = `FINAL MEASURE: ${cleanCustomerName(activeJob.customer).toUpperCase()}\n`;
        text += `=====================================\n`;
        if(activeJob.summary) text += `Briefing: ${activeJob.summary}\n`;
        if(headerData.brand) text += `Brand: ${headerData.brand}\n`;
        if(headerData.crew) text += `Crew: ${headerData.crew}\n`;
        if(headerData.extColor || headerData.intColor) text += `Colors: ${headerData.extColor||'N/A'} Ext / ${headerData.intColor||'N/A'} Int\n`;
        text += `=====================================\n\n`;
        if(activeJob.data && activeJob.data.length > 0) {
          activeJob.data.forEach((item, i) => {
            text += `UNIT ${i+1}: ${item.itemType.toUpperCase()} - ${item.location}\n`;
            text += `Specs:\n${item.extras}\n`;
            text += `Sizes: Contract [${item.contractSize || 'N/A'}] -> FM [W: ${item.fmWidth || '___'} x H: ${item.fmHeight || '___'}] ${item.verified ? '(VERIFIED)' : ''}\n`;
            text += `-------------------------------------\n`;
          });
        }
        text += `\nCYA Checklist:\n[${signoffData.alarms?'X':' '}] Alarms\n[${signoffData.photos?'X':' '}] Photos\n[${signoffData.colors?'X':' '}] Colors\n[${signoffData.swings?'X':' '}] Swings\nInitials: ${signoffData.initials || '_____'}\n`;
        navigator.clipboard.writeText(text).then(() => alert('Export Copied!'));
      };

      const updateHeader = (key, value) => {
        setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, header: { ...j.header, [key]: value } } : j));
      };

      const updateSignoff = (key, value) => {
        setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, signoff: { ...j.signoff, [key]: value } } : j));
      };

      const addUnit = () => {
        const newUnit = { line: (activeJob.data?.length || 0) + 1, itemType: 'Window', location: 'New Location', style: '', contractSize: '', color: '', hardware: '', extras: '', qty: '1', fmWidth: '', fmHeight: '', verified: false };
        setJobs(prev => prev.map(j => j.id === activeJob.id ? { ...j, data: [...(j.data||[]), newUnit] } : j));
        setActiveItemIndex((activeJob.data?.length || 0));
        setActiveTab('measure');
      };

      const updateItem = (key, value) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const newData = [...job.data];
            newData[activeItemIndex] = { ...newData[activeItemIndex], [key]: value };
            return { ...job, data: newData };
          }
          return job;
        }));
      };

      const handleKeyPress = (val) => {
        let cur = currentItem[activeField] || '';
        if (val === 'DEL') cur = cur.slice(0, -1);
        else if (val === 'CLR') cur = '';
        else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
        updateItem(activeField, cur);
      };

      const processPDFBase64 = async (base64, apiKey, job) => {
        const promptText = `Analyze this contract. 1. Write a 1 sentence verbal briefing of project scope. 2. Extract units. Rules: Combine "COMBINATION UNIT", "ENTRY DOOR", and "SIDELITES" into ONE item representing the total hole. For 'contractSize', find the exact text "Unit Size:". structure extras with headers: SYSTEM, FRAME, ENTRY, SIDELITES, HARDWARE. Return ONLY JSON: {"summary": "...", "items": [{"line":"1","itemType":"Door","location":"","contractSize":"...","extras":"..."}]}`;
        
        const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
        });
        
        if (geminiRes.status === 429) { setLoading(false); return alert("⏳ Rate limit. Please wait 60s."); }
        if (!geminiRes.ok) { setLoading(false); return alert("API Error."); }
        
        const result = await geminiRes.json();
        const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
        try {
          const parsed = JSON.parse(text);
          const items = (parsed.items || []).map(i => ({ ...i, fmWidth: '', fmHeight: '', verified: false }));
          setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items, summary: parsed.summary || '' } : j));
          setActiveTab('measure');
          setLoading(false);
        } catch(e) { setLoading(false); alert("Parse Error."); }
      };

      const autoLoadContract = async (job) => {
        const token = prefs.accessToken; const apiKey = prefs.geminiKey;
        if (!token || !apiKey) return alert("Missing Settings.");
        setLoading(true);
        try {
          let cleanName = job.customer.replace(/\([^)]*\)/g, ' ').replace(/[^a-zA-Z\s]/g, ' ').trim();
          let searchTarget = cleanName.split(/\s+/).reduce((a, b) => a.length > b.length ? a : b).replace(/'/g, "\\'");
          const query = `fullText contains '${searchTarget}' and (name contains 'Signed' or name contains 'Agreement') and mimeType='application/pdf'`;
          const dRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=modifiedTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const dData = await dRes.json();
          if (!dData.files?.length) { setLoading(false); return alert("No Drive file found."); }
          const fRes = await fetch(`https://www.googleapis.com/drive/v3/files/${dData.files[0].id}?alt=media&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fRes.blob();
          const reader = new FileReader(); reader.readAsDataURL(blob);
          reader.onloadend = async () => { await processPDFBase64(reader.result.split(',')[1], apiKey, job); };
        } catch (e) { setLoading(false); }
      };

      const handleManualUpload = (e, job) => {
        const file = e.target.files[0]; if (!file) return;
        setLoading(true);
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onloadend = async () => { await processPDFBase64(reader.result.split(',')[1], prefs.geminiKey, job); };
      };

      if(!activeJob) return <div className="p-10 text-center font-bold">Error: Return to Hub.</div>;

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white flex flex-col shadow-xl">
          <header className="bg-[#1a3a5c] text-white p-4 border-b-4 border-[#f59e0b] sticky top-0 z-50">
            <div className="flex justify-between items-center mb-3">
              <button onClick={goBackToHub} className="text-white text-[10px] font-black uppercase bg-white/20 px-3 py-2 rounded">Close</button>
              <h1 className="font-black italic text-lg uppercase flex-1 text-center truncate px-2">{cleanCustomerName(activeJob.customer)}</h1>
              <button onClick={exportData} className="text-[#1a3a5c] bg-[#f59e0b] text-[10px] font-black uppercase px-3 py-2 rounded shadow">Export</button>
            </div>
            {activeJob.data?.length > 0 && (
              <div className="flex bg-black/30 rounded-lg p-1 gap-1">
                {['overview', 'measure', 'signoff'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-[10px] font-black uppercase rounded ${activeTab===tab?'bg-[#f59e0b] text-[#1a3a5c] shadow':'text-white opacity-70'}`}>{tab}</button>
                ))}
              </div>
            )}
          </header>

          <main className="p-4 flex-1 pb-32 bg-slate-100">
            <div className="space-y-6">
              {loading ? (
                <div className="p-20 text-center animate-pulse font-bold text-slate-500 uppercase tracking-widest">Processing PDF...</div>
              ) : !activeJob.data?.length ? (
                <div className="p-10 text-center border-4 border-dashed border-slate-300 rounded-[2rem] bg-white flex flex-col gap-5 mt-10">
                   <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white py-5 rounded-xl font-black text-sm uppercase shadow-lg">Scan Drive PDF</button>
                   <div className="text-slate-400 font-bold text-xs">OR</div>
                   <label className="bg-emerald-600 text-white px-6 py-4 rounded-xl font-black text-sm uppercase shadow-lg cursor-pointer w-full block text-center">
                     ⬆️ Upload Manually
                     <input type="file" accept="application/pdf" className="hidden" onChange={(e) => handleManualUpload(e, activeJob)} />
                   </label>
                   <div className="text-slate-400 font-bold text-xs">OR</div>
                   <button onClick={addUnit} className="bg-slate-800 text-white py-4 rounded-xl font-black text-sm uppercase shadow-lg">➕ Add Manually</button>
                </div>
              ) : (
                <>
                  {activeTab === 'overview' && (
                    <div className="bg-white rounded-[2rem] p-6 shadow-sm space-y-5 border border-slate-200">
                       {activeJob.summary && (
                         <div onClick={() => playBriefing(activeJob.summary)} className={`flex items-center gap-4 p-4 rounded-xl cursor-pointer border-2 ${isPlaying ? 'bg-blue-50 border-blue-400' : 'bg-slate-50 border-slate-200'}`}>
                             <div className="text-3xl">{isPlaying ? '⏸️' : '🔊'}</div>
                             <div><div className="font-black text-xs uppercase tracking-wider">Audio Briefing</div><div className="text-slate-500 text-[10px] font-bold">{activeJob.summary}</div></div>
                         </div>
                       )}
                       <h2 className="font-black text-lg text-[#1a3a5c] uppercase border-b-2 border-slate-100 pb-2">Details</h2>
                       {['brand', 'crew', 'extColor', 'intColor'].map(f => (
                         <div key={f}><span className="field-label">{f}</span><input type="text" className="input-field" value={headerData[f] || ''} onChange={e => updateHeader(f, e.target.value)} /></div>
                       ))}
                    </div>
                  )}

                  {activeTab === 'measure' && (
                    <div className="space-y-6">
                       <div className="bg-white border-l-[12px] border-l-[#1a3a5c] rounded-[2rem] shadow-sm p-5 space-y-5">
                          <div className="flex justify-between items-center">
                            <span className="font-bold text-xs text-slate-500 uppercase">Unit {activeItemIndex + 1} / {activeJob.data.length}</span>
                            <span onClick={() => updateItem('itemType', currentItem.itemType === 'Window' ? 'Door' : 'Window')} className="bg-[#f59e0b] text-[9px] px-3 py-1 rounded-full text-white cursor-pointer font-black">{currentItem.itemType} ⟳</span>
                          </div>
                          <div onClick={() => { let loc = prompt("Loc:", currentItem.location); if(loc) updateItem('location', loc); }} className="cursor-pointer">
                            <span className="field-label">Location (Tap edit)</span>
                            <h2 className="text-2xl font-black text-slate-800 uppercase underline decoration-slate-200">{currentItem.location || 'Unknown'}</h2>
                          </div>
                          <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <span className="field-label">Specs</span>
                            <div className="contract-spec-box font-bold text-slate-600 text-[10px]">{currentItem.extras || 'No specs.'}</div>
                          </div>
                          <div className="grid grid-cols-2 gap-3 pt-2">
                              <div onClick={() => setActiveField('fmWidth')} className={`p-4 rounded-2xl border-4 text-center cursor-pointer ${activeField==='fmWidth'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Width</span><span className="text-3xl font-black">{currentItem.fmWidth||'-'}</span></div>
                              <div onClick={() => setActiveField('fmHeight')} className={`p-4 rounded-2xl border-4 text-center cursor-pointer ${activeField==='fmHeight'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Height</span><span className="text-3xl font-black">{currentItem.fmHeight||'-'}</span></div>
                          </div>
                          <div className={`p-3 rounded-xl border flex justify-between items-center ${currentItem.verified ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200'}`}>
                             <div><span className="text-[10px] font-black uppercase text-slate-500 block">Contract Size</span><span className="font-bold text-slate-800">{currentItem.contractSize || 'N/A'}</span></div>
                             <label className="flex items-center gap-2 text-xs font-black cursor-pointer px-3 py-2 rounded-lg bg-white/50 border border-current">
                                <input type="checkbox" checked={currentItem.verified || false} onChange={e => updateItem('verified', e.target.checked)} className="w-5 h-5 accent-green-600" />
                                {currentItem.verified ? 'VERIFIED' : 'VERIFY'}
                             </label>
                          </div>
                       </div>
                       <div className="bg-slate-200 p-3 rounded-[2.5rem] shadow-inner">
                        <div className="grid grid-cols-7 gap-1.5 mb-3">{['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-3.5 rounded-xl font-bold text-xs shadow">{f}</button>)}</div>
                        <div className="grid grid-cols-3 gap-2">{[1,2,3,4,5,6,7,8,9, 'CLR', '0', 'DEL'].map(n => <button key={n} onClick={() => handleKeyPress(n)} className="bg-white p-5 rounded-2xl font-black text-2xl shadow-sm text-slate-700">{n}</button>)}</div>
                        <div className="flex gap-2 mt-4">
                          <button onClick={() => setActiveItemIndex(p => Math.max(0, p - 1))} className="flex-1 bg-slate-400 text-white py-5 rounded-[2rem] font-bold text-sm uppercase">Prev</button>
                          <button onClick={() => { if (activeItemIndex === activeJob.data.length - 1) addUnit(); else setActiveItemIndex(p => p + 1); }} className="flex-[2] bg-[#1a3a5c] text-white py-5 rounded-[2rem] font-bold text-sm uppercase shadow-xl">{activeItemIndex === activeJob.data.length - 1 ? '➕ Add' : 'Next ➔'}</button>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'signoff' && (
                    <div className="bg-white rounded-[2rem] p-6 shadow-sm space-y-6 border border-slate-200">
                       <h2 className="font-black text-lg text-[#1a3a5c] uppercase border-b-2 border-slate-100 pb-2">Checklist</h2>
                       {activeJob.data.some(d => d.itemType === 'Door') && (
                        <div className="bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 space-y-4">
                           <h4 className="font-black text-[10px] text-blue-800 uppercase">🚪 Door Specs Verification</h4>
                           {activeJob.data.filter(d => d.itemType === 'Door').map((door, idx) => (
                             <div key={idx} className="bg-white p-3 rounded-lg text-[10px] font-bold text-slate-600 border border-blue-100">
                                <div className="text-blue-700 font-black mb-1">UNIT: {door.location.toUpperCase()}</div>
                                <div className="contract-spec-box">{door.extras}</div>
                             </div>
                           ))}
                           <label className="flex items-center gap-3 p-3 bg-white rounded-xl cursor-pointer shadow-sm">
                              <input type="checkbox" className="w-5 h-5 accent-blue-600" checked={signoffData.doorVerify || false} onChange={e=>updateSignoff('doorVerify', e.target.checked)} />
                              <span className="text-[10px] font-black text-blue-900">HO verified spec details match</span>
                           </label>
                        </div>
                       )}
                       <div className="space-y-3">
                         {['alarms', 'photos', 'colors', 'swings'].map(f => (
                           <label key={f} className="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-pointer shadow-sm">
                             <input type="checkbox" checked={signoffData[f] || false} onChange={e=>updateSignoff(f, e.target.checked)} className="w-6 h-6 accent-[#064e3b]" />
                             <span className="font-black text-slate-700 text-xs uppercase">{f} Checked</span>
                           </label>
                         ))}
                       </div>
                       <div className="pt-4 border-t-2 border-dashed border-slate-200 text-center">
                         <span className="field-label">Homeowner Initials</span>
                         <input type="text" className="input-field text-center text-3xl font-black uppercase" value={signoffData.initials || ''} onChange={e => updateSignoff('initials', e.target.value)} />
                       </div>
                       <button onClick={exportData} className="w-full bg-[#064e3b] text-white py-5 rounded-xl font-black text-sm uppercase shadow-xl mt-4">📋 Copy Full Summary</button>
                    </div>
                  )}
                </>
              )}
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<VisionaireApp />);
  </script>
</body>
</html>
