<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { overscroll-behavior-y: contain; background: #eef2f6; font-family: ui-sans-serif, system-ui, sans-serif; }
    .industrial-shadow { box-shadow: 0 4px 20px rgba(26, 58, 92, 0.15); }
    .field-label { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.2rem; }
    .input-box { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 0.5rem; padding: 0.7rem; font-size: 0.85rem; font-weight: 700; color: #1e293b; background: white; outline: none; }
    .unit-card { background: white; border-radius: 0.75rem; border: 1px solid #d1d5db; margin-bottom: 0.75rem; overflow: hidden; }
    .unit-header { background: #f8fafc; padding: 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .unit-num { width: 32px; height: 32px; background: #1a3a5c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; }
    .active-input { border: 3px solid #1a3a5c !important; background: #f0f9ff; }
    .sig-container { background: #fff; border: 2px dashed #cbd5e1; border-radius: 1rem; touch-action: none; position: relative; }
    .sig-canvas { width: 100%; height: 180px; border-radius: 1rem; }
    .keypad-container { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .keypad-open { transform: translateY(0); }
    .mobile-note { line-height: 1.5; resize: none; overflow: hidden; min-height: 80px; }
    .checkbox-pill { display: flex; align-items: center; gap: 6px; background: #f1f5f9; padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-size: 10px; font-weight: 700; color: #475569; }
    .checkbox-pill input { width: 16px; height: 16px; accent-color: #1a3a5c; }
  </style>
</head>
<body>
  <div id="root">
    <div id="fallback-loader" style="padding: 50px; text-align: center; font-family: sans-serif; font-weight: bold; color: #64748b;">
      INITIALIZING VISIONAIRE COMMAND...<br>
      <small style="font-weight: normal;">If this screen stays white, please check internet connection.</small>
    </div>
  </div>

  <script type="text/babel">
    // 🚨 DEBUG LOGGER: If this crashes, it will tell you why on the phone screen
    window.onerror = function(msg, url, line) {
      document.getElementById('root').innerHTML = `
        <div style="padding:20px; color:red; font-family:sans-serif; background:white; height:100vh;">
          <h2 style="font-weight:900;">⚠️ APP CRASH</h2>
          <p style="font-size:12px;"><b>Error:</b> ${msg}</p>
          <p style="font-size:12px;"><b>Line:</b> ${line}</p>
          <button onclick="location.reload()" style="background:black; color:white; padding:10px; border-radius:5px;">Retry Load</button>
        </div>
      `;
    };

    const { useState, useEffect, useRef } = React;

    const WIN_T = ["DH", "SH", "SL", "PIC", "CAS", "AWN", "HOP", "B/B", "T", "Other"];
    const GRIDS = ["None", "Contour", "Flat", "SDL", "Other"];
    const GLASS_O = ["None", "Tempered", "Obscure – Standard", "Obscure – Rain", "Obscure – Flemish", "Obscure – Satin", "Other"];
    const DOOR_T = ["Single", "Double / French", "Sliding Patio", "Single w/ Sidelights", "Double w/ Sidelights", "Bifold", "Other"];
    const SWINGS = ["RHI", "LHI", "RHO", "LHO", "Active/Passive – Right", "Active/Passive – Left"];
    const JAMBS = ["4-9/16\"", "6-9/16\"", "4-5/8\"", "Custom"];

    function VisionaireApp() {
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(() => JSON.parse(localStorage.getItem('activeJobId')) || null);
      const [activeTab, setActiveTab] = useState('measure'); 
      const [expandedIndex, setExpandedIndex] = useState(0);
      const [activeField, setActiveField] = useState(null); 
      const [loading, setLoading] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);
      const canvasRef = useRef(null);
      const isDrawing = useRef(false);

      const activeJob = jobs.find(j => j.id === activeJobId) || { data: [], header: {}, signoff: {}, checklist: {} };
      const signoffData = activeJob.signoff || {};
      const checklist = activeJob.checklist || {};

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      useEffect(() => {
        if (activeTab === 'signoff' && canvasRef.current) {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.offsetWidth;
          canvas.height = 180;
          ctx.strokeStyle = '#1a3a5c'; ctx.lineWidth = 3; ctx.lineCap = 'round';
          const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
          };
          const start = (e) => { 
            if (e.type === 'touchstart') e.preventDefault(); 
            isDrawing.current = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); 
          };
          const move = (e) => { if (!isDrawing.current) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
          const end = () => { isDrawing.current = false; updateSignoff('sigData', canvas.toDataURL()); };
          canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
          window.addEventListener('mouseup', end);
          canvas.addEventListener('touchstart', start, { passive: false });
          canvas.addEventListener('touchmove', move, { passive: false });
          canvas.addEventListener('touchend', end);
        }
      }, [activeTab]);

      const updateSignoff = (key, value) => setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, signoff: { ...j.signoff, [key]: value } } : j));
      const updateItem = (index, key, value) => setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, data: j.data.map((it, idx) => idx === index ? { ...it, [key]: value } : it) } : j));

      const handleKeyPress = (val) => {
        if (!activeField) return;
        const { index, field } = activeField;
        let cur = String(activeJob.data[index][field] || '');
        if (val === 'DEL') cur = cur.slice(0, -1); else if (val === 'CLR') cur = ''; else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
        updateItem(index, field, cur);
      };

      const uploadToDrive = async () => {
        setLoading(true);
        try {
          const latestPrefs = JSON.parse(localStorage.getItem('vhub_v2')) || {};
          const token = latestPrefs.accessToken;
          const folderId = "1ylS6334A685oyPJ6ndGd_t-eEXt7uQDz";
          let report = `FM: ${activeJob.customer}\nCaptured: ${new Date().toLocaleString()}\n\n`;
          activeJob.data.forEach((unit, idx) => {
            report += `${idx+1}. ${unit.location} (${unit.itemType})\nSize: ${unit.fmWidth}x${unit.fmHeight}\n\n`;
          });
          const metadata = { name: `FM_${activeJob.customer.replace(/[^a-z0-9]/gi, '_')}.txt`, mimeType: 'text/plain', parents: [folderId] };
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', new Blob([report], { type: 'text/plain' }));
          const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form });
          if (res.ok) alert("✅ Uploaded!"); else alert("Upload failed.");
        } catch (e) { alert("Error: " + e.message); } finally { setLoading(false); }
      };

      const autoLoadContract = async (job) => {
        setLoading(true);
        try {
          const latestPrefs = JSON.parse(localStorage.getItem('vhub_v2')) || {};
          const token = latestPrefs.accessToken;
          const cleanName = (job.customer || "").split(':').pop().trim().split(' ')[0];
          const q = `fullText contains '${cleanName}' and name contains '2026' and mimeType='application/pdf' and trashed = false`;
          const dRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&orderBy=createdTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const dData = await dRes.json();
          if (!dData.files || !dData.files[0]) { setLoading(false); return alert("No 2026 Contract."); }
          const fileId = dData.files[0].id;
          const fRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fRes.blob();
          const reader = new FileReader(); reader.readAsDataURL(blob);
          reader.onloadend = async () => {
             const base64 = reader.result.split(',')[1];
             const promptText = `Analyze for Visionaire Windows. Group sidelites/transoms into 'Door'. JSON: {"summary":"...","repairNotes":"...","items":[{"qty":"1","itemType":"Door/Window","location":"","contractSize":"","extras":""}],"checklist":{"winColor":"","glassType":"","doorSwing":"","doorJamb":""}}`;
             const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${latestPrefs.geminiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] }) });
             const result = await res.json();
             const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
             const parsed = JSON.parse(text);
             setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: parsed.items.map(i=>({...i, fmWidth:'', fmHeight:''})), summary: parsed.summary, repairNotes: parsed.repairNotes, checklist: parsed.checklist } : j));
             setLoading(false);
          };
        } catch (e) { setLoading(false); alert(e.message); }
      };

      const wipeAndRescan = () => {
        if (confirm("Wipe data and rescan the latest 2026 contract?")) {
          setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, data: [], checklist: {} } : j));
          autoLoadContract(activeJob);
        }
      };

      const addUnitAtEnd = (type) => {
        const newUnit = { itemType: type, location: `New ${type}`, qty: '1', fmWidth: '', fmHeight: '', extras: '', swing: '', jambDepth: type === 'Door' ? '4-9/16"' : '', grids: 'None', glass: 'None' };
        setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, data: [...j.data, newUnit] } : j));
      };

      const displayName = (activeJob.customer || "").split(':').pop().trim();

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-[#f1f5f9] flex flex-col pb-20">
          <header className="bg-[#1a3a5c] text-white p-4 border-b-4 border-[#f59e0b] sticky top-0 z-50">
            <div className="flex justify-between items-center mb-3">
              <button onClick={() => window.location.href = 'index.html'} className="text-white text-[10px] font-black bg-white/10 px-3 py-2 rounded">Hub</button>
              <h1 className="font-black italic text-lg uppercase flex-1 text-center truncate px-2">{displayName}</h1>
              <div className="w-8"></div>
            </div>
            <div className="flex bg-black/20 rounded-lg p-1 gap-1">
              {['overview', 'measure', 'signoff'].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-[10px] font-black uppercase rounded ${activeTab===tab?'bg-[#f59e0b] text-[#1a3a5c]':'text-white opacity-60'}`}>{tab}</button>
              ))}
            </div>
          </header>

          <main className="p-3 flex-1">
            {loading ? (
               <div className="p-20 text-center animate-pulse font-black text-slate-400 text-xs">PROCESSING...</div>
            ) : !activeJob.data?.length ? (
               <div className="p-10 text-center border-4 border-dashed border-slate-300 rounded-[2rem] bg-white mt-10">
                 <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white py-5 px-10 rounded-xl font-black text-sm uppercase shadow-lg">Scan PDF Contract</button>
               </div>
            ) : (
              <div className="space-y-4">
                {activeTab === 'overview' && (
                  <div className="bg-white p-6 rounded-2xl border space-y-6">
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                       <h3 className="text-[10px] font-black uppercase text-amber-800">⚠️ Critical Notes</h3>
                       <div className="text-[11px] font-bold text-slate-700 mt-1 italic">{activeJob.repairNotes || "Standard installation."}</div>
                    </div>
                    <button onClick={wipeAndRescan} className="w-full py-4 text-red-500 font-black uppercase text-[10px] border-2 border-red-50 border-dashed rounded-xl">🗑️ Wipe & Rescan</button>
                  </div>
                )}

                {activeTab === 'measure' && (
                  <div className="space-y-4 pb-10">
                    {activeJob.data.map((unit, idx) => (
                      <div key={idx} className="unit-card industrial-shadow" style={unit.itemType === 'Door' ? {borderLeft: '12px solid #064e3b'} : {borderLeft: '12px solid #1a3a5c'}}>
                         <div onClick={() => setExpandedIndex(idx)} className="unit-header">
                            <div className="flex items-center gap-3">
                               <div className="unit-num" style={unit.itemType === 'Door' ? {background: '#064e3b'} : {}}>{idx + 1}</div>
                               <div className="text-xs font-black uppercase">{unit.location}</div>
                            </div>
                         </div>
                         {expandedIndex === idx && (
                           <div className="p-4 border-t space-y-4 bg-white">
                              <div className="grid grid-cols-3 gap-3">
                                 <div onClick={() => setActiveField({index: idx, field: 'fmWidth'})} className={`input-box text-center ${activeField?.field==='fmWidth'?'active-input':''}`}>{unit.fmWidth || 'W"'}</div>
                                 <div onClick={() => setActiveField({index: idx, field: 'fmHeight'})} className={`input-box text-center ${activeField?.field==='fmHeight'?'active-input':''}`}>{unit.fmHeight || 'H"'}</div>
                                 <div className="input-box bg-slate-50 text-center">{unit.qty}</div>
                              </div>
                              <div className="text-[10px] font-bold text-slate-500 bg-slate-50 p-3 rounded-lg border">{unit.extras}</div>
                              <textarea className="input-box mobile-note" placeholder="Notes..." value={unit.notes} onInput={(e)=>updateItem(idx,'notes',e.target.value)} />
                           </div>
                         )}
                      </div>
                    ))}
                    <div className="flex gap-2">
                        <button onClick={() => addUnitAtEnd('Window')} className="flex-1 bg-slate-800 text-white py-4 rounded-xl font-black text-[10px] uppercase">➕ Window</button>
                        <button onClick={() => addUnitAtEnd('Door')} className="flex-1 bg-[#064e3b] text-white py-4 rounded-xl font-black text-[10px] uppercase">➕ Door</button>
                    </div>
                  </div>
                )}

                {activeTab === 'signoff' && (
                  <div className="bg-white rounded-2xl p-6 border space-y-6">
                     <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                        <label className="flex items-center justify-between mb-2">
                           <span className="font-black text-xs text-red-900 uppercase">Alarm Checkoff</span>
                           <input type="checkbox" className="w-6 h-6" checked={signoffData.alarmChecked} onChange={e=>updateSignoff('alarmChecked', e.target.checked)} />
                        </label>
                        <textarea className="input-box border-red-200 text-xs" placeholder="Alarm Notes..." value={signoffData.alarmNotes} onInput={(e)=>updateSignoff('alarmNotes', e.target.value)} />
                     </div>
                     <div className="space-y-2">
                        <span className="field-label">Signature</span>
                        <div className="sig-container industrial-shadow"><canvas ref={canvasRef} className="sig-canvas" /></div>
                        <input type="text" className="input-box text-center uppercase" placeholder="Print Name" value={signoffData.printName} onChange={(e)=>updateSignoff('printName', e.target.value)} />
                     </div>
                     <button onClick={uploadToDrive} disabled={loading} className="w-full py-5 bg-[#064e3b] text-white rounded-xl font-black uppercase">LOCK & SUBMIT</button>
                  </div>
                )}
              </div>
            )}
          </main>

          <div className={`keypad-container bg-slate-100 p-3 shadow-2xl border-t-2 ${activeField ? 'keypad-open' : ''}`}>
             <div className="flex justify-between items-center mb-2"><span className="text-[10px] font-black text-slate-400 uppercase">Input</span><button onClick={() => setActiveField(null)} className="bg-slate-800 text-white px-4 py-1.5 rounded-full text-[10px] font-black">DONE</button></div>
             <div className="grid grid-cols-7 gap-1 mb-2">{['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-2 rounded font-black text-[9px]">{f}</button>)}</div>
             <div className="grid grid-cols-3 gap-2">{[1,2,3,4,5,6,7,8,9,'CLR',0,'DEL'].map(n => (<button key={n} onClick={() => handleKeyPress(n)} className="bg-white py-3 rounded-lg font-black text-lg border">{n}</button>))}</div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
