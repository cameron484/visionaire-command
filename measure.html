<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
    .field-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; display: block; }
    .spec-pill { font-size: 0.7rem; font-weight: 700; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1.5px solid #cbd5e1; background: white; color: #475569; transition: all 0.15s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .active-pill { background: #1a3a5c; color: white; border-color: #1a3a5c; box-shadow: 0 4px 12px rgba(26,58,92,0.25); }
    .active-pill-door { background: #064e3b; color: white; border-color: #064e3b; box-shadow: 0 4px 12px rgba(6,78,59,0.25); }
    .door-accent { border-left: 12px solid #064e3b !important; }
    .window-accent { border-left: 12px solid #1a3a5c !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [prefs] = useState(() => JSON.parse(localStorage.getItem('vhub_v2')) || {});
      const apiKey = prefs.geminiKey || '';
      
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(() => JSON.parse(localStorage.getItem('activeJobId')) || null);
      
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');
      const [loading, setLoading] = useState(false);

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex] || {};
      const isDoor = (currentItem.itemType || '').toLowerCase().includes('door');

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const goBackToHub = () => {
        localStorage.removeItem('activeJobId'); 
        window.location.href = 'index.html'; 
      };

      if (!activeJobId || !activeJob) {
         return (
            <div className="flex flex-col items-center justify-center min-h-screen bg-slate-100 p-6 text-center">
               <div className="bg-white p-8 rounded-[2rem] shadow-xl max-w-sm w-full border-t-8 border-red-500">
                 <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase">Data Cleared</h2>
                 <p className="font-bold text-slate-500 mb-8 text-sm">Please return to the Hub to select a customer.</p>
                 <button onClick={goBackToHub} className="w-full bg-[#1a3a5c] text-white px-6 py-4 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">◀ Return to Hub</button>
               </div>
            </div>
         );
      }

      const updateItem = (key, value) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const newData = [...job.data];
            newData[activeItemIndex] = { ...newData[activeItemIndex], [key]: value };
            return { ...job, data: newData };
          }
          return job;
        }));
      };

      const handleKeyPress = (val) => {
        let cur = currentItem[activeField] || '';
        if (val === 'DEL') cur = cur.slice(0, -1);
        else if (val === 'CLR') cur = '';
        else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
        updateItem(activeField, cur);
      };

      const autoLoadContract = async (job) => {
        const token = prefs.accessToken;
        
        if (!token || !apiKey) return alert("System not fully configured in the Hub. Check Setup settings.");
        setLoading(true);
        try {
          let searchName = job.customer.trim();
          if (searchName.includes(' ')) {
            searchName = searchName.split(' ').pop(); 
          }

          // FIX: Search Shared Drives + Team Folders
          const query = `fullText contains '${searchName}' and mimeType='application/pdf'`;
          const driveUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true&corpora=allDrives`;
          
          const driveRes = await fetch(driveUrl, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          
          if (!driveData.files?.length) { 
            setLoading(false); 
            alert(`No PDF Found in Drive containing "${searchName}". Make sure the contract is uploaded to Google Drive.`); 
            return; 
          }

          // FIX: Add supportsAllDrives=true to the file download URL
          const fileUrl = `https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media&supportsAllDrives=true`;
          const fileRes = await fetch(fileUrl, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const promptText = `Extract all window and door items from this contract. Header: Location. Specs: Color, Hardware, Size. JSON EXACT FORMAT: [{"line":"1","itemType":"Window","location":"","style":"","contractSize":"","color":"","hardware":"","extras":"","qty":"1"}]`;
            
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });

            if (!geminiRes.ok) {
              setLoading(false);
              if (geminiRes.status === 429) {
                return alert("API Speed Limit Reached! Please wait 60 seconds and try scanning again.");
              }
              return alert(`Gemini AI Error: ${geminiRes.status}`);
            }

            const result = await geminiRes.json();
            
            if (!result.candidates || result.candidates.length === 0) {
              setLoading(false);
              return alert("Gemini failed to extract data from this PDF. Please try again.");
            }

            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            const items = JSON.parse(text).map(i => ({ ...i, fmWidth: '', fmHeight: '' }));
            
            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items } : j));
            setLoading(false);
          };
        } catch (e) { 
          setLoading(false); 
          console.error(e); 
          alert("Extraction Error: " + e.message); 
        }
      };

      const startManualSheet = () => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            return { 
              ...job, 
              data: [{ line: 1, itemType: 'Window', location: 'Unit 1', fmWidth: '', fmHeight: '', grids: '', glass: '', extras: '' }] 
            };
          }
          return job;
        }));
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white flex flex-col industrial-shadow">
          <header className="bg-[#1a3a5c] text-white p-5 border-b-4 border-[#f59e0b] sticky top-0 z-50 flex justify-between items-center">
            <h1 className="font-black italic text-xl tracking-tighter uppercase">Visionaire <span className="text-[10px] not-italic tracking-[0.3em] ml-2 opacity-70">Field Command</span></h1>
            <button onClick={goBackToHub} className="text-[#f59e0b] font-black text-[10px] uppercase">Close Job</button>
          </header>

          <main className="p-4 flex-1 pb-32 bg-slate-100">
            <div className="space-y-6">
              <button onClick={goBackToHub} className="text-[10px] font-black text-slate-400">◀ BACK TO HUB</button>
              
              <div className="border-b-4 border-slate-200 pb-2 flex justify-between items-end">
                  <h3 className="font-black text-2xl uppercase text-slate-800">{activeJob.customer}</h3>
                  {activeJob.data.length > 0 && (
                    <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase shadow-md active:scale-95">Rescan PDF 📄</button>
                  )}
              </div>

              {loading ? (
                <div className="p-20 text-center border-4 border-dashed border-slate-200 rounded-[2rem] bg-white shadow-sm">
                  <p className="text-slate-400 font-black uppercase text-xs animate-pulse">Scanning PDF & Analyzing Build Data...</p>
                </div>
              ) : activeJob.data && activeJob.data.length === 0 ? (
                <div className="p-10 text-center border-4 border-dashed border-slate-200 rounded-[2rem] bg-slate-50">
                  <p className="text-slate-500 font-bold uppercase text-xs mb-6">Contract Data Empty</p>
                  
                  <div className="flex flex-col gap-3 items-center">
                      <button onClick={() => autoLoadContract(activeJob)} className="w-full bg-blue-600 text-white px-6 py-4 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">📄 Scan PDF Contract</button>
                      
                      <p className="text-xs text-slate-400 font-bold my-2">OR</p>
                      
                      <button onClick={startManualSheet} className="w-full bg-[#1a3a5c] text-white px-6 py-4 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">Start Manual Sheet</button>
                  </div>
                </div>
              ) : (
                <div className={`bg-white border border-slate-200 rounded-[2rem] overflow-hidden shadow-sm ${isDoor ? 'door-accent' : 'window-accent'}`}>
                  <div className={`${isDoor ? 'bg-[#064e3b]' : 'bg-[#1a3a5c]'} p-4 flex justify-between items-center`}>
                    <span className="text-white font-bold text-xs uppercase tracking-widest">Line {activeItemIndex + 1} of {activeJob.data.length}</span>
                    <span className="bg-[#f59e0b] text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">{currentItem.itemType}</span>
                  </div>

                  <div className="p-5 space-y-6">
                    <div>
                      <span className="field-label">Location on House</span>
                      <h2 className="text-2xl font-black text-slate-800 uppercase leading-tight mb-1">{currentItem.location}</h2>
                      {currentItem.contractSize && (
                        <div className="inline-block mt-2 bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-lg">
                          <span className="text-[10px] font-bold text-blue-800 uppercase">Contract Size: {currentItem.contractSize}</span>
                        </div>
                      )}
                    </div>

                    {isDoor && (
                      <div className="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <span className="field-label text-emerald-700">Frame Prep</span>
                            <div className="flex gap-2">
                              <button onClick={() => updateItem('osj', !currentItem.osj)} className={`spec-pill ${currentItem.osj ? 'active-pill-door' : ''}`}>OSJ</button>
                              <button onClick={() => updateItem('osbm', !currentItem.osbm)} className={`spec-pill ${currentItem.osbm ? 'active-pill-door' : ''}`}>OSBM</button>
                            </div>
                          </div>
                          <div>
                            <span className="field-label text-emerald-700">Swing</span>
                            <div className="flex flex-wrap gap-2">
                              {['L/IN', 'R/IN', 'L/OUT', 'R/OUT'].map(s => (
                                <button key={s} onClick={() => updateItem('swing', s)} className={`spec-pill ${currentItem.swing === s ? 'active-pill-door' : ''}`}>{s}</button>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <span className="field-label">Grid Style</span>
                        <div className="flex flex-wrap gap-2">
                          {['Contour', 'Flat', 'SDL'].map(g => (
                            <button key={g} onClick={() => updateItem('grids', g)} className={`spec-pill ${currentItem.grids === g ? 'active-pill' : ''}`}>{g}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <span className="field-label">Glass Type</span>
                        <div className="flex flex-wrap gap-2">
                          {['Temp', 'Obscure'].map(gl => (
                            <button key={gl} onClick={() => updateItem('glass', gl)} className={`spec-pill ${currentItem.glass === gl ? 'active-pill' : ''}`}>{gl}</button>
                          ))}
                        </div>
                      </div>
                    </div>

                    <div>
                      <span className="field-label">Trim & Hardware Notes</span>
                      <textarea 
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm text-slate-700 placeholder-slate-400 focus:border-[#1a3a5c] focus:ring-1 focus:ring-[#1a3a5c] outline-none transition-all"
                        rows="3"
                        value={currentItem.extras || ''}
                        onChange={(e) => updateItem('extras', e.target.value)}
                        placeholder="Hardware specs, casing, threshold details..."
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-3 pt-2">
                      <div onClick={() => setActiveField('fmWidth')} className={`p-4 rounded-2xl border-4 text-center transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-md' : 'bg-slate-50 border-transparent'}`}>
                        <span className="field-label">Final Width</span>
                        <span className="text-3xl font-black text-slate-800">{currentItem.fmWidth || '-'}</span>
                      </div>
                      <div onClick={() => setActiveField('fmHeight')} className={`p-4 rounded-2xl border-4 text-center transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-md' : 'bg-slate-50 border-transparent'}`}>
                        <span className="field-label">Final Height</span>
                        <span className="text-3xl font-black text-slate-800">{currentItem.fmHeight || '-'}</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* NUMBER PAD */}
              {!loading && activeJob.data && activeJob.data.length > 0 && (
                <>
                  <div className="bg-slate-200 p-3 rounded-[2.5rem] shadow-inner">
                    <div className="grid grid-cols-7 gap-1.5 mb-3">
                      {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => (
                        <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-3.5 rounded-xl font-bold text-xs active:scale-95 transition-all shadow-sm">{f}</button>
                      ))}
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      {[1,2,3,4,5,6,7,8,9].map(n => (
                        <button key={n} onClick={() => handleKeyPress(n.toString())} className="bg-white p-5 rounded-2xl font-black text-2xl text-slate-700 active:bg-slate-50 active:scale-95 shadow-sm transition-all">{n}</button>
                      ))}
                      <button onClick={() => handleKeyPress('CLR')} className="bg-white p-5 rounded-2xl font-black text-sm text-red-500 uppercase active:bg-slate-50 active:scale-95 shadow-sm transition-all">CLR</button>
                      <button onClick={() => handleKeyPress('0')} className="bg-white p-5 rounded-2xl font-black text-2xl text-slate-700 active:bg-slate-50 active:scale-95 shadow-sm transition-all">0</button>
                      <button onClick={() => handleKeyPress('DEL')} className="bg-white p-5 rounded-2xl font-black text-sm text-orange-500 uppercase active:bg-slate-50 active:scale-95 shadow-sm transition-all">DEL</button>
                    </div>
                  </div>

                  <div className="flex gap-2 mb-8">
                      <button onClick={() => setActiveItemIndex(p => Math.max(p - 1, 0))} className="w-1/4 bg-slate-300 text-slate-600 py-5 rounded-[2rem] font-bold text-sm uppercase tracking-widest active:scale-[0.98] transition-all">
                        ◀
                      </button>
                      <button onClick={() => setActiveItemIndex(p => Math.min(p + 1, activeJob.data.length - 1))} className="w-3/4 bg-[#1a3a5c] text-white py-5 rounded-[2rem] font-bold text-sm uppercase tracking-widest active:scale-[0.98] shadow-xl transition-all">
                        Save & Next ➔
                      </button>
                  </div>
                </>
              )}
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
