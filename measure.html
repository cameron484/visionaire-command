<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { overscroll-behavior-y: contain; background: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
    .field-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.4rem; }
    .spec-pill { font-size: 0.7rem; font-weight: 700; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1.5px solid #cbd5e1; background: white; color: #475569; }
    .active-pill { background: #1a3a5c; color: white; border-color: #1a3a5c; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [prefs] = useState(() => JSON.parse(localStorage.getItem('vhub_v2')) || {});
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(() => JSON.parse(localStorage.getItem('activeJobId')) || null);
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');
      const [loading, setLoading] = useState(false);

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex] || {};

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const goBackToHub = () => { window.location.href = 'index.html'; };

      const updateItem = (key, value) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const newData = [...job.data];
            newData[activeItemIndex] = { ...newData[activeItemIndex], [key]: value };
            return { ...job, data: newData };
          }
          return job;
        }));
      };

      const handleKeyPress = (val) => {
        let cur = currentItem[activeField] || '';
        if (val === 'DEL') cur = cur.slice(0, -1);
        else if (val === 'CLR') cur = '';
        else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
        updateItem(activeField, cur);
      };

      const autoLoadContract = async (job) => {
        const token = prefs.accessToken;
        const apiKey = prefs.geminiKey;
        if (!token || !apiKey) return alert("System not fully configured in Hub.");
        setLoading(true);
        try {
          // SMART NAME EXTRACTION
          let cleanName = job.customer.replace(/\([^)]*\)/g, ' ').replace(/[^a-zA-Z\s]/g, ' ').trim();
          let nameParts = cleanName.split(/\s+/);
          // Find the longest word in their name (the most unique identifier)
          let searchTarget = nameParts.reduce((a, b) => a.length > b.length ? a : b); 
          searchTarget = searchTarget.replace(/'/g, "\\'");
          
          // BULLETPROOF SEARCH: Looks in file contents AND filename for the unique name + any contract keyword
          const query = `fullText contains '${searchTarget}' and (name contains 'Signed' or name contains 'Agreement' or name contains 'SOLD' or name contains 'Order') and mimeType='application/pdf'`;
          const driveUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=modifiedTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true`;
          
          const driveRes = await fetch(driveUrl, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { setLoading(false); return alert(`No signed contract found containing "${searchTarget}".`); }

          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const promptText = `Extract units as JSON: [{"line":"1","itemType":"Window","location":"","style":"","contractSize":"","color":"","hardware":"","extras":"","qty":"1"}]`;
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });
            if (!geminiRes.ok) { setLoading(false); return alert("AI limit hit. Wait 60 seconds."); }
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            const items = JSON.parse(text).map(i => ({ ...i, fmWidth: '', fmHeight: '' }));
            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items } : j));
            setLoading(false);
          };
        } catch (e) { setLoading(false); console.error(e); }
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white flex flex-col shadow-xl">
          <header className="bg-[#1a3a5c] text-white p-5 border-b-4 border-[#f59e0b] flex justify-between items-center">
            <h1 className="font-black italic text-xl uppercase">Visionaire Field Command</h1>
            <button onClick={goBackToHub} className="text-[#f59e0b] font-black text-[10px] uppercase">Close</button>
          </header>
          <main className="p-4 flex-1 pb-32 bg-slate-100">
            <div className="space-y-6">
              <h3 className="font-black text-2xl uppercase text-slate-800">{activeJob?.customer}</h3>
              {loading ? <div className="p-20 text-center animate-pulse">SEARCHING FILES & ANALYZING...</div> : 
               !activeJob?.data?.length ? <button onClick={() => autoLoadContract(activeJob)} className="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Scan PDF Contract 📄</button> :
               <div className="bg-white border-l-[12px] border-l-[#1a3a5c] rounded-[2rem] overflow-hidden shadow-sm p-5 space-y-6">
                  <div className="flex justify-between items-center"><span className="font-bold text-xs uppercase">Item {activeItemIndex + 1} of {activeJob.data.length}</span><span className="bg-[#f59e0b] text-[9px] px-3 py-1 rounded-full text-white">{currentItem.itemType}</span></div>
                  <div><span className="field-label">Location</span><h2 className="text-2xl font-black text-slate-800 uppercase">{currentItem.location || 'Unknown'}</h2></div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    {['Grids', 'Glass'].map(type => (
                      <div key={type}><span className="field-label">{type}</span><div className="flex flex-wrap gap-2">{(type==='Grids'?['Contour','Flat','SDL']:['Temp','Obscure']).map(v => <button key={v} onClick={() => updateItem(type.toLowerCase(), v)} className={`spec-pill ${currentItem[type.toLowerCase()] === v ? 'active-pill' : ''}`}>{v}</button>)}</div></div>
                    ))}
                  </div>
                  <div><span className="field-label">Contract Specs / Extras</span><div className="bg-slate-50 p-3 rounded-xl text-xs font-bold text-slate-600 border border-slate-200">{currentItem.style} | {currentItem.color} | {currentItem.hardware} <br/> {currentItem.extras}</div></div>

                  <div className="grid grid-cols-2 gap-3 pt-2">
                      <div onClick={() => setActiveField('fmWidth')} className={`p-4 rounded-2xl border-4 text-center ${activeField==='fmWidth'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Final Width</span><span className="text-3xl font-black">{currentItem.fmWidth||'-'}</span></div>
                      <div onClick={() => setActiveField('fmHeight')} className={`p-4 rounded-2xl border-4 text-center ${activeField==='fmHeight'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Final Height</span><span className="text-3xl font-black">{currentItem.fmHeight||'-'}</span></div>
                  </div>
               </div>}
              {!loading && activeJob?.data?.length > 0 && <div className="bg-slate-200 p-3 rounded-[2.5rem] shadow-inner">
                <div className="grid grid-cols-7 gap-1.5 mb-3">{['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-3.5 rounded-xl font-bold text-xs">{f}</button>)}</div>
                <div className="grid grid-cols-3 gap-2">{[1,2,3,4,5,6,7,8,9, 'CLR', '0', 'DEL'].map(n => <button key={n} onClick={() => handleKeyPress(n)} className="bg-white p-5 rounded-2xl font-black text-2xl text-slate-700">{n}</button>)}</div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setActiveItemIndex(p => Math.max(0, p - 1))} className="flex-1 bg-slate-400 text-white py-5 rounded-[2rem] font-bold text-sm uppercase">Prev</button>
                  <button onClick={() => setActiveItemIndex(p => Math.min(p + 1, activeJob.data.length - 1))} className="flex-[2] bg-[#1a3a5c] text-white py-5 rounded-[2rem] font-bold text-sm uppercase">Next Unit ➔</button>
                </div>
              </div>}
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<VisionaireApp />);
  </script>
</body>
</html>
