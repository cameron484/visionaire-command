<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { overscroll-behavior-y: contain; background: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
    .field-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.4rem; }
    .spec-pill { font-size: 0.7rem; font-weight: 700; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1.5px solid #cbd5e1; background: white; color: #475569; }
    .active-pill { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .input-field { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.875rem; font-weight: 700; color: #1e293b; outline: none; }
    .input-field:focus { border-color: #1a3a5c; box-shadow: 0 0 0 3px rgba(26,58,92,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [prefs] = useState(() => JSON.parse(localStorage.getItem('vhub_v2')) || {});
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(() => JSON.parse(localStorage.getItem('activeJobId')) || null);
      
      const [activeTab, setActiveTab] = useState('measure'); 
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');
      const [loading, setLoading] = useState(false);

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex] || {};
      const headerData = activeJob?.header || {};
      const signoffData = activeJob?.signoff || {};

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const goBackToHub = () => { window.location.href = 'index.html'; };

      const cleanCustomerName = (name) => {
        if (!name) return '';
        return name.replace(/^[\s\-\u2013:]+/, '').trim();
      };

      const exportData = () => {
        if(!activeJob) return alert('No data to export.');
        let text = `FINAL MEASURE SHEET: ${cleanCustomerName(activeJob.customer).toUpperCase()}\n`;
        text += `=====================================\n`;
        if(headerData.brand) text += `Brand: ${headerData.brand}\n`;
        if(headerData.crew) text += `Crew: ${headerData.crew}\n`;
        if(headerData.extColor || headerData.intColor) text += `Colors: ${headerData.extColor||'N/A'} (Ext) / ${headerData.intColor||'N/A'} (Int)\n`;
        text += `=====================================\n\n`;
        
        if(activeJob.data && activeJob.data.length > 0) {
          activeJob.data.forEach((item, i) => {
            text += `UNIT ${i+1}: ${item.itemType.toUpperCase()} - ${item.location}\n`;
            text += `Specs: ${item.style || 'N/A'} | ${item.color || 'N/A'} | ${item.glass || 'N/A'} | ${item.grids || 'N/A'}\n`;
            text += `Sizes: Contract [${item.contractSize || 'N/A'}] -> FM [W: ${item.fmWidth || '___'} x H: ${item.fmHeight || '___'}] ${item.verified ? '(VERIFIED)' : ''}\n`;
            if(item.extras) text += `Notes: ${item.extras}\n`;
            text += `-------------------------------------\n`;
          });
        }

        text += `\nSIGN-OFF CHECKLIST:\n`;
        text += `[${signoffData.alarms ? 'X' : ' '}] Alarms Reviewed\n`;
        text += `[${signoffData.photos ? 'X' : ' '}] Photos Taken (Ext)\n`;
        text += `[${signoffData.colors ? 'X' : ' '}] Colors Confirmed\n`;
        text += `[${signoffData.swings ? 'X' : ' '}] Door Swings Confirmed\n`;
        text += `HO Initials: ${signoffData.initials || '_____'}\n`;

        navigator.clipboard.writeText(text)
          .then(() => alert('Full job data copied to Clipboard! Ready for MarketSharp.'))
          .catch(()=> alert('Failed to copy.'));
      };

      const updateHeader = (key, value) => {
        setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, header: { ...j.header, [key]: value } } : j));
      };

      const updateSignoff = (key, value) => {
        setJobs(prev => prev.map(j => j.id === activeJobId ? { ...j, signoff: { ...j.signoff, [key]: value } } : j));
      };

      const addUnit = () => {
        const newUnit = { line: (activeJob.data?.length || 0) + 1, itemType: 'Window', location: 'New Location', style: '', contractSize: '', color: '', hardware: '', extras: '', qty: '1', fmWidth: '', fmHeight: '', verified: false };
        setJobs(prev => prev.map(j => j.id === activeJob.id ? { ...j, data: [...(j.data||[]), newUnit] } : j));
        setActiveItemIndex((activeJob.data?.length || 0));
        setActiveTab('measure');
      };

      const updateItem = (key, value) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const newData = [...job.data];
            newData[activeItemIndex] = { ...newData[activeItemIndex], [key]: value };
            return { ...job, data: newData };
          }
          return job;
        }));
      };

      const handleKeyPress = (val) => {
        let cur = currentItem[activeField] || '';
        if (val === 'DEL') cur = cur.slice(0, -1);
        else if (val === 'CLR') cur = '';
        else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
        updateItem(activeField, cur);
      };

      const processPDFBase64 = async (base64, apiKey, job) => {
        const promptText = `Extract units as JSON: [{"line":"1","itemType":"Window","location":"","style":"","contractSize":"","color":"","hardware":"","extras":"","qty":"1"}]`;
        const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
        });
        if (!geminiRes.ok) { setLoading(false); return alert("AI limit hit. Wait 60 seconds."); }
        const result = await geminiRes.json();
        const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
        const items = JSON.parse(text).map(i => ({ ...i, fmWidth: '', fmHeight: '', verified: false }));
        setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items } : j));
        setActiveTab('measure');
        setLoading(false);
      };

      const autoLoadContract = async (job) => {
        const token = prefs.accessToken; const apiKey = prefs.geminiKey;
        if (!token || !apiKey) return alert("System not fully configured in Hub.");
        setLoading(true);
        try {
          let cleanName = job.customer.replace(/\([^)]*\)/g, ' ').replace(/[^a-zA-Z\s]/g, ' ').trim();
          let nameParts = cleanName.split(/\s+/);
          let searchTarget = nameParts.reduce((a, b) => a.length > b.length ? a : b).replace(/'/g, "\\'");
          
          const query = `fullText contains '${searchTarget}' and (name contains 'Signed' or name contains 'Agreement' or name contains 'SOLD' or name contains 'Order') and mimeType='application/pdf'`;
          const driveUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=modifiedTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true`;
          
          const driveRes = await fetch(driveUrl, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { setLoading(false); return alert(`No signed contract found containing "${searchTarget}".`); }

          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader(); reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            await processPDFBase64(base64, apiKey, job);
          };
        } catch (e) { setLoading(false); console.error(e); alert("Drive Search Error. You can try uploading manually."); }
      };

      const handleManualUpload = (e, job) => {
        const file = e.target.files[0];
        if (!file) return;
        const apiKey = prefs.geminiKey;
        if (!apiKey) return alert("System not fully configured in Hub (missing Gemini Key).");

        setLoading(true);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const base64 = reader.result.split(',')[1];
            await processPDFBase64(base64, apiKey, job);
          } catch (error) {
            setLoading(false);
            console.error(error);
            alert("Error processing manually uploaded PDF.");
          }
        };
      };

      if(!activeJob) return <div className="p-10 text-center font-bold">Return to Hub to select customer.</div>;

      const hasData = activeJob?.data?.length > 0;

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white flex flex-col shadow-xl">
          <header className="bg-[#1a3a5c] text-white p-4 border-b-4 border-[#f59e0b] flex flex-col gap-4 sticky top-0 z-50">
            <div className="flex justify-between items-center">
              <button onClick={goBackToHub} className="text-white font-black text-[10px] uppercase bg-white/20 px-3 py-2 rounded">Close</button>
              <h1 className="font-black italic text-lg uppercase text-center flex-1 truncate px-2">{cleanCustomerName(activeJob.customer)}</h1>
              <button onClick={exportData} className="text-[#1a3a5c] bg-[#f59e0b] font-black text-[10px] uppercase px-3 py-2 rounded shadow">Export</button>
            </div>
            
            {hasData && (
              <div className="flex bg-black/30 rounded-lg p-1 gap-1">
                <button onClick={() => setActiveTab('overview')} className={`flex-1 py-2 text-xs font-black uppercase tracking-wider rounded ${activeTab==='overview'?'bg-[#f59e0b] text-[#1a3a5c] shadow':'text-white opacity-70'}`}>Overview</button>
                <button onClick={() => setActiveTab('measure')} className={`flex-1 py-2 text-xs font-black uppercase tracking-wider rounded ${activeTab==='measure'?'bg-[#f59e0b] text-[#1a3a5c] shadow':'text-white opacity-70'}`}>Units</button>
                <button onClick={() => setActiveTab('signoff')} className={`flex-1 py-2 text-xs font-black uppercase tracking-wider rounded ${activeTab==='signoff'?'bg-[#f59e0b] text-[#1a3a5c] shadow':'text-white opacity-70'}`}>Sign-Off</button>
              </div>
            )}
          </header>

          <main className="p-4 flex-1 pb-32 bg-slate-100">
            <div className="space-y-6">
              
              {loading ? <div className="p-20 text-center animate-pulse font-bold text-slate-500 uppercase tracking-widest">Reading PDF & Analyzing Data...</div> : 
               !hasData ? (
                 <div className="p-6 text-center border-4 border-dashed border-slate-300 rounded-[2rem] bg-white flex flex-col gap-4 mt-6">
                   <div className="text-4xl mb-2">📄</div>
                   <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white px-6 py-4 rounded-xl font-black text-sm uppercase shadow-lg active:scale-95 transition-transform w-full">Scan Drive Contract</button>
                   
                   <div className="text-slate-400 font-bold text-xs my-1">— OR —</div>
                   
                   <label className="bg-emerald-600 text-white px-6 py-4 rounded-xl font-black text-sm uppercase shadow-lg active:scale-95 transition-transform cursor-pointer w-full block text-center">
                     ⬆️ Upload PDF Manually
                     <input type="file" accept="application/pdf" className="hidden" onChange={(e) => handleManualUpload(e, activeJob)} />
                   </label>

                   <div className="text-slate-400 font-bold text-xs my-1">— OR —</div>

                   <button onClick={addUnit} className="bg-slate-800 text-white px-6 py-4 rounded-xl font-black text-sm uppercase shadow-lg active:scale-95 transition-transform w-full">➕ Add Unit Manually</button>
                 </div>
               ) : (
                 <>
                   {activeTab === 'overview' && (
                     <div className="bg-white rounded-[2rem] p-6 shadow-sm space-y-5 border border-slate-200">
                       <h2 className="font-black text-lg text-[#1a3a5c] uppercase border-b-2 border-slate-100 pb-2">Global Job Details</h2>
                       <div><span className="field-label">Window Brand</span><input type="text" className="input-field" placeholder="Simonton, ProVia, etc." value={headerData.brand || ''} onChange={e => updateHeader('brand', e.target.value)} /></div>
                       <div><span className="field-label">Install Crew / Type</span><input type="text" className="input-field" placeholder="Retro, Capping, etc." value={headerData.crew || ''} onChange={e => updateHeader('crew', e.target.value)} /></div>
                       <div className="grid grid-cols-2 gap-4">
                         <div><span className="field-label">Exterior Color</span><input type="text" className="input-field" placeholder="White, Bronze..." value={headerData.extColor || ''} onChange={e => updateHeader('extColor', e.target.value)} /></div>
                         <div><span className="field-label">Interior Color</span><input type="text" className="input-field" placeholder="White, Woodgrain..." value={headerData.intColor || ''} onChange={e => updateHeader('intColor', e.target.value)} /></div>
                       </div>
                       <button onClick={() => setActiveTab('measure')} className="w-full bg-[#1a3a5c] text-white py-4 rounded-xl font-bold text-sm uppercase mt-4">Start Measuring ➔</button>
                     </div>
                   )}

                   {activeTab === 'measure' && (
                     <div className="space-y-6">
                       <div className="bg-white border-l-[12px] border-l-[#1a3a5c] rounded-[2rem] overflow-hidden shadow-sm p-5 space-y-6">
                          <div className="flex justify-between items-center">
                            <span className="font-bold text-xs uppercase text-slate-500">Unit {activeItemIndex + 1} of {activeJob.data.length}</span>
                            <span onClick={() => updateItem('itemType', currentItem.itemType === 'Window' ? 'Door' : 'Window')} className="bg-[#f59e0b] text-[9px] px-3 py-1 rounded-full text-white cursor-pointer shadow-md tracking-wider">{currentItem.itemType} ⟳</span>
                          </div>
                          
                          <div onClick={() => { let loc = prompt("Enter location:", currentItem.location); if(loc) updateItem('location', loc); }} className="cursor-pointer group">
                            <span className="field-label group-hover:text-blue-500">Location (Tap to edit)</span>
                            <h2 className="text-2xl font-black text-slate-800 uppercase border-b-2 border-dashed border-transparent group-hover:border-blue-200 inline-block">{currentItem.location || 'Unknown'}</h2>
                          </div>
                          
                          <div className="grid grid-cols-2 gap-4">
                            {['Grids', 'Glass'].map(type => (
                              <div key={type}><span className="field-label">{type}</span><div className="flex flex-wrap gap-2">{(type==='Grids'?['Contour','Flat','SDL']:['Temp','Obscure']).map(v => <button key={v} onClick={() => updateItem(type.toLowerCase(), v)} className={`spec-pill ${currentItem[type.toLowerCase()] === v ? 'active-pill' : ''}`}>{v}</button>)}</div></div>
                            ))}
                          </div>
                          
                          <div>
                            <span className="field-label">Contract Specs / Extras</span>
                            <div className="bg-slate-50 p-3 rounded-xl text-xs font-bold text-slate-600 border border-slate-200">
                              {currentItem.style || 'N/A'} | {currentItem.color || 'N/A'} | {currentItem.hardware || 'N/A'} <br/> {currentItem.extras}
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3 pt-2">
                              <div onClick={() => setActiveField('fmWidth')} className={`p-4 rounded-2xl border-4 text-center cursor-pointer ${activeField==='fmWidth'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Final Width</span><span className="text-3xl font-black">{currentItem.fmWidth||'-'}</span></div>
                              <div onClick={() => setActiveField('fmHeight')} className={`p-4 rounded-2xl border-4 text-center cursor-pointer ${activeField==='fmHeight'?'border-[#1a3a5c] bg-white shadow-md':'bg-slate-50 border-transparent'}`}><span className="field-label">Final Height</span><span className="text-3xl font-black">{currentItem.fmHeight||'-'}</span></div>
                          </div>

                          <div className={`p-3 rounded-xl border flex justify-between items-center transition-colors ${currentItem.verified ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200'}`}>
                             <div>
                               <span className="text-[10px] font-black uppercase text-slate-500 block">Contract Size</span>
                               <span className="font-bold text-slate-800">{currentItem.contractSize || 'Unknown'}</span>
                             </div>
                             <label className={`flex items-center gap-2 text-sm font-black cursor-pointer px-3 py-2 rounded-lg ${currentItem.verified ? 'text-green-700 bg-green-100' : 'text-amber-700 bg-amber-100'}`}>
                                <input type="checkbox" checked={currentItem.verified || false} onChange={e => updateItem('verified', e.target.checked)} className="w-5 h-5 accent-green-600 cursor-pointer" />
                                {currentItem.verified ? 'VERIFIED' : 'VERIFY SIZE'}
                             </label>
                          </div>
                       </div>

                       <div className="bg-slate-200 p-3 rounded-[2.5rem] shadow-inner">
                        <div className="grid grid-cols-7 gap-1.5 mb-3">{['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-3.5 rounded-xl font-bold text-xs shadow active:scale-95 transition-transform">{f}</button>)}</div>
                        <div className="grid grid-cols-3 gap-2">{[1,2,3,4,5,6,7,8,9, 'CLR', '0', 'DEL'].map(n => <button key={n} onClick={() => handleKeyPress(n)} className={`bg-white p-5 rounded-2xl font-black text-2xl shadow-sm hover:bg-slate-50 active:scale-95 transition-transform ${n==='CLR'?'text-red-500 text-sm':n==='DEL'?'text-orange-500 text-sm':'text-slate-700'}`}>{n}</button>)}</div>
                        <div className="flex gap-2 mt-4">
                          <button onClick={() => setActiveItemIndex(p => Math.max(0, p - 1))} className="flex-1 bg-slate-400 text-white py-5 rounded-[2rem] font-bold text-sm uppercase active:scale-95 transition-transform">Prev</button>
                          <button onClick={() => { if (activeItemIndex === activeJob.data.length - 1) addUnit(); else setActiveItemIndex(p => p + 1); }} className="flex-[2] bg-[#1a3a5c] text-white py-5 rounded-[2rem] font-bold text-sm uppercase shadow-xl active:scale-95 transition-transform">
                            {activeItemIndex === activeJob.data.length - 1 ? '➕ Add Unit' : 'Next Unit ➔'}
                          </button>
                        </div>
                      </div>
                     </div>
                   )}

                   {activeTab === 'signoff' && (
                     <div className="bg-white rounded-[2rem] p-6 shadow-sm space-y-6 border border-slate-200">
                       <h2 className="font-black text-lg text-[#1a3a5c] uppercase border-b-2 border-slate-100 pb-2">CYA Checklist</h2>
                       
                       <div className="space-y-3">
                         <label className="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-pointer">
                           <input type="checkbox" checked={signoffData.alarms || false} onChange={e=>updateSignoff('alarms', e.target.checked)} className="w-6 h-6 accent-[#064e3b]" />
                           <span className="font-bold text-slate-700 text-sm">Alarms Reviewed / Handled</span>
                         </label>
                         <label className="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-pointer">
                           <input type="checkbox" checked={signoffData.photos || false} onChange={e=>updateSignoff('photos', e.target.checked)} className="w-6 h-6 accent-[#064e3b]" />
                           <span className="font-bold text-slate-700 text-sm">Photos Taken (All sides, Exterior)</span>
                         </label>
                         <label className="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-pointer">
                           <input type="checkbox" checked={signoffData.colors || false} onChange={e=>updateSignoff('colors', e.target.checked)} className="w-6 h-6 accent-[#064e3b]" />
                           <span className="font-bold text-slate-700 text-sm">Colors Confirmed with HO</span>
                         </label>
                         <label className="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-pointer">
                           <input type="checkbox" checked={signoffData.swings || false} onChange={e=>updateSignoff('swings', e.target.checked)} className="w-6 h-6 accent-[#064e3b]" />
                           <span className="font-bold text-slate-700 text-sm">Door Swings Confirmed (If applicable)</span>
                         </label>
                       </div>

                       <div className="pt-4 border-t-2 border-dashed border-slate-200">
                         <span className="field-label">Homeowner Sign-Off Initials</span>
                         <input type="text" className="input-field text-center text-2xl tracking-widest uppercase" placeholder="Type Initials" value={signoffData.initials || ''} onChange={e => updateSignoff('initials', e.target.value)} />
                       </div>

                       <button onClick={exportData} className="w-full bg-[#064e3b] text-white py-5 rounded-xl font-black text-sm uppercase shadow-xl mt-4">📋 Copy Full Job to Clipboard</button>
                     </div>
                   )}
                 </>
               )}
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<VisionaireApp />);
  </script>
</body>
</html>
