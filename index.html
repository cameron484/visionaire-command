<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; } 
    .sync-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .num-btn { @apply bg-white p-5 rounded-2xl font-black text-3xl shadow-sm active:bg-slate-200 active:scale-90 transition-all border-b-4 border-slate-300 flex items-center justify-center text-slate-700; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [isSyncing, setIsSyncing] = useState(false);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [clientId] = useState(localStorage.getItem('googleClientId') || '');

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const pullCalendarMeasures = async () => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return alert("Please Link Account in Settings first.");
        
        setIsSyncing(true);
        try {
          // Fetch events from now into the future
          const now = new Date().toISOString();
          const response = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&q=Final Measure&singleEvents=true&orderBy=startTime`,
            { headers: { Authorization: `Bearer ${token}` } }
          );
          
          const data = await response.json();
          
          if (!data.items || data.items.length === 0) {
            alert("No 'Final Measure' events found on your calendar.");
          } else {
            const newJobsFromCal = data.items.map(event => {
              // Extract name from "Final Measure: Name" or "Final Measure - Name"
              const name = event.summary.split(/[:\-]/).pop().trim();
              
              // Check if we already have this job loaded
              if (jobs.some(j => j.customer === name)) return null;

              return {
                id: Date.now() + Math.random(),
                customer: name,
                location: event.location || 'No Address Listed',
                dateAdded: new Date(event.start.dateTime).toLocaleDateString(),
                status: 'Scheduled',
                data: [] // Ready for PDF scan or manual entry
              };
            }).filter(j => j !== null);

            if (newJobsFromCal.length > 0) {
              setJobs(prev => [...newJobsFromCal, ...prev]);
              alert(`Imported ${newJobsFromCal.length} new appointments from your calendar.`);
            } else {
              alert("All calendar measures are already in your list.");
            }
          }
        } catch (e) {
          alert("Sync Error: " + e.message);
        }
        setIsSyncing(false);
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-slate-50 pb-10">
          <header className="p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg bg-[#1a3a5c] border-b-2 border-[#f59e0b]">
            <div className="flex flex-col">
                <span className="text-[#f59e0b] font-black italic text-xl uppercase">Visionaire</span>
                <span className="text-white font-bold text-[8px] tracking-[0.4em] ml-1 uppercase">Field Command</span>
            </div>
            <div className={`h-3 w-3 rounded-full ${isLinked ? 'bg-green-500' : 'bg-red-500'}`}></div>
          </header>

          <div className="p-4">
            {/* THE SYNC ACTION */}
            <button 
              onClick={pullCalendarMeasures}
              disabled={isSyncing}
              className={`w-full mb-6 p-6 rounded-[2rem] font-black text-sm uppercase shadow-xl transition-all flex items-center justify-center gap-3 ${
                isSyncing ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 text-white active:scale-95'
              }`}
            >
              <span className={isSyncing ? 'sync-pulse' : ''}>{isSyncing ? '⌛' : '📅'}</span>
              {isSyncing ? 'Scanning Calendar...' : 'Pull Calendar Measures'}
            </button>

            <div className="space-y-4">
              <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic underline">Active Appointments</h2>
              
              {jobs.length === 0 && (
                <div className="text-center py-20 bg-white rounded-[2rem] border-4 border-dashed border-slate-200">
                   <p className="text-slate-400 font-bold uppercase text-xs tracking-tighter">Tap the button above to load your schedule</p>
                </div>
              )}

              {jobs.map(job => (
                <div key={job.id} className="bg-white p-6 shadow-sm rounded-[2rem] border-l-[16px] border-[#1a3a5c] flex justify-between items-center">
                  <div className="flex-1">
                    <h3 className="font-black text-slate-700 text-xl leading-none">{job.customer}</h3>
                    <p className="text-[9px] text-slate-400 font-bold uppercase mt-2 truncate w-48">{job.location}</p>
                    <div className="mt-3 inline-block px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-[8px] font-black uppercase tracking-tighter">
                      {job.dateAdded}
                    </div>
                  </div>
                  <button className="bg-slate-100 p-4 rounded-2xl font-black text-xs uppercase text-slate-400 active:bg-blue-600 active:text-white transition-colors">
                    Open
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
