<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire — Customer Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --emerald:#064e3b; --emerald-mid:#065f46; --emerald-light:#ecfdf5;
      --amber:#f59e0b; --amber-dark:#d97706; --amber-light:#fef3c7;
      --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
      --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;letter-spacing:-0.03em;color:white;text-transform:uppercase;line-height:1}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:10px 4px;font-size:0.68rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}
    .main{padding:14px 12px 100px}
    .lbl{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--s500);display:block;margin-bottom:4px}
    .sc{background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(26,58,92,0.08);margin-bottom:14px}
    .sc-head{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:20px 18px 16px; color:white; font-weight:900; text-transform:uppercase;}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:13px}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:9px;padding:10px 12px;font-size:0.85rem;font-family:inherit;background:var(--s50);outline:none;}
    .btn-p{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:14px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;}
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-title{font-size:0.72rem;font-weight:800;color:var(--navy)}
    .sync-sub{font-size:0.55rem;color:var(--s500);margin-top:1px;font-weight:700}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 13px;font-size:0.65rem;font-weight:800;text-transform:uppercase;cursor:pointer}
    .dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px; scrollbar-width: none;}
    .dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;min-width:55px}
    .dchip.on{background:var(--navy);border-color:var(--navy);box-shadow:0 4px 12px rgba(26,58,92,0.25)}
    .dc-d{font-size:0.57rem;font-weight:800;text-transform:uppercase;color:var(--s400)}
    .dchip.on .dc-d, .dchip.on .dc-n {color:white}
    .dc-n{font-size:1.1rem;font-weight:900;color:var(--s700)}
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .cc-head{display:flex;align-items:stretch}
    .cc-bar{width:8px;flex-shrink:0}
    .cc-body{flex:1;padding:12px 12px 12px 10px}
    .cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
    .cc-name{font-size:1.15rem;font-weight:900;color:var(--s800);text-transform:uppercase;line-height:1.15;flex:1;}
    .cc-time{font-size:0.64rem;font-weight:800;color:white;background:var(--navy);border-radius:6px;padding:3px 7px;white-space:nowrap;}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:12px 4px;border:none;background:transparent;font-size:0.68rem;font-weight:800;text-transform:uppercase;color:var(--s500);cursor:pointer;text-align:center;}
    .ca.p{color:var(--navy)}
    .cc-det{padding:12px;border-top:1px solid var(--border);background:var(--s50);display:flex;flex-direction:column;gap:10px}
    .dnotes{background:white;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:0.82rem;color:var(--s700);line-height:1.7;}
    .note-line { display: block; padding-bottom: 6px; border-bottom: 1px dashed var(--s200); margin-bottom: 6px; }
    .note-label { font-weight: 800; color: var(--navy); text-transform: uppercase; font-size: 0.65rem; display: block; margin-bottom: 1px; }
    .tel-link { color: #2563eb; text-decoration: underline; font-weight: 700; }
    .preload-bar { background: #1a3a5c; color: white; padding: 10px; text-align: center; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
    .ready-badge { background: #dcfce7; color: #166534; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; border: 1px solid #86efac; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;
var STORAGE_KEY = 'vhub_v2';

function VisionaireHub() {
  const [prefs, setPrefs] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY)) || {});
  const [view, setView] = useState(prefs.accessToken ? 'sched' : 'setup');
  const [calEvents, setCalEvents] = useState(prefs.calEvents || []);
  const [loading, setLoading] = useState(false);
  const [preloading, setPreloading] = useState(false);
  const [preloadProgress, setPreloadProgress] = useState("");
  const [selDate, setSelDate] = useState(new Date().toISOString().slice(0,10));
  const [expandId, setExpandId] = useState(null);

  useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs)); }, [prefs]);

  const signIn = () => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: prefs.clientId,
      scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email',
      callback: (resp) => {
        setPrefs(p => ({...p, accessToken: resp.access_token}));
        setView('sched');
      }
    });
    client.requestAccessToken({prompt:'select_account'});
  };

  const syncCalendar = async () => {
    setLoading(true);
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&q=Measure`;
    const r = await fetch(url, {headers: {'Authorization': 'Bearer ' + prefs.accessToken}});
    const d = await r.json();
    const evs = (d.items || []).map(ev => {
      const start = (ev.start && (ev.start.dateTime || ev.start.date)) || '';
      const rawName = ev.summary.replace(/final\s*measure|measure|fm/ig, '').split(':').pop().trim();
      return {
        id: ev.id, customer: rawName, address: ev.location || '', startDate: start.slice(0,10),
        startTime: start.indexOf('T') >= 0 ? new Date(start).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}) : 'Scheduled',
        notesHtml: ev.description || '', hasWin: /window/i.test(ev.summary + ev.description), hasDoor: /door/i.test(ev.summary + ev.description)
      };
    });
    setCalEvents(evs);
    setPrefs(p => ({...p, calEvents: evs, lastSync: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}));
    setLoading(false);
  };

  const cleanNotes = (html) => {
    if (!html) return "";
    let text = html.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').trim();
    const labels = ["Category:", "Contact:", "Product:", "Edit event at:"];
    labels.forEach(l => { text = text.replace(new RegExp(`(${l})`, 'gi'), `|||$1`); });
    return text.split('|||').filter(line => line.trim().length > 3).map((line, i) => {
      let part = line.trim();
      let label = labels.find(l => part.toLowerCase().startsWith(l.toLowerCase()));
      if (label) {
        let content = part.substring(label.length).trim();
        if (label.toLowerCase() === 'edit event at:') return <span key={i} className="note-line"><span className="note-label">CRM:</span><a href={content} target="_blank" style={{color: '#2563eb', fontWeight: '700'}}>Open MarketSharp</a></span>;
        return <span key={i} className="note-line"><span className="note-label">{label.toUpperCase()}</span>{content}</span>;
      }
      return <span key={i} className="note-line">{part}</span>;
    });
  };

  return (
    <div className="app">
      {preloading && <div className="preload-bar">{preloadProgress}</div>}
      <div className="hdr">
        <div className="hdr-top"><span className="hdr-title">Visionaire Hub</span></div>
        <div className="vtabs">
          <button className={`vtab ${view === 'sched' ? 'on' : ''}`} onClick={() => setView('sched')}>Schedule</button>
          <button className={`vtab ${view === 'setup' ? 'on' : ''}`} onClick={() => setView('setup')}>Setup</button>
        </div>
      </div>

      <div className="main">
        {view === 'setup' ? (
          <div className="sc">
            <div className="sc-head">Configuration</div>
            <div className="sc-body">
              <span className="lbl">Google Client ID</span>
              <input className="inp" value={prefs.clientId || ''} onChange={e => setPrefs({...prefs, clientId: e.target.value})} />
              <span className="lbl">Gemini API Key</span>
              <input className="inp" type="password" value={prefs.geminiKey || ''} onChange={e => setPrefs({...prefs, geminiKey: e.target.value})} />
              <button className="btn-p" onClick={signIn}>{prefs.accessToken ? '✓ Connected' : 'Connect Google'}</button>
            </div>
          </div>
        ) : (
          <>
            <div className="sync-bar">
              <div><div className="sync-title">System Ready</div><div className="sync-sub">Sync: {prefs.lastSync || '--'}</div></div>
              <div style={{display: 'flex', gap: '8px'}}>
                <button className="sync-btn" style={{background: '#059669'}} onClick={() => alert('Batch Scan Starting...')}>Prep Drive</button>
                <button className="sync-btn" onClick={syncCalendar}>{loading ? '...' : 'Sync'}</button>
              </div>
            </div>

            <div className="dstrip">
              {[-1, 0, 1, 2, 3, 4, 5].map(i => {
                let d = new Date(); d.setDate(d.getDate() + i); let iso = d.toISOString().slice(0,10);
                return (
                  <div key={i} className={`dchip ${iso === selDate ? 'on' : ''}`} onClick={() => setSelDate(iso)}>
                    <div className="dc-d">{d.toLocaleDateString([], {weekday: 'short'})}</div>
                    <div className="dc-n">{d.getDate()}</div>
                  </div>
                );
              })}
            </div>

            {calEvents.filter(e => e.startDate === selDate).map(ev => {
              const isExp = expandId === ev.id;
              const barClr = ev.hasWin && ev.hasDoor ? 'linear-gradient(var(--navy), var(--emerald))' : (ev.hasDoor ? 'var(--emerald)' : 'var(--navy)');
              return (
                <div key={ev.id} className="cc">
                  <div className="cc-head">
                    <div className="cc-bar" style={{background: barClr}}></div>
                    <div className="cc-body">
                      <div className="cc-top"><div className="cc-name">{ev.customer}</div><div className="cc-time">{ev.startTime}</div></div>
                    </div>
                  </div>
                  {isExp && (
                    <div className="cc-det">
                      <div className="dnotes">
                        <span className="note-line"><span className="note-label">MAPS:</span><a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.address)}`} target="_blank" className="tel-link">{ev.address}</a></span>
                        {cleanNotes(ev.notesHtml)}
                      </div>
                    </div>
                  )}
                  <div className="cc-acts">
                    <button className="ca p" onClick={() => { localStorage.setItem('activeJobId', JSON.stringify(ev.id)); window.location.href='measure.html'; }}>FM Sheet</button>
                    <button className="ca" onClick={() => setExpandId(isExp ? null : ev.id)}>{isExp ? 'Less' : 'More'}</button>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<VisionaireHub />);
</script>
</body>
</html>
