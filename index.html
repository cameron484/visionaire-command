<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command v3.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    :root { --navy: #1a3a5c; --gold: #f59e0b; --bg: #eef1f7; --border: #dde3ec; }
    body { background: var(--bg); font-family: 'Courier New', monospace; overscroll-behavior-y: contain; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
    .line-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .num-pad-btn { background: white; border: 1px solid var(--border); border-radius: 12px; font-weight: 700; font-size: 1.25rem; height: 60px; transition: all 0.1s; }
    .num-pad-btn:active { background: #f1f5f9; transform: scale(0.95); }
    .fraction-btn { background: #1a3a5c; color: white; border-radius: 8px; font-size: 0.8rem; height: 40px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [loading, setLoading] = useState(false);
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');

      const autoLoadContract = async (job) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token || !apiKey) return alert("System not linked!");
        setLoading(true);
        try {
          const query = `name contains '${job.customer}' and mimeType='application/pdf'`;
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { setLoading(false); return alert("No contract found."); }

          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const promptText = `Extract Visionaire contract items. Return JSON: [{"line":"1","itemType":"Window/Door","location":"Room Name","style":"Product Info","contractSize":"Width x Height","color":"In/Out Color","glass":"Glass Info","qty":"1"}]`;
            
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            const items = JSON.parse(text).map(item => ({ ...item, fmWidth: '', fmHeight: '' }));
            
            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items } : j));
            setLoading(false);
          };
        } catch (e) { setLoading(false); console.error(e); }
      };

      const handleKeyPress = (val) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const items = [...job.data];
            let cur = items[activeItemIndex][activeField] || '';
            if (val === 'DEL') cur = cur.slice(0, -1);
            else if (val === 'CLR') cur = '';
            else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
            items[activeItemIndex][activeField] = cur;
            return { ...job, data: items };
          }
          return job;
        }));
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex];

      return (
        <div className="max-w-md mx-auto min-h-screen bg-[#eef1f7] flex flex-col shadow-2xl relative">
          <header className="bg-[#1a3a5c] text-white p-4 sticky top-0 z-50 border-b-4 border-[#f59e0b]">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-sm font-bold tracking-widest">VISIONAIRE</h1>
                <p className="text-[8px] opacity-60 tracking-[0.2em]">FIELD COMMAND</p>
              </div>
              <div className="flex items-center gap-3">
                <span className={`text-[10px] font-bold ${isLinked ? 'text-green-400' : 'text-red-400'}`}>
                  {isLinked ? '●' : '○'}
                </span>
                <button onClick={() => alert("Settings")} className="text-white opacity-60">⚙️</button>
              </div>
            </div>
          </header>

          {!activeJobId ? (
            <main className="p-4 space-y-4">
              <h2 className="text-navy font-bold text-lg uppercase tracking-tight">Active Dispatches</h2>
              {jobs.map(job => (
                <div key={job.id} onClick={() => setActiveJobId(job.id)} className="line-card p-5 flex justify-between items-center cursor-pointer active:scale-95 transition-all border-l-[10px] border-[#1a3a5c]">
                  <div>
                    <h3 className="font-bold text-slate-800 uppercase">{job.customer}</h3>
                    <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase">{job.time}</p>
                  </div>
                  <span className="text-slate-300">➔</span>
                </div>
              ))}
            </main>
          ) : (
            <main className="p-4 flex-1">
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setActiveJobId(null)} className="text-[10px] font-bold text-slate-400 uppercase">◀ BACK</button>
                <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase shadow-lg">Scan PDF 📄</button>
              </div>

              <h3 className="font-bold text-xl uppercase mb-6 border-b-2 border-slate-300 pb-2">{activeJob.customer}</h3>

              {loading ? (
                <div className="p-20 text-center font-bold text-slate-400 animate-pulse uppercase tracking-widest">Processing Data...</div>
              ) : activeJob.data.length === 0 ? (
                <div className="p-12 text-center border-4 border-dashed border-slate-300 rounded-[2rem] text-slate-400 font-bold uppercase text-xs">Tap Scan PDF to load contract</div>
              ) : (
                <div className="space-y-6">
                  {/* The Current Line Unit Information */}
                  <div className="line-card border-t-[8px] border-t-[#1a3a5c]">
                    <div className="bg-slate-100 p-3 flex justify-between items-center border-b">
                       <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Line {activeItemIndex + 1} of {activeJob.data.length}</span>
                       <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase">{currentItem.itemType}</span>
                    </div>
                    <div className="p-4 space-y-2">
                       <h4 className="text-lg font-bold text-navy uppercase leading-tight">{currentItem.location}</h4>
                       <p className="text-[10px] font-bold text-slate-500 uppercase tracking-tight">{currentItem.style} • {currentItem.color}</p>
                       <div className="bg-blue-50 border border-blue-100 p-2 rounded text-[11px] font-bold text-blue-800">
                         📋 CONTRACT SIZE: {currentItem.contractSize}
                       </div>
                    </div>
                  </div>

                  {/* Measurement Inputs */}
                  <div className="grid grid-cols-2 gap-3">
                    <div onClick={() => setActiveField('fmWidth')} className={`p-4 rounded-xl border-4 text-center ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white' : 'border-transparent bg-slate-100'}`}>
                      <label className="text-[9px] font-bold text-slate-400 uppercase block mb-1">Final Width</label>
                      <span className="text-3xl font-bold">{currentItem.fmWidth || '-'}</span>
                    </div>
                    <div onClick={() => setActiveField('fmHeight')} className={`p-4 rounded-xl border-4 text-center ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white' : 'border-transparent bg-slate-100'}`}>
                      <label className="text-[9px] font-bold text-slate-400 uppercase block mb-1">Final Height</label>
                      <span className="text-3xl font-bold">{currentItem.fmHeight || '-'}</span>
                    </div>
                  </div>

                  {/* Keyboard UI */}
                  <div className="bg-slate-200 p-3 rounded-[2rem] shadow-inner">
                    <div className="grid grid-cols-7 gap-1.5 mb-3">
                      {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => (
                        <button key={f} onClick={() => handleKeyPress(f)} className="fraction-btn font-bold">{f}</button>
                      ))}
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      {[1,2,3,4,5,6,7,8,9].map(n => (
                        <button key={n} onClick={() => handleKeyPress(n.toString())} className="num-pad-btn">{n}</button>
                      ))}
                      <button onClick={() => handleKeyPress('CLR')} className="num-pad-btn text-red-500 text-sm">CLR</button>
                      <button onClick={() => handleKeyPress('0')} className="num-pad-btn">0</button>
                      <button onClick={() => handleKeyPress('DEL')} className="num-pad-btn text-orange-500 text-sm">DEL</button>
                    </div>
                  </div>

                  <button 
                    onClick={() => setActiveItemIndex(prev => Math.min(prev + 1, activeJob.data.length - 1))}
                    className="w-full bg-[#1a3a5c] text-white py-5 rounded-[1.5rem] font-bold text-sm uppercase tracking-widest active:scale-95 transition-all shadow-xl"
                  >
                    Save & Next Unit ➔
                  </button>
                </div>
              )}
            </main>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
