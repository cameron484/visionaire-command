<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Hub</title>
  <script>
    window.onerror = function(msg, url, line) {
      alert("Critical Error: " + msg + "\nLine: " + line);
      return false;
    };
  </script>
  <style>
    :root { --navy:#1a3a5c; --amber:#f59e0b; --s100:#f1f5f9; --s200:#e2e8f0; --s500:#64748b; }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200;color:white}
    .hdr-top{display:flex;align-items:center;justify-content:space-between}
    .hdr-title{font-size:1.2rem;font-weight:900;font-style:italic;text-transform:uppercase}
    .acct-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px;font-size:0.6rem;font-weight:700}
    .acct-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
    .acct-dot.off{background:#94a3b8}
    .main{padding:16px}
    .sc{background:white;border-radius:12px;border:1px solid var(--s200);overflow:hidden;margin-bottom:16px}
    .sc-head{background:var(--navy);padding:12px;color:white;font-weight:800;text-transform:uppercase;font-size:0.7rem}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .lbl{font-size:0.6rem;font-weight:800;text-transform:uppercase;color:var(--s500)}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:8px;padding:10px;font-size:0.85rem;outline:none}
    .g-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: white; color: #3c4043; border: 1px solid #dadce0;
      border-radius: 4px; padding: 12px; font-size: 14px; font-weight: 500;
      cursor: pointer; width: 100%; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .g-logo { width: 18px; height: 18px; }
    .btn-p{background:var(--navy);color:white;border:none;border-radius:8px;padding:14px;font-weight:800;text-transform:uppercase;font-size:0.75rem;cursor:pointer}
  </style>
</head>
<body>
<div id="root"></div>

<script>
var STORAGE_KEY = 'vhub_v2';
var GCAL_SCOPE  = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email';

var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
var clientId = prefs.clientId || '';
var geminiKey = prefs.geminiKey || '';
var accessToken = prefs.accessToken || null;
var userEmail = prefs.userEmail || null;

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({clientId, geminiKey, accessToken, userEmail}));
}

// THE NEW "NO-FAIL" TRIGGER
function signIn() {
  clientId = document.getElementById('ci').value;
  geminiKey = document.getElementById('gk').value;
  save();

  if (!clientId) return alert("Please enter and save your Client ID first.");

  const startLogin = () => {
    try {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: GCAL_SCOPE,
        callback: (resp) => {
          if (resp.access_token) {
            accessToken = resp.access_token;
            fetch('https://www.googleapis.com/oauth2/v2/userinfo', {headers:{Authorization:`Bearer ${accessToken}`}})
              .then(r => r.json()).then(info => {
                userEmail = info.email;
                save();
                alert("Connected: " + userEmail);
                location.reload();
              });
          }
        }
      });
      client.requestAccessToken({ prompt: 'select_account' });
    } catch (e) {
      alert("Google library error. Try one more time.");
    }
  };

  // If library isn't loaded yet, load it now and then run login
  if (typeof google === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = startLogin;
    document.head.appendChild(s);
  } else {
    startLogin();
  }
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      <header class="hdr">
        <div class="hdr-top">
          <span class="hdr-title">Visionaire Hub</span>
          <div class="acct-badge">
            <span class="acct-dot ${accessToken ? '' : 'off'}"></span>
            <span>${userEmail || 'Signed Out'}</span>
          </div>
        </div>
      </header>
      
      <main class="main">
        <div class="sc">
          <div class="sc-head">System Config</div>
          <div class="sc-body">
            <span class="lbl">Client ID</span>
            <input class="inp" id="ci" value="${clientId}">
            
            <span class="lbl">Gemini API Key</span>
            <input class="inp" id="gk" type="password" value="${geminiKey}">
            
            <button class="g-btn" onclick="signIn()">
              <img class="g-logo" src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg">
              <span>Sign in with Google</span>
            </button>
            
            ${accessToken ? `<button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:red; border:none; background:none; text-decoration:underline;">Logout</button>` : ''}
          </div>
        </div>
      </main>
    </div>
  `;
}
render();
</script>
</body>
</html>
