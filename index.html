<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command v3.0</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Visionaire">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, sans-serif; } 
    canvas { touch-action: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
  </style>
</head>
<body class="bg-slate-50 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, Fragment } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function SignaturePad({ onSave, onCancel }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
      }, []);
      const getCoordinates = (e) => {
        const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };
      const startDrawing = (e) => { setIsDrawing(true); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); };
      const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
      const stopDrawing = () => setIsDrawing(false);
      const clearPad = () => { const canvas = canvasRef.current; canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); };
      const savePad = () => onSave(canvasRef.current.toDataURL('image/png'));

      return (
        <div className="fixed inset-0 bg-slate-900/80 flex flex-col items-center justify-center z-[100] p-4 backdrop-blur-sm">
          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden border-4 border-[#1a3a5c] flex flex-col md:flex-row">
            <div className="bg-slate-50 p-6 md:w-1/3 border-b md:border-b-0 md:border-r border-slate-200">
                <h3 className="font-black uppercase text-slate-800 text-lg mb-2 tracking-tighter">Final Sign-Off</h3>
                <p className="text-[10px] text-slate-400 font-bold uppercase mb-4 leading-tight">By signing, I confirm all custom dimensions are verified.</p>
                <ul className="text-[9px] text-slate-500 font-bold uppercase space-y-2">
                    <li className="flex gap-2 text-green-600"><span>✓</span> Dimensions Verified</li>
                    <li className="flex gap-2"><span>•</span> Lead times apply</li>
                </ul>
            </div>
            <div className="p-6 md:w-2/3 bg-white">
                <div className="bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300 overflow-hidden relative mb-4">
                    <canvas ref={canvasRef} width={500} height={250} className="w-full h-[200px]"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                    <div className="absolute bottom-2 left-4 text-slate-300 font-black text-2xl select-none pointer-events-none opacity-50 uppercase">X</div>
                </div>
                <div className="flex gap-2">
                    <button onClick={clearPad} className="flex-1 py-3 bg-slate-200 text-slate-600 rounded-xl font-black text-xs uppercase active:scale-95 transition-all">Clear</button>
                    <button onClick={onCancel} className="flex-1 py-3 bg-red-50 text-red-600 rounded-xl font-black text-xs uppercase active:scale-95 transition-all">Cancel</button>
                    <button onClick={savePad} className="flex-[2] py-3 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">Approve Order</button>
                </div>
            </div>
          </div>
        </div>
      );
    }

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [activeItemIndex, setActiveItemIndex] = useState(null);
      const [activeField, setActiveField] = useState('fmWidth');
      const [signingJobId, setSigningJobId] = useState(null);
      const [loading, setLoading] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [showSpecs, setShowSpecs] = useState(null);

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);
      useEffect(() => { if (isLinked) pullCalendarMeasures(); }, [isLinked]);

      const connectGoogle = () => {
        if (!clientId) return alert("Enter Client ID in Settings!");
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => { if(res.access_token) { localStorage.setItem('googleAccessToken', res.access_token); setIsLinked(true); setShowSettings(false); pullCalendarMeasures(); } }
        });
        client.requestAccessToken({ prompt: 'select_account consent' });
      };

      const pullCalendarMeasures = async () => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return;
        setIsSyncing(true);
        try {
          const calListRes = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { Authorization: `Bearer ${token}` } });
          if (!calListRes.ok) { setIsLinked(false); setIsSyncing(false); return; }
          const calListData = await calListRes.json();
          const now = new Date(); now.setHours(0,0,0,0);
          const timeMin = now.toISOString();
          const future = new Date(); future.setDate(now.getDate() + 14); 
          const timeMax = future.toISOString();

          let allFoundJobs = [];
          if (calListData.items) {
              for (const calendar of calListData.items) {
                  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendar.id)}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`, { headers: { Authorization: `Bearer ${token}` } });
                  if (res.ok) {
                      const data = await res.json();
                      if (data.items) {
                          const matched = data.items.filter(e => {
                              const title = (e.summary || '').toLowerCase();
                              return title.includes('final') || title.includes('measure') || title.includes('fm -') || title.includes('fm:') || title.includes('fm ');
                          });
                          matched.forEach(e => {
                              const title = e.summary || '';
                              let name = title;
                              if (title.includes(',')) name = title.split(',').slice(1).join(',').trim();
                              else if (title.includes('-')) name = title.split('-').pop().trim();
                              else if (title.includes(':')) name = title.split(':').pop().trim();

                              let startTime = 'TBD'; let dateRaw = Date.now();
                              if (e.start.dateTime) {
                                  const d = new Date(e.start.dateTime);
                                  startTime = `${d.getMonth()+1}/${d.getDate()} @ ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                                  dateRaw = d.getTime();
                              }
                              let phoneNum = '';
                              if (e.description) {
                                  const phoneMatch = e.description.match(/(\+?1[-.\s]?)?(\()?\d{3}(\))?[-.\s]?\d{3}[-.\s]?\d{4}/);
                                  if (phoneMatch) phoneNum = phoneMatch[0].replace(/[^\d]/g, '');
                              }
                              allFoundJobs.push({ id: Date.now() + Math.random(), customer: name, location: e.location || '', phone: phoneNum, time: startTime, rawDate: dateRaw, data: [], signature: null });
                          });
                      }
                  }
              }
          }
          setJobs(prev => {
              const existingNames = prev.map(j => j.customer.toLowerCase());
              const trulyNew = allFoundJobs.filter(j => !existingNames.includes(j.customer.toLowerCase()));
              return [...prev, ...trulyNew].sort((a, b) => a.rawDate - b.rawDate);
          });
        } catch (e) { console.error(e); }
        setIsSyncing(false);
      };

      const getOrCreateFolder = async (name, parentId, token) => {
          let query = `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
          if (parentId) query += ` and '${parentId}' in parents`;
          const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}`, { headers: { Authorization: `Bearer ${token}` } });
          const data = await res.json();
          if (data.files && data.files.length > 0) return data.files[0].id;
          const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
              method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: parentId ? [parentId] : [] })
          });
          const createData = await createRes.json();
          return createData.id;
      };

      const pushToOfficeDrive = async (job) => {
          const token = localStorage.getItem('googleAccessToken');
          if (!token) return alert("Link Google Account First!");
          setLoading(true);
          try {
              const now = new Date();
              const year = now.getFullYear().toString();
              const month = (now.getMonth() + 1).toString().padStart(2, '0') + " - " + now.toLocaleString('default', { month: 'long' });
              const rootId = await getOrCreateFolder("Visionaire Completed Measures", null, token);
              const yearId = await getOrCreateFolder(year, rootId, token);
              const monthId = await getOrCreateFolder(month, yearId, token);

              const fileName = `MEASURE_${job.customer.replace(/\s+/g, '_')}_${now.toISOString().split('T')[0]}.json`;
              const metadata = { name: fileName, parents: [monthId] };
              const form = new FormData();
              form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
              form.append('file', new Blob([JSON.stringify(job, null, 2)], { type: 'application/json' }));

              const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                  method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
              });
              if (res.ok) alert(`✅ Successfully Saved to: ${year} > ${month}`);
              else alert("Upload failed");
          } catch (e) { alert("Sync Error: " + e.message); }
          setLoading(false);
      };

      const autoLoadContract = async (job) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token || !apiKey) return alert("Ensure API Key and Google Link are set!");
        setLoading(true);
        try {
          const query = `name contains '${job.customer}' and mimeType='application/pdf'`;
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { alert(`PDF not found for: ${job.customer}`); setLoading(false); return; }

          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const promptText = `
              As a technical measurer, extract all line items.
              IDENTIFY BRANDS: Simonton (Reflections/Daylight), Pella (Impervia/Lifestyle), NBP (Crusader/Pro), Precision (Enviroguard), Tuscany (Iron).
              LOGIC: Prioritize 'Unit Size' (e.g. 60 1/16) over Nominal. Separate Storm Doors into own lines.
              Return JSON ONLY: [{"line":"1","itemType":"Window/Entry Door/Storm Door","location":"Room","style":"Brand Style","contractSize":"Width x Height","color":"In/Out","glass":"Details","hardware":"Handing/Locks","extras":"Details","qty":"1"}]
            `;
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            let items = JSON.parse(text);
            
            items.sort((a, b) => {
                const order = { "Window": 1, "Entry Door": 2, "Storm Door": 3 };
                return (order[a.itemType] || 4) - (order[b.itemType] || 4);
            });

            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items.map(i => ({ ...i, fmWidth: '', fmHeight: '' })) } : j));
            setLoading(false);
          };
        } catch (e) { setLoading(false); alert("Extraction failed: " + e.message); }
      };

      const handleKeyPress = (val) => {
          if(activeItemIndex === null) return;
          setJobs(prev => prev.map(job => {
              if(job.id === activeJobId) {
                  const items = [...job.data];
                  let cur = items[activeItemIndex][activeField] || '';
                  if(val === 'DEL') cur = cur.slice(0, -1);
                  else if(val === 'CLR') cur = '';
                  else cur += val;
                  items[activeItemIndex][activeField] = cur;
                  if (val.includes('/') && activeField === 'fmWidth') setActiveField('fmHeight');
                  return { ...job, data: items };
              }
              return job;
          }));
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const completedLines = activeJob ? activeJob.data.filter(i => i.fmWidth && i.fmHeight).length : 0;

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-[#f8fafc] flex flex-col relative industrial-shadow">
          {signingJobId && <SignaturePad onSave={(img) => { setJobs(prev => prev.map(j => j.id === signingJobId ? { ...j, signature: img } : j)); setSigningJobId(null); }} onCancel={() => setSigningJobId(null)} />}

          <header className="p-5 flex justify-between items-center sticky top-0 z-50 shadow-lg border-b-2" style={{ backgroundColor: theme.navy, borderColor: theme.gold }}>
            <div className="flex flex-col cursor-pointer" onClick={() => {setActiveJobId(null); setActiveItemIndex(null);}}>
                <span className="text-[#f59e0b] font-black italic text-2xl uppercase leading-none tracking-tighter">Visionaire</span>
                <span className="text-white font-bold text-[9px] tracking-[0.4em] ml-1 uppercase leading-none mt-1">Field Command</span>
            </div>
            <div className="flex items-center gap-3">
              {isSyncing && <span className="text-white text-[10px] font-black animate-pulse">SYNCING CALENDAR...</span>}
              <button onClick={() => setShowSettings(!showSettings)} className="text-xl p-2 bg-white/10 rounded-full transition-transform active:rotate-90">⚙️</button>
            </div>
          </header>

          {showSettings && (
            <div className="absolute top-[75px] left-0 right-0 z-40 bg-white p-6 shadow-2xl border-b-8 border-[#f59e0b] animate-in slide-in-from-top duration-300">
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">Gemini API Key</label>
                <input type="password" placeholder="Key" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl mb-4 text-xs font-mono" />
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">Google Client ID</label>
                <input type="text" placeholder="Client ID" value={clientId} onChange={e => setClientId(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl mb-6 text-xs font-mono" />
                <button onClick={connectGoogle} className="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition-all mb-2">
                    {isLinked ? '🔄 Refresh Google Link' : 'Link Google Account'}
                </button>
                <button onClick={() => setShowSettings(false)} className="w-full bg-slate-200 text-slate-700 p-4 rounded-xl font-black text-xs uppercase active:scale-95">Close Settings</button>
            </div>
          )}

          <div className="p-4 flex-1">
            {!activeJobId ? (
              <div className="space-y-4">
                  <h2 className="text-slate-800 font-black text-xl uppercase tracking-tight px-1 mb-2">Active Appointments</h2>
                  {jobs.length === 0 && !isSyncing && <div className="p-10 text-center text-slate-300 font-black uppercase text-xs border-4 border-dashed border-slate-200 rounded-[2rem]">No Measures Scheduled</div>}
                  {jobs.map(job => (
                    <div key={job.id} onClick={() => { setActiveJobId(job.id); if(!job.data.length) autoLoadContract(job); }} className="bg-white p-6 rounded-[2.2rem] shadow-sm border-l-[12px] border-[#1a3a5c] flex justify-between items-center cursor-pointer active:scale-[0.98] transition-all">
                        <div className="min-w-0 pr-4">
                            <h3 className="font-black text-slate-800 text-xl leading-none truncate">{job.customer}</h3>
                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-2 tracking-wide truncate">{job.time} • {job.location || 'Location Pending'}</p>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-full text-slate-300 shrink-0">➔</div>
                    </div>
                  ))}
              </div>
            ) : (
              <div className="space-y-4 pb-28">
                <div className="flex justify-between items-end mb-6">
                    <button onClick={() => {setActiveJobId(null); setActiveItemIndex(null);}} className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-1">◀ Return to Dispatch</button>
                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{completedLines} / {activeJob.data.length} Measured</span>
                </div>

                {loading ? (
                    <div className="p-24 flex flex-col items-center justify-center bg-white rounded-[2.5rem] shadow-inner border-2 border-dashed border-slate-200">
                        <div className="w-12 h-12 border-4 border-slate-100 border-t-[#f59e0b] rounded-full animate-spin mb-4"></div>
                        <p className="font-black text-slate-400 uppercase tracking-[0.2em] text-xs">Processing Contract...</p>
                    </div>
                ) : activeJob.data.map((item, index) => {
                  const isDoor = (item.itemType || '').toLowerCase().includes('door');
                  const isFirstDoor = isDoor && (index === 0 || !(activeJob.data[index-1].itemType || '').toLowerCase().includes('door'));

                  return (
                    <Fragment key={index}>
                      {isFirstDoor && (
                        <div className="my-10 flex items-center gap-4 px-2">
                            <div className="h-0.5 flex-1 bg-slate-200"></div>
                            <span className="bg-[#f59e0b] text-white px-5 py-2 rounded-xl font-black uppercase tracking-[0.2em] text-[10px] shadow-md italic">Exterior Entries</span>
                            <div className="h-0.5 flex-1 bg-slate-200"></div>
                        </div>
                      )}

                      <div className={`bg-white rounded-[2.2rem] border-l-[12px] overflow-hidden mb-4 shadow-sm transition-all`} style={{ borderColor: item.fmWidth && item.fmHeight ? '#22c55e' : isDoor ? '#f59e0b' : '#1a3a5c' }}>
                        <div className="p-5 flex justify-between items-center cursor-pointer active:bg-slate-50" onClick={() => {setActiveItemIndex(activeItemIndex === index ? null : index); setActiveField('fmWidth');}}>
                          <div className="flex gap-4 items-center min-w-0 pr-4">
                              <div className="bg-slate-100 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-slate-400 border border-slate-200 shrink-0">{item.line}</div>
                              <div className="min-w-0 pr-2">
                                <div className="flex items-center gap-2 mb-1">
                                    <span className={`text-[8px] px-2 py-0.5 rounded-md font-black uppercase tracking-widest ${isDoor ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>{item.itemType}</span>
                                    <span className="text-[10px] font-black text-slate-300">QTY: {item.qty}</span>
                                </div>
                                <h4 className="font-black text-slate-800 text-md uppercase leading-none truncate">{item.location}</h4>
                                <p className="text-[10px] font-bold text-slate-400 truncate mt-1 tracking-tight">{item.style}</p>
                                <div className="mt-2 inline-flex bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">
                                    <span className="text-[9px] font-black text-blue-800 uppercase tracking-tighter leading-none">Contract: {item.contractSize}</span>
                                </div>
                              </div>
                          </div>
                          <div className={`w-5 h-5 rounded-full shrink-0 border-2 transition-colors ${item.fmWidth && item.fmHeight ? 'bg-green-500 border-green-600 shadow-[0_0_10px_rgba(34,197,94,0.4)]' : 'bg-transparent border-slate-200'}`}></div>
                        </div>

                        {activeItemIndex === index && (
                          <div className="p-6 bg-slate-50 border-t border-slate-100">
                            <button onClick={(e) => { e.stopPropagation(); setShowSpecs(showSpecs === index ? null : index); }} className="w-full py-2.5 mb-4 bg-white border border-slate-200 rounded-xl text-[9px] font-black uppercase text-slate-500 flex justify-between px-4 items-center shadow-sm">
                                <span>{showSpecs === index ? '▼ Hide Specifications' : '▶ View Build Details'}</span>
                                <span className="text-[8px] text-slate-300">{showSpecs === index ? '' : 'Color, Glass, Hardware'}</span>
                            </button>
                            {showSpecs === index && (
                                <div className="p-4 bg-white border border-slate-200 rounded-2xl text-[10px] mb-5 space-y-2 shadow-inner">
                                    <p className="flex justify-between border-b border-slate-50 pb-1"><span className="text-slate-400 font-bold uppercase">Color</span> <span className="font-black text-slate-700">{item.color}</span></p>
                                    <p className="flex justify-between border-b border-slate-50 pb-1"><span className="text-slate-400 font-bold uppercase">Glass Package</span> <span className="font-black text-slate-700">{item.glass}</span></p>
                                    <p className="flex justify-between border-b border-slate-50 pb-1"><span className="text-slate-400 font-bold uppercase">Hardware/Handing</span> <span className="font-black text-slate-700">{item.hardware}</span></p>
                                    <p className="flex flex-col gap-1 pt-1"><span className="text-slate-400 font-bold uppercase">Installation Extras</span> <span className="font-black text-slate-700 leading-tight">{item.extras}</span></p>
                                </div>
                            )}

                            <div className="flex gap-3 mb-5">
                                <div className={`flex-1 p-4 rounded-2xl border-2 text-center transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-md scale-[1.02]' : 'border-transparent bg-slate-200/50'}`} onClick={() => setActiveField('fmWidth')}>
                                    <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Final Width</span>
                                    <span className="text-3xl font-black text-slate-800">{item.fmWidth || '-'}</span>
                                </div>
                                <div className={`flex-1 p-4 rounded-2xl border-2 text-center transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-md scale-[1.02]' : 'border-transparent bg-slate-200/50'}`} onClick={() => setActiveField('fmHeight')}>
                                    <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Final Height</span>
                                    <span className="text-3xl font-black text-slate-800">{item.fmHeight || '-'}</span>
                                </div>
                            </div>

                            <div className="bg-slate-300 p-3 rounded-[2.5rem] mb-5 shadow-inner">
                                <div className="grid grid-cols-7 gap-1.5 mb-3">
                                    {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => (
                                        <button key={f} onClick={() => handleKeyPress(' '+f)} className="bg-[#1a3a5c] text-white py-3 rounded-xl font-black text-[10px] shadow-sm active:scale-95 transition-all">{f}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {[1,2,3,4,5,6,7,8,9].map(n => (
                                        <button key={n} onClick={() => handleKeyPress(n.toString())} className="bg-white p-4 rounded-2xl font-black text-2xl shadow-sm text-slate-700 active:bg-slate-100 active:scale-95 transition-all">{n}</button>
                                    ))}
                                    <button onClick={() => handleKeyPress('CLR')} className="bg-white p-4 rounded-2xl font-black text-[10px] text-red-500 uppercase active:bg-red-50">Clear</button>
                                    <button onClick={() => handleKeyPress('0')} className="bg-white p-4 rounded-2xl font-black text-2xl text-slate-700">0</button>
                                    <button onClick={() => handleKeyPress('DEL')} className="bg-white p-4 rounded-2xl font-black text-xl text-orange-500 active:bg-orange-50">⌫</button>
                                </div>
                            </div>
                            <button onClick={() => setActiveItemIndex(index < activeJob.data.length - 1 ? index + 1 : null)} className="w-full p-5 bg-[#1a3a5c] text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">Save & Continue ➔</button>
                          </div>
                        )}
                      </div>
                    </Fragment>
                  );
                })}

                {!loading && activeJob.data.length > 0 && (
                    <div className="mt-12 px-2">
                        {activeJob.signature ? (
                            <button onClick={() => pushToOfficeDrive(activeJob)} className="w-full py-6 bg-blue-600 text-white rounded-[2.5rem] font-black text-sm uppercase shadow-2xl tracking-[0.2em] active:scale-95 transition-all">☁️ Sync Final Data to Drive</button>
                        ) : (
                            <button onClick={() => setSigningJobId(activeJob.id)} className="w-full py-7 bg-[#f59e0b] text-white rounded-[2.8rem] font-black text-md uppercase shadow-2xl tracking-[0.3em] active:scale-95 transition-all border-b-8 border-amber-600">✍️ Capture Tech Sign-Off</button>
                        )}
                    </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
