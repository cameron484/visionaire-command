<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command v3.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, sans-serif; } 
    canvas { touch-action: none; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
  </style>
</head>
<body class="bg-[#f1f5f9]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, Fragment } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [activeItemIndex, setActiveItemIndex] = useState(null);
      const [activeField, setActiveField] = useState('fmWidth');
      const [loading, setLoading] = useState(false);
      const [showSpecs, setShowSpecs] = useState(null);

      const autoLoadContract = async (job) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token || !apiKey) return alert("Link Google & Set API Key in Settings!");
        setLoading(false); setLoading(true);
        try {
          const query = `name contains '${job.customer}' and mimeType='application/pdf'`;
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { alert("Contract not found."); setLoading(false); return; }

          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            
            // SMART PROMPT: Prevents "Text Bleeding" by strictly separating location from technical work scopes
            const promptText = `
              Extract Window/Door items from this Visionaire contract.
              STRICT RULE: The 'location' field MUST ONLY contain the room name (e.g. 'Front Entry', 'Master Bed')[cite: 5, 18].
              STRICT RULE: Put all technical scopes (foam, caulk, sill pans, removal instructions) into 'extras'.
              
              BRANDS: Simonton (Reflections/Daylight), Pella (Impervia/Lifestyle), NBP (Crusader), Precision (Enviroguard), Tuscany (Iron).
              SIZE: Use 'Unit Size' (e.g. 60 1/16) as 'contractSize'[cite: 25].
              
              Return JSON ONLY: [{"line":"1","itemType":"Window/Entry Door/Storm Door","location":"","style":"","contractSize":"","color":"","glass":"","hardware":"","extras":"","qty":"1"}]
            `;

            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            let items = JSON.parse(text);
            
            items.sort((a, b) => {
                const order = { "Window": 1, "Entry Door": 2, "Storm Door": 3 };
                return (order[a.itemType] || 4) - (order[b.itemType] || 4);
            });

            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items.map(i => ({ ...i, fmWidth: '', fmHeight: '' })) } : j));
            setLoading(false);
          };
        } catch (e) { setLoading(false); console.error(e); }
      };

      const handleKeyPress = (val) => {
          if(activeItemIndex === null) return;
          setJobs(prev => prev.map(job => {
              if(job.id === activeJobId) {
                  const items = [...job.data];
                  let cur = items[activeItemIndex][activeField] || '';
                  if(val === 'DEL') cur = cur.slice(0, -1);
                  else if(val === 'CLR') cur = '';
                  else cur += val;
                  items[activeItemIndex][activeField] = cur;
                  if (val.includes('/') && activeField === 'fmWidth') setActiveField('fmHeight');
                  return { ...job, data: items };
              }
              return job;
          }));
      };

      const activeJob = jobs.find(j => j.id === activeJobId);

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-slate-100 flex flex-col industrial-shadow">
          <header className="p-5 flex justify-between items-center sticky top-0 z-[60] shadow-lg border-b-2" style={{ backgroundColor: theme.navy, borderColor: theme.gold }}>
            <div className="flex flex-col cursor-pointer" onClick={() => setActiveJobId(null)}>
                <span className="text-[#f59e0b] font-black italic text-2xl uppercase leading-none tracking-tighter">Visionaire</span>
                <span className="text-white font-bold text-[9px] tracking-[0.4em] ml-1 uppercase leading-none mt-1">Field Command</span>
            </div>
            <button onClick={() => alert("Settings")} className="text-white bg-white/10 p-2 rounded-full">⚙️</button>
          </header>

          <div className="p-4 flex-1">
            {!activeJobId ? (
              <div className="space-y-4">
                  <h2 className="text-slate-800 font-black text-xl uppercase px-1">Dispatch</h2>
                  {jobs.map(job => (
                    <div key={job.id} onClick={() => { setActiveJobId(job.id); if(!job.data.length) autoLoadContract(job); }} className="bg-white p-6 rounded-[2rem] shadow-sm border-l-[12px] border-[#1a3a5c] flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                        <div className="min-w-0 pr-4">
                            <h3 className="font-black text-slate-800 text-xl leading-none truncate">{job.customer}</h3>
                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-2 tracking-wide truncate">{job.time} • {job.location || 'PENDING'}</p>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-full text-slate-300">➔</div>
                    </div>
                  ))}
              </div>
            ) : (
              <div className="space-y-4 pb-28">
                <button onClick={() => setActiveJobId(null)} className="text-[10px] font-black uppercase text-slate-400 mb-4">◀ Back to Dispatch</button>
                
                {loading ? (
                    <div className="p-24 text-center bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <div className="w-10 h-10 border-4 border-slate-100 border-t-[#f59e0b] rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-black text-slate-400 uppercase text-xs tracking-widest">Parsing Specs...</p>
                    </div>
                ) : activeJob.data.map((item, index) => {
                  const isDoor = (item.itemType || '').toLowerCase().includes('door');
                  const isFirstDoor = isDoor && (index === 0 || !(activeJob.data[index-1].itemType || '').toLowerCase().includes('door'));

                  return (
                    <Fragment key={index}>
                      {isFirstDoor && (
                        <div className="my-10 flex items-center gap-4 px-2">
                            <div className="h-0.5 flex-1 bg-slate-200"></div>
                            <span className="bg-[#f59e0b] text-white px-5 py-2 rounded-xl font-black uppercase text-[10px] shadow-md italic">Door Units</span>
                            <div className="h-0.5 flex-1 bg-slate-200"></div>
                        </div>
                      )}

                      <div className={`bg-white rounded-[2.2rem] border-l-[12px] overflow-hidden mb-4 shadow-sm relative`} style={{ borderColor: item.fmWidth && item.fmHeight ? '#22c55e' : isDoor ? '#f59e0b' : '#1a3a5c' }}>
                        <div className="p-5 flex justify-between items-center cursor-pointer active:bg-slate-50" onClick={() => {setActiveItemIndex(activeItemIndex === index ? null : index); setActiveField('fmWidth');}}>
                          <div className="flex gap-4 items-center min-w-0 pr-4">
                              <div className="bg-slate-100 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-slate-400 shrink-0">{item.line}</div>
                              <div className="min-w-0 pr-2">
                                <div className="flex items-center gap-2 mb-1">
                                    <span className={`text-[8px] px-2 py-0.5 rounded-md font-black uppercase tracking-widest ${isDoor ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>{item.itemType}</span>
                                    <span className="text-[10px] font-black text-slate-300">QTY: {item.qty}</span>
                                </div>
                                {/* FIXED: Title truncated to prevent overlap */}
                                <h4 className="font-black text-slate-800 text-md uppercase leading-none truncate max-w-[220px]">{item.location}</h4>
                                <p className="text-[10px] font-bold text-slate-400 truncate mt-1">{item.style}</p>
                                <div className="mt-2 inline-flex bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">
                                    <span className="text-[9px] font-black text-blue-800 uppercase leading-none">Order Size: {item.contractSize}</span>
                                </div>
                              </div>
                          </div>
                          <div className={`w-5 h-5 rounded-full shrink-0 border-2 ${item.fmWidth && item.fmHeight ? 'bg-green-500 border-green-600 shadow-lg shadow-green-200' : 'bg-transparent border-slate-200'}`}></div>
                        </div>

                        {activeItemIndex === index && (
                          <div className="p-6 bg-white border-t border-slate-100 relative z-20">
                            {/* Specs Hidden by default to keep screen clear */}
                            <button onClick={(e) => { e.stopPropagation(); setShowSpecs(showSpecs === index ? null : index); }} className="w-full py-2.5 mb-4 bg-slate-50 border border-slate-200 rounded-xl text-[9px] font-black uppercase text-slate-500 flex justify-between px-4 items-center">
                                <span>{showSpecs === index ? '▼ Hide Detailed Specs' : '▶ View Color, Glass, Extras'}</span>
                            </button>
                            {showSpecs === index && (
                                <div className="p-4 bg-white border border-slate-100 rounded-2xl text-[10px] mb-5 space-y-1 shadow-inner leading-relaxed">
                                    <p><span className="text-slate-400 font-bold uppercase">Color:</span> {item.color}</p>
                                    <p><span className="text-slate-400 font-bold uppercase">Glass:</span> {item.glass}</p>
                                    <p><span className="text-slate-400 font-bold uppercase">Hardware:</span> {item.hardware}</p>
                                    <p className="text-blue-600 pt-2 border-t mt-2"><span className="text-slate-400 font-bold uppercase">Work Scope:</span> {item.extras}</p>
                                </div>
                            )}

                            <div className="flex gap-3 mb-5">
                                <div className={`flex-1 p-4 rounded-2xl border-4 text-center transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-md' : 'border-transparent bg-slate-100'}`} onClick={() => setActiveField('fmWidth')}>
                                    <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Final Width</span>
                                    <span className="text-3xl font-black text-slate-800">{item.fmWidth || '-'}</span>
                                </div>
                                <div className={`flex-1 p-4 rounded-2xl border-4 text-center transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-md' : 'border-transparent bg-slate-100'}`} onClick={() => setActiveField('fmHeight')}>
                                    <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Final Height</span>
                                    <span className="text-3xl font-black text-slate-800">{item.fmHeight || '-'}</span>
                                </div>
                            </div>

                            {/* FIXED: Input Pad has solid white background and z-index to block text below */}
                            <div className="bg-slate-200 p-3 rounded-[2.8rem] mb-5 shadow-inner relative z-30">
                                <div className="grid grid-cols-7 gap-1.5 mb-3">
                                    {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => (
                                        <button key={f} onClick={() => handleKeyPress(' '+f)} className="bg-[#1a3a5c] text-white py-3 rounded-xl font-black text-[10px] shadow-sm active:scale-95 transition-all">{f}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {[1,2,3,4,5,6,7,8,9].map(n => (
                                        <button key={n} onClick={() => handleKeyPress(n.toString())} className="bg-white p-4 rounded-2xl font-black text-2xl shadow-sm text-slate-700 active:bg-slate-50 active:scale-95 transition-all">{n}</button>
                                    ))}
                                    <button onClick={() => handleKeyPress('CLR')} className="bg-white p-4 rounded-2xl font-black text-[10px] text-red-500 uppercase">Clear</button>
                                    <button onClick={() => handleKeyPress('0')} className="bg-white p-4 rounded-2xl font-black text-2xl text-slate-700">0</button>
                                    <button onClick={() => handleKeyPress('DEL')} className="bg-white p-4 rounded-2xl font-black text-xl text-orange-500">⌫</button>
                                </div>
                            </div>
                            <button onClick={() => setActiveItemIndex(index < activeJob.data.length - 1 ? index + 1 : null)} className="w-full p-5 bg-[#1a3a5c] text-white rounded-[2.2rem] font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all">Save & Continue ➔</button>
                          </div>
                        )}
                      </div>
                    </Fragment>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
