<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command v3.6</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, sans-serif; background: #f8fafc; }
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [loading, setLoading] = useState(false);
      const [activeItemIndex, setActiveItemIndex] = useState(0);
      const [activeField, setActiveField] = useState('fmWidth');

      // NEW FUNCTION: Opens the specific PDF in a new tab
      const openContractInDrive = async (customerName) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return alert("Link Google Account first!");
        try {
          const query = `name contains '${customerName}' and mimeType='application/pdf'`;
          const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.files && data.files.length > 0) {
            window.open(`https://drive.google.com/file/d/${data.files[0].id}/view`, '_blank');
          } else {
            alert("Could not find PDF in Drive for " + customerName);
          }
        } catch (e) { alert("Drive search failed."); }
      };

      const autoLoadContract = async (job) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token || !apiKey) return alert("System not fully configured.");
        setLoading(true);
        try {
          const query = `name contains '${job.customer}' and mimeType='application/pdf'`;
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();
          if (!driveData.files?.length) { setLoading(false); return alert("PDF not found."); }
          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveData.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const promptText = `Extract items. Header: Location. Specs: Color, Hardware, Size. JSON: [{"line":"1","itemType":"Window/Door","location":"","style":"","contractSize":"","color":"","hardware":"","extras":"","qty":"1"}]`;
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] })
            });
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            const items = JSON.parse(text).map(i => ({ ...i, fmWidth: '', fmHeight: '' }));
            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items } : j));
            setLoading(false);
          };
        } catch (e) { setLoading(false); }
      };

      const handleKeyPress = (val) => {
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const items = [...job.data];
            let cur = items[activeItemIndex][activeField] || '';
            if (val === 'DEL') cur = cur.slice(0, -1);
            else if (val === 'CLR') cur = '';
            else cur += (cur.length > 0 && val.includes('/') ? ' ' : '') + val;
            items[activeItemIndex][activeField] = cur;
            return { ...job, data: items };
          }
          return job;
        }));
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const currentItem = activeJob?.data?.[activeItemIndex];

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-slate-50 flex flex-col industrial-shadow relative">
          <header className="bg-[#1a3a5c] text-white p-5 sticky top-0 z-[60] border-b-4 border-[#f59e0b] shadow-lg">
            <div className="flex justify-between items-center">
              <div onClick={() => setActiveJobId(null)} className="cursor-pointer">
                <h1 className="text-[#f59e0b] font-black italic text-2xl uppercase tracking-tighter leading-none">Visionaire</h1>
                <p className="text-white font-bold text-[9px] tracking-[0.4em] uppercase leading-none mt-1">{isLinked ? '● CONNECTED' : '○ OFFLINE'}</p>
              </div>
              <button onClick={() => alert("Settings")} className="bg-white/10 p-2 rounded-full">⚙️</button>
            </div>
          </header>

          <div className="p-4 flex-1">
            {!activeJobId ? (
              <div className="space-y-4">
                <h2 className="text-slate-800 font-black text-xl uppercase px-1">Appointments</h2>
                {jobs.map(job => (
                  <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-white p-6 rounded-[2rem] shadow-sm border-l-[10px] border-[#1a3a5c] flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div>
                      <h3 className="font-black text-slate-800 text-lg uppercase leading-tight">{job.customer}</h3>
                      <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-wide">{job.time}</p>
                    </div>
                    <span className="text-slate-300 font-bold">➔</span>
                  </div>
                ))}
              </div>
            ) : (
              <div className="space-y-4 pb-28">
                <div className="flex justify-between items-center mb-4">
                  <button onClick={() => setActiveJobId(null)} className="text-[10px] font-black text-slate-400 uppercase tracking-widest">◀ BACK</button>
                  {/* THE QUICK VIEW BUTTON */}
                  <button onClick={() => openContractInDrive(activeJob.customer)} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all flex items-center gap-2">
                    View Original Contract 📄
                  </button>
                </div>

                <div className="border-b-4 border-slate-200 pb-2 mb-6">
                  <h3 className="font-black text-2xl uppercase text-slate-800">{activeJob.customer}</h3>
                </div>

                {loading ? <div className="p-24 text-center font-black text-slate-400 animate-pulse uppercase tracking-widest">Loading Items...</div> : 
                  activeJob.data.length === 0 ? (
                    <div className="p-16 text-center border-4 border-dashed border-slate-200 rounded-[2.5rem] bg-white">
                      <p className="text-slate-400 font-black uppercase text-xs mb-4">No data loaded</p>
                      <button onClick={() => autoLoadContract(activeJob)} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Scan Agreement</button>
                    </div>
                  ) : (
                  <div className="space-y-6">
                    <div className="bg-white rounded-[2rem] border-l-[12px] border-[#1a3a5c] shadow-md overflow-hidden">
                      <div className="p-5">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest">{currentItem.itemType}</span>
                          <span className="text-[10px] font-black text-slate-300 uppercase">Unit {activeItemIndex+1} of {activeJob.data.length}</span>
                        </div>
                        <h4 className="font-black text-slate-800 text-lg uppercase leading-tight mb-2">{currentItem.location}</h4>
                        <div className="bg-blue-50 border border-blue-100 p-3 rounded-xl text-blue-800 font-black text-xs inline-block">
                          CONTRACT: {currentItem.contractSize}
                        </div>
                        <div className="mt-4 p-4 bg-slate-50 rounded-2xl text-[10px] space-y-1 border border-slate-100">
                          <p><span className="text-slate-400 font-bold uppercase">Color:</span> <span className="font-black text-slate-700">{currentItem.color}</span></p>
                          <p><span className="text-slate-400 font-bold uppercase">Hardware:</span> <span className="font-black text-slate-700">{currentItem.hardware}</span></p>
                          <p className="pt-2 text-blue-600 font-bold italic leading-relaxed">{currentItem.extras}</p>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div onClick={() => setActiveField('fmWidth')} className={`p-5 rounded-2xl border-4 text-center transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-lg' : 'border-transparent bg-slate-100'}`}>
                        <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Final Width</label>
                        <span className="text-4xl font-black text-slate-800">{currentItem.fmWidth || '-'}</span>
                      </div>
                      <div onClick={() => setActiveField('fmHeight')} className={`p-5 rounded-2xl border-4 text-center transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-lg' : 'border-transparent bg-slate-100'}`}>
                        <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Final Height</label>
                        <span className="text-4xl font-black text-slate-800">{currentItem.fmHeight || '-'}</span>
                      </div>
                    </div>

                    <div className="bg-slate-200 p-4 rounded-[2.5rem] shadow-inner relative z-20">
                      <div className="grid grid-cols-7 gap-1.5 mb-3">
                        {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => (
                          <button key={f} onClick={() => handleKeyPress(f)} className="bg-[#1a3a5c] text-white py-3 rounded-xl font-black text-[10px] active:scale-95 shadow-sm transition-all">{f}</button>
                        ))}
                      </div>
                      <div className="grid grid-cols-3 gap-2">
                        {[1,2,3,4,5,6,7,8,9].map(n => (
                          <button key={n} onClick={() => handleKeyPress(n.toString())} className="bg-white p-5 rounded-2xl font-black text-2xl text-slate-700 active:scale-95 shadow-sm transition-all">{n}</button>
                        ))}
                        <button onClick={() => handleKeyPress('CLR')} className="bg-white p-5 rounded-2xl font-black text-xs text-red-500 uppercase active:scale-95 shadow-sm transition-all">CLR</button>
                        <button onClick={() => handleKeyPress('0')} className="bg-white p-5 rounded-2xl font-black text-2xl text-slate-700 active:scale-95 shadow-sm transition-all">0</button>
                        <button onClick={() => handleKeyPress('DEL')} className="bg-white p-5 rounded-2xl font-black text-xs text-orange-500 uppercase active:scale-95 shadow-sm transition-all">DEL</button>
                      </div>
                    </div>

                    <button 
                      onClick={() => setActiveItemIndex(prev => Math.min(prev + 1, activeJob.data.length - 1))}
                      className="w-full bg-[#1a3a5c] text-white py-6 rounded-[2.2rem] font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-2xl"
                    >
                      Save & Continue ➔
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
