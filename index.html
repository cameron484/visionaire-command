<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Hub — Field Command</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    window.onerror = function(msg, url, line) {
      alert("Hub Error: " + msg + "\nLine: " + line);
      return false;
    };

    // Google Redirect Callback
    window.handleCredentialResponse = (response) => {
      const payload = JSON.parse(window.atob(response.credential.split('.')[1]));
      let p = JSON.parse(localStorage.getItem('vhub_v2')) || {};
      p.userEmail = payload.email;
      localStorage.setItem('vhub_v2', JSON.stringify(p));
      alert("Welcome " + payload.email + ". Opening Sync...");
      signIn(); 
    };
  </script>
  <style>
    :root {
      --navy:#1a3a5c; --navy-mid:#2d5a8e; --amber:#f59e0b;
      --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s500:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain;touch-action:manipulation}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200;color:white}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-title{font-size:1.2rem;font-weight:900;font-style:italic;text-transform:uppercase}
    .acct-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px}
    .acct-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
    .acct-dot.off{background:#94a3b8}
    .acct-txt{font-size:0.6rem;font-weight:700}

    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:12px 4px;font-size:0.65rem;font-weight:800;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}

    .main{padding:16px}
    .sc{background:white;border-radius:14px;border:1.5px solid var(--s200);overflow:hidden;margin-bottom:16px}
    .sc-head{background:var(--navy);padding:12px;color:white;font-weight:900;text-transform:uppercase;font-size:0.7rem}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .lbl{font-size:0.6rem;font-weight:800;text-transform:uppercase;color:var(--s500)}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:8px;padding:10px;font-size:0.85rem;outline:none}
    .btn-p{background:var(--navy);color:white;border:none;border-radius:8px;padding:14px;font-weight:800;text-transform:uppercase;font-size:0.75rem;cursor:pointer}
    
    .sync-bar{background:#f8fafc;border:1px solid var(--s200);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:6px;padding:8px 12px;font-size:0.65rem;font-weight:800;text-transform:uppercase}
    
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .cc-head{display:flex;align-items:center;padding:12px;cursor:pointer}
    .cc-bar{width:6px;height:30px;border-radius:3px;margin-right:12px}
    .cc-name{font-size:1rem;font-weight:900;color:var(--navy);text-transform:uppercase;flex:1}
    .cc-time{font-size:0.6rem;font-weight:800;background:var(--navy);color:white;padding:3px 7px;border-radius:4px}
    .cc-det{padding:12px;background:var(--s50);border-top:1px solid var(--s200);font-size:0.75rem}
    .rescan-box{margin-top:10px; padding-top:10px; border-top:1px dashed #ccc; display:flex; gap:5px;}
    .ready-badge { background: #dcfce7; color: #166534; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; border: 1px solid #86efac; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
var STORAGE_KEY = 'vhub_v2';
var GCAL_SCOPE  = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email';

var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
var clientId = prefs.clientId || '';
var geminiKey = prefs.geminiKey || '';
var accessToken = prefs.accessToken || null;
var userEmail = prefs.userEmail || null;
var view = accessToken ? 'sched' : 'setup';
var calEvents = prefs.calEvents || [];

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({clientId, geminiKey, accessToken, userEmail, calEvents}));
}

// BULLETPROOF REDIRECT LOGIN
function signIn() {
  if (!clientId) return;
  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId, scope: GCAL_SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        accessToken = resp.access_token;
        save();
        location.reload(); 
      }
    }
  });
  client.requestAccessToken({prompt: ''});
}

function renderGoogleBtn() {
  if (!clientId || accessToken) return;
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({
      client_id: clientId,
      callback: window.handleCredentialResponse,
      ux_mode: "redirect",
      login_uri: window.location.href
    });
    google.accounts.id.renderButton(document.getElementById("google-btn-slot"), { theme: "outline", size: "large", width: "100%" });
  } else {
    setTimeout(renderGoogleBtn, 500);
  }
}

// ⚡ NUMBER 4: HARDENED CONTRACT FINDER (Ph2, REVISED, Signed Priority)
async function processSingleJob(ev, manualKeyword = null) {
  let token = accessToken;
  if (!token) return;

  // Extract search target (Last Name logic from Screenshot 22)
  let cleanName = ev.customer.replace(/[^a-zA-Z\s]/g, ' ').trim();
  let nameParts = cleanName.split(/\s+/);
  let searchTarget = manualKeyword || (nameParts.length > 1 ? nameParts[0] : cleanName);

  // Hardened Query: Looking for Last Name + 2026 + (Ph 2, Signed, REVISED, or Agreement)
  const q = `mimeType='application/pdf' and name contains '${searchTarget}' and name contains '2026' and (name contains 'Signed' or name contains 'Agreement' or name contains 'REVISED' or name contains 'Ph 2')`;
  
  try {
    const dRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&orderBy=name desc, createdTime desc&pageSize=10&includeItemsFromAllDrives=true&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
    const dData = await dRes.json();
    
    // Priority Picker: If a Ph 2 file exists, pick it first. Otherwise, pick the most recent REVISED or Signed.
    let bestFile = dData.files?.find(f => f.name.toLowerCase().includes('ph 2')) || 
                   dData.files?.find(f => f.name.toLowerCase().includes('revised')) || 
                   dData.files?.[0];

    if (!bestFile) return alert("No 2026 Contract found for " + searchTarget);

    const fileId = bestFile.id;
    const contractLink = `https://drive.google.com/file/d/${fileId}/view`;

    // Download file
    const fRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&supportsAllDrives=true`, { headers: { Authorization: `Bearer ${token}` } });
    const blob = await fRes.blob();
    const base64 = await new Promise(r => { const rd = new FileReader(); rd.onloadend = () => r(rd.result.split(',')[1]); rd.readAsDataURL(blob); });

    // Analyize with Gemini-2.5-Flash
    const promptText = `Analyze project for Visionaire Windows. Return ONLY JSON: {"summary":"...","repairNotes":"...","items":[]}`;
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }] }) });
    const result = await res.json();
    const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
    const parsed = JSON.parse(text);

    // Save
    let jobs = JSON.parse(localStorage.getItem('visionaireJobs')) || [];
    const jobData = { id: ev.id, customer: ev.customer, data: parsed.items.map(i=>({...i, fmWidth:'', fmHeight:''})), summary: parsed.summary, repairNotes: parsed.repairNotes, contractLink: contractLink };
    
    const idx = jobs.findIndex(j => j.id === ev.id);
    if (idx > -1) jobs[idx] = jobData; else jobs.unshift(jobData);
    localStorage.setItem('visionaireJobs', JSON.stringify(jobs));
    alert("Scanned: " + bestFile.name);
    render();
  } catch (err) { alert("Scan failed."); }
}

function handleManualFM() {
  var n = prompt("Customer Name:");
  if(n){
    var j = JSON.parse(localStorage.getItem('visionaireJobs')) || [];
    var id = Date.now();
    j.unshift({id:id, customer:n, data:[]});
    localStorage.setItem('visionaireJobs', JSON.stringify(j));
    localStorage.setItem('activeJobId', JSON.stringify(id));
    window.location.href='./measure.html';
  }
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'app';
  
  wrap.innerHTML = `
    <header class="hdr">
      <div class="hdr-top">
        <span class="hdr-title">Visionaire Hub</span>
        <div class="acct-badge">
          <div class="acct-dot ${accessToken ? '' : 'off'}"></div>
          <span class="acct-txt">${userEmail || 'Signed Out'}</span>
        </div>
      </div>
      <div class="vtabs">
        <button class="vtab ${window.view==='sched'?'on':''}" onclick="window.view='sched'; render();">Schedule</button>
        <button class="vtab" onclick="handleManualFM()">Manual FM</button>
        <button class="vtab ${window.view==='setup'?'on':''}" onclick="window.view='setup'; render();">Setup</button>
      </div>
    </header>
    <main class="main" id="main-content"></main>
  `;
  root.appendChild(wrap);
  const main = document.getElementById('main-content');

  if (window.view === 'setup') {
    main.innerHTML = `
      <div class="sc">
        <div class="sc-head">Configuration</div>
        <div class="sc-body">
          <span class="lbl">Client ID</span>
          <input class="inp" id="ci" value="${clientId}">
          <span class="lbl">Gemini Key</span>
          <input class="inp" id="gk" type="password" value="${geminiKey}">
          <button class="btn-p" onclick="window.clientId=document.getElementById('ci').value; window.geminiKey=document.getElementById('gk').value; save(); location.reload();">Save & Enable Login</button>
          <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;"><div id="google-btn-slot"></div></div>
        </div>
      </div>
    `;
    renderGoogleBtn();
  } else {
    main.innerHTML = `<div class="sync-bar"><div><div style="font-size:0.7rem; font-weight:800;">Google Hub</div></div><button class="sync-btn" onclick="signIn()">Sync Cal</button></div>`;
    
    // Example Customer Card with Rescan Logic
    let jobs = JSON.parse(localStorage.getItem('visionaireJobs')) || [];
    if(jobs.length === 0) {
      main.innerHTML += `<div class="empty-state">No jobs found. Use Manual FM or Sync.</div>`;
    } else {
      jobs.forEach(job => {
        const card = document.createElement('div'); card.className = 'cc';
        const isReady = job.data?.length > 0;
        card.innerHTML = `
          <div class="cc-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
            <div class="cc-bar" style="background:var(--navy)"></div>
            <div class="cc-name">${job.customer} ${isReady ? '<span class="ready-badge">READY</span>' : ''}</div>
          </div>
          <div class="cc-det" style="display:none">
            <div>${job.summary || 'No scan data yet.'}</div>
            <div class="rescan-box">
              <input class="inp" style="padding:5px; font-size:10px;" id="ref-${job.id}" placeholder="Specific keyword...">
              <button class="sync-btn" style="font-size:8px;" onclick="processSingleJob({id:'${job.id}', customer:'${job.customer}'}, document.getElementById('ref-${job.id}').value)">Scan Ph2 / REVISED</button>
            </div>
            <button class="btn-p" style="width:100%; margin-top:10px; padding:10px;" onclick="localStorage.setItem('activeJobId', JSON.stringify('${job.id}')); window.location.href='./measure.html';">Open FM Sheet</button>
          </div>
        `;
        main.appendChild(card);
      });
    }
  }
}

window.view = view;
window.onload = render;
</script>
</body>
</html>
