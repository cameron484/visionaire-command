<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; } 
    .num-btn { @apply bg-white p-5 rounded-2xl font-black text-3xl shadow-sm active:bg-slate-200 active:scale-90 transition-all border-b-4 border-slate-300 flex items-center justify-center; }
    .frac-btn { @apply bg-[#1a3a5c] text-white p-4 rounded-xl font-black text-xl active:scale-90 transition-all shadow-md flex items-center justify-center border-b-4 border-blue-900; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [showSettings, setShowSettings] = useState(false);
      const [loading, setLoading] = useState(false);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const connectGoogle = () => {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => {
            if (res.access_token) {
              localStorage.setItem('googleAccessToken', res.access_token);
              setIsLinked(true);
              setShowSettings(false);
            }
          },
        });
        client.requestAccessToken({ prompt: 'select_account' });
      };

      // --- AUTOMATIC CALENDAR & DRIVE SYNC ---
      const syncDailySchedule = async () => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return alert("Please Link Account in Settings first.");
        
        setLoading(true);
        try {
          const now = new Date().toISOString();
          // 1. Search Calendar for "Final Measure" events
          const calRes = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&q=Final Measure`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const calData = await calRes.json();
          
          if (!calData.items || calData.items.length === 0) {
            alert("No 'Final Measure' appointments found on your calendar for today.");
            setLoading(false);
            return;
          }

          // 2. For the first found event, try to find a matching PDF on Drive
          const customerName = calData.items[0].summary.replace('Final Measure - ', '').trim();
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains '${customerName}' and mimeType='application/pdf'`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const driveData = await driveRes.json();

          if (driveData.files && driveData.files.length > 0) {
            alert(`Found contract for ${customerName}. AI is reading it now...`);
            // Here we would fetch the file and send to Gemini (Requires file:get)
            // For now, use the manual "Scan" button if the PDF is on your device
          } else {
            alert(`Found appointment for ${customerName}, but couldn't find a PDF with that name in your Drive.`);
          }
        } catch (e) {
          alert("Sync Error: " + e.message);
        }
        setLoading(false);
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white shadow-2xl pb-10">
          <header className="p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg border-b-2 border-[#f59e0b]" style={{ backgroundColor: theme.navy }}>
            <div className="flex flex-col cursor-pointer" onClick={() => setShowSettings(false)}>
                <span className="text-[#f59e0b] font-black italic text-xl uppercase leading-none">Visionaire</span>
                <span className="text-white font-bold text-[8px] tracking-[0.4em] ml-1 uppercase">Field Command</span>
            </div>
            <button onClick={() => setShowSettings(!showSettings)} className="text-2xl p-2 bg-white/10 rounded-full">⚙️</button>
          </header>

          <div className="p-4">
            {isLinked && (
              <button 
                onClick={syncDailySchedule}
                className="w-full mb-6 p-6 bg-blue-600 text-white rounded-[2rem] font-black text-sm uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3"
              >
                <span className="text-xl">🔄</span> Sync Today's Schedule
              </button>
            )}

            {showSettings && (
              <div className="p-6 bg-white border-b-8 border-[#f59e0b] mb-4">
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Google Client ID</label>
                <input type="text" value={clientId} onChange={(e) => setClientId(e.target.value)} className="w-full p-3 bg-slate-100 rounded mb-6 text-xs font-mono" />
                <button onClick={connectGoogle} className="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-xs uppercase shadow-md mb-2">Link Work Account</button>
                <button onClick={() => setShowSettings(false)} className="w-full bg-slate-200 text-slate-600 p-4 rounded-xl font-black text-xs uppercase">Close</button>
              </div>
            )}

            <div className="bg-white p-12 rounded-[2.5rem] shadow-sm border-4 border-dashed border-slate-200 mb-10 text-center relative">
                <h2 className="font-black text-slate-800 text-xl uppercase">Manual PDF Scan</h2>
                <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" />
                <button className="mt-4 bg-[#f59e0b] text-navy px-10 py-4 rounded-2xl font-black text-xs uppercase shadow-xl pointer-events-none">Select Contract</button>
            </div>

            {jobs.length === 0 && (
                <div className="text-center p-10 opacity-30 uppercase font-black text-xs tracking-widest text-slate-400">
                    No Jobs Loaded
                </div>
            )}

            {jobs.map(job => (
              <div key={job.id} className="bg-white mb-4 p-6 shadow-sm rounded-[2rem] border-l-[16px] border-[#1a3a5c] flex justify-between items-center">
                <div><h3 className="font-black text-slate-700 text-xl">{job.customer}</h3><p className="text-[10px] text-slate-400 font-black uppercase mt-1">{job.data.length} Windows</p></div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
