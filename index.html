<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire — Customer Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --emerald:#064e3b; --emerald-mid:#065f46; --emerald-light:#ecfdf5;
      --amber:#f59e0b; --amber-dark:#d97706; --amber-light:#fef3c7;
      --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
      --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}

    /* HEADER */
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-logo{display:flex;flex-direction:column}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;letter-spacing:-0.03em;color:white;text-transform:uppercase;line-height:1}
    .hdr-sub{font-size:0.48rem;font-weight:800;letter-spacing:0.35em;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-top:3px}
    .hdr-right{display:flex;align-items:center;gap:7px}
    .acct-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:8px;padding:5px 9px}
    .acct-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
    .acct-dot.off{background:var(--s400)}
    .acct-txt{font-size:0.58rem;font-weight:700;color:rgba(255,255,255,0.75);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hdr-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.8);border-radius:8px;padding:6px 9px;font-size:0.65rem;font-weight:700;cursor:pointer;letter-spacing:0.04em}
    .hdr-btn:active{background:rgba(255,255,255,0.22)}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:10px 4px;font-size:0.68rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}

    /* MAIN */
    .main{padding:14px 12px 100px}
    .lbl{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--s500);display:block;margin-bottom:4px}

    /* SETUP */
    .sc{background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(26,58,92,0.08);margin-bottom:14px}
    .sc-head{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:20px 18px 16px}
    .sc-icon{font-size:2rem;margin-bottom:8px}
    .sc-title{font-size:1.05rem;font-weight:900;color:white;text-transform:uppercase;letter-spacing:-0.01em}
    .sc-sub{font-size:0.73rem;color:rgba(255,255,255,0.6);margin-top:4px;line-height:1.45}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:13px}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:9px;padding:10px 12px;font-size:0.85rem;font-family:inherit;color:var(--s800);background:var(--s50);outline:none;transition:border-color 0.15s,box-shadow 0.15s}
    .inp:focus{border-color:var(--navy);background:white;box-shadow:0 0 0 3px rgba(26,58,92,0.1)}
    .mono{font-family:'Courier New',monospace;font-size:0.78rem}
    .hint{background:var(--amber-light);border:1px solid #fde68a;border-radius:10px;padding:11px 13px;font-size:0.74rem;color:#92400e;line-height:1.55}
    .hint strong{font-weight:800}
    .hint a{color:#92400e;font-weight:700}

    /* GOOGLE BUTTON */
    .g-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:1.5px solid var(--s200);border-radius:12px;padding:13px 16px;font-size:0.85rem;font-weight:700;color:var(--s700);cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .g-btn:active{background:var(--s50);transform:scale(0.98)}
    .g-btn.conn{background:#dcfce7;border-color:#86efac;color:#166534}
    .g-logo{width:20px;height:20px;flex-shrink:0}
    .btn-p{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:14px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;box-shadow:0 4px 14px rgba(26,58,92,0.25)}
    .btn-p:active{transform:scale(0.98);background:var(--navy-dark)}
    .btn-p:disabled{opacity:0.45;cursor:not-allowed;transform:none}
    .btn-disc{width:100%;padding:12px;border:1.5px solid #fca5a5;border-radius:12px;background:var(--redl);color:var(--red);font-size:0.75rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer}

    /* SYNC BAR */
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-l{display:flex;align-items:center;gap:9px}
    .sync-title{font-size:0.72rem;font-weight:800;color:var(--navy)}
    .sync-sub{font-size:0.61rem;color:var(--s500);margin-top:1px}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 13px;font-size:0.65rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.12s}
    .sync-btn:active{transform:scale(0.95)}
    .sync-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .err{background:var(--redl);border:1.5px solid #fca5a5;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:0.75rem;font-weight:700;color:var(--red);line-height:1.4}

    /* DATE STRIP */
    .dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px}
    .dstrip::-webkit-scrollbar{display:none}
    .dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all 0.15s;min-width:50px}
    .dchip.on{background:var(--navy);border-color:var(--navy);box-shadow:0 4px 12px rgba(26,58,92,0.25)}
    .dchip.ev{border-color:var(--amber)}
    .dc-d{font-size:0.57rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:var(--s400)}
    .dchip.on .dc-d{color:rgba(255,255,255,0.6)}
    .dc-n{font-size:1.1rem;font-weight:900;color:var(--s700);line-height:1;margin-top:2px}
    .dchip.on .dc-n{color:white}
    .dc-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);margin-top:3px}

    /* SECTION */
    .sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .sec-lbl{font-size:0.62rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--s400);display:flex;align-items:center;gap:7px}
    .sec-lbl::after{content:'';width:28px;height:1px;background:var(--border)}
    .sec-ct{font-size:0.65rem;font-weight:800;color:var(--s400)}

    /* CUSTOMER CARD */
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .cc-head{display:flex;align-items:stretch}
    .cc-bar{width:8px;flex-shrink:0}
    .cc-bar.win{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-mid) 100%)}
    .cc-bar.door{background:linear-gradient(180deg,var(--emerald) 0%,var(--emerald-mid) 100%)}
    .cc-bar.both{background:linear-gradient(180deg,var(--navy) 0%,var(--emerald) 100%)}
    .cc-bar.gen{background:linear-gradient(180deg,var(--amber) 0%,var(--amber-dark) 100%)}
    .cc-body{flex:1;padding:12px 12px 12px 10px}
    .cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
    .cc-name{font-size:1rem;font-weight:900;color:var(--s800);text-transform:uppercase;letter-spacing:-0.01em;line-height:1.15;flex:1;margin-right:8px}
    .cc-time{font-size:0.64rem;font-weight:800;color:white;background:var(--navy);border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0;letter-spacing:0.03em}
    .cc-time.soon{background:var(--amber)}
    .cc-time.past{background:var(--s400)}
    .cc-addr{font-size:0.74rem;color:var(--s500);margin-bottom:8px;line-height:1.35}
    .cc-pills{display:flex;flex-wrap:wrap;gap:5px}
    .pill{font-size:0.62rem;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--border);color:var(--s600);background:var(--s50)}
    .pill.win{background:var(--navy-light);border-color:#bfdbfe;color:var(--navy)}
    .pill.door{background:var(--emerald-light);border-color:#a7f3d0;color:var(--emerald)}
    .pill.rep{background:var(--amber-light);border-color:#fde68a;color:#92400e}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:10px 4px;border:none;background:transparent;font-size:0.63rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;color:var(--s500);cursor:pointer;transition:background 0.1s;display:flex;align-items:center;justify-content:center;gap:3px}
    .ca:not(:last-child){border-right:1px solid var(--border)}
    .ca:active{background:var(--s50)}
    .ca.p{color:var(--navy)}

    /* DETAIL */
    .cc-det{padding:12px;border-top:1px solid var(--border);background:var(--s50);display:flex;flex-direction:column;gap:10px}
    .d2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .df{display:flex;flex-direction:column;gap:3px}
    .dv{font-size:0.82rem;font-weight:700;color:var(--s700)}
    .dnotes{background:white;border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:0.76rem;color:var(--s600);line-height:1.5}

    /* GEMINI */
    .gi{background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%);border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px}
    .gi-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
    .gi-badge{background:linear-gradient(135deg,#4285f4,#34a853);color:white;font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:99px;letter-spacing:0.05em}
    .gi-txt{font-size:0.75rem;color:var(--s700);line-height:1.5}
    .gi-tap{background:none;border:none;color:var(--navy);font-size:0.72rem;font-weight:700;cursor:pointer;padding:0;letter-spacing:0.04em}

    /* SCHEDULE */
    .wlbl{font-size:0.6rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--s400);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
    .wlbl::before,.wlbl::after{content:'';flex:1;height:1px;background:var(--border)}

    /* LOADING / EMPTY */
    .lrow{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px 20px}
    .spin{width:18px;height:18px;border:2.5px solid var(--s200);border-top-color:var(--navy);border-radius:50%;animation:sp 0.7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ltxt{font-size:0.78rem;font-weight:700;color:var(--s500);letter-spacing:0.04em}
    .empty{text-align:center;padding:48px 24px}
    .e-icon{font-size:2.8rem;margin-bottom:10px;opacity:0.38}
    .e-title{font-size:0.88rem;font-weight:800;color:var(--s500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
    .e-sub{font-size:0.76rem;color:var(--s400);line-height:1.5}

    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .cc{animation:fu 0.18s ease both}
    .cc:nth-child(1){animation-delay:0.03s}.cc:nth-child(2){animation-delay:0.06s}
    .cc:nth-child(3){animation-delay:0.09s}.cc:nth-child(4){animation-delay:0.12s}
    .cc:nth-child(5){animation-delay:0.15s}
  </style>
</head>
<body>
<div id="root"></div>
<script>
var STORAGE_KEY = 'vhub_v2';
var GCAL_SCOPE  = 'https://www.googleapis.com/auth/calendar.readonly';

// ── STATE ──────────────────────────────────────────────────────────────────
var prefs        = loadPrefs();
var view         = prefs.accessToken ? 'hub' : 'setup';
var calEvents    = [];
var loading      = false;
var loadTxt      = 'Loading\u2026';
var lastSync     = prefs.lastSync   || null;
var selDate      = todayStr();
var expandId     = null;
var syncErr      = null;
var accessToken  = prefs.accessToken || null;
var userEmail    = prefs.userEmail   || null;
var geminiKey    = prefs.geminiKey   || '';
var insights     = {};
var clientId     = prefs.clientId   || '';

function loadPrefs(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}}
function save(){
  prefs.accessToken=accessToken; prefs.userEmail=userEmail;
  prefs.geminiKey=geminiKey; prefs.clientId=clientId;
  prefs.lastSync=lastSync; prefs.searchTerm=prefs.searchTerm||'Final Measure';
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(prefs));}catch(e){}
}
function todayStr(){return new Date().toISOString().slice(0,10);}

// ── GOOGLE OAUTH (GIS Implicit/Token flow) ────────────────────────────────
function loadGIS(cb){
  if(window.google&&window.google.accounts){cb();return;}
  var s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=cb;
  s.onerror=function(){syncErr='Could not load Google Sign-In library. Check connection.';render();};
  document.head.appendChild(s);
}

function signIn(){
  if(!clientId){syncErr='Enter your Google OAuth Client ID in Setup first.';render();return;}
  loadGIS(function(){
    var client=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:GCAL_SCOPE,
      callback:function(resp){
        if(resp.error){syncErr='Google sign-in failed: '+resp.error;render();return;}
        accessToken=resp.access_token;
        fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{'Authorization':'Bearer '+accessToken}})
          .then(function(r){return r.json();})
          .then(function(info){userEmail=info.email||'Connected';save();syncCalendar();})
          .catch(function(){userEmail='Connected';save();syncCalendar();});
      }
    });
    client.requestAccessToken({prompt:'select_account'});
  });
}

function signOut(){
  accessToken=null;userEmail=null;calEvents=[];
  prefs.accessToken=null;prefs.userEmail=null;save();view='setup';render();
}

// ── CALENDAR SYNC ─────────────────────────────────────────────────────────
function syncCalendar(){
  if(!accessToken){syncErr='Sign in with Google first.';render();return;}
  loading=true;loadTxt='Pulling Final Measures\u2026';syncErr=null;render();
  var now=new Date();
  var past=new Date(now);past.setDate(past.getDate()-7);
  var future=new Date(now);future.setDate(future.getDate()+60);
  var term=encodeURIComponent(prefs.searchTerm||'Final Measure');
  var url='https://www.googleapis.com/calendar/v3/calendars/primary/events'
    +'?timeMin='+encodeURIComponent(past.toISOString())
    +'&timeMax='+encodeURIComponent(future.toISOString())
    +'&maxResults=250&singleEvents=true&orderBy=startTime&q='+term;
  fetch(url,{headers:{'Authorization':'Bearer '+accessToken}})
    .then(function(r){
      if(r.status===401){accessToken=null;prefs.accessToken=null;save();throw new Error('Session expired \u2014 please sign in again.');}
      if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(data){
      calEvents=(data.items||[]).map(parseEv);
      loading=false;
      lastSync=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      save();
      var dates=evDates();
      if(dates.length&&dates.indexOf(selDate)<0)selDate=dates[0];
      render();
    })
    .catch(function(err){loading=false;syncErr=err.message||'Sync failed.';render();});
}

function parseEv(ev){
  var start=(ev.start&&(ev.start.dateTime||ev.start.date))||'';
  var title=ev.summary||'';
  var desc=(ev.description||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').trim();
  var loc=ev.location||'';
  var customer=title.replace(/final\s*measure[\s\-\u2013:]+/i,'').replace(/\bfm\b[\s\-\u2013:]+/i,'').trim()||title||'Unnamed';
  var address=loc||xf(desc,['address','addr','location'])||'';
  var consultant=xf(desc,['consultant','rep','salesperson','sales rep','advisor'])||'';
  var startDate=start?start.slice(0,10):'';
  var startTime='';
  if(start&&start.indexOf('T')>=0)startTime=new Date(start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var lc=(title+' '+desc).toLowerCase();
  return{
    id:ev.id,title:title,customer:customer,address:address,consultant:consultant,
    notes:desc,startRaw:start,startDate:startDate,startTime:startTime,
    hasWin:/window/i.test(lc),hasDoor:/door/i.test(lc),htmlLink:ev.htmlLink||''
  };
}
function xf(text,keys){
  for(var i=0;i<keys.length;i++){
    var m=text.match(new RegExp(keys[i]+'\\s*[:\\-]\\s*([^\\n\\r,]+)','i'));
    if(m)return m[1].trim();
  }return'';
}
function evDates(){var s={};var o=[];calEvents.forEach(function(e){if(e.startDate&&!s[e.startDate]){s[e.startDate]=1;o.push(e.startDate);}});return o.sort();}
function evsFor(d){return calEvents.filter(function(e){return e.startDate===d;});}
function isToday(d){return d===todayStr();}
function ddiff(a,b){return(new Date(a+'T12:00:00')-new Date(b+'T12:00:00'))/86400000;}
function isSoon(ev){if(!ev.startRaw||ev.startRaw.indexOf('T')<0)return false;var d=new Date(ev.startRaw).getTime()-Date.now();return d>0&&d<3600000;}
function isPast(ev){if(!ev.startRaw||ev.startRaw.indexOf('T')<0)return false;return new Date(ev.startRaw).getTime()<Date.now();}

// ── GEMINI ────────────────────────────────────────────────────────────────
function geminiInsight(ev){
  if(!geminiKey)return;
  if(insights[ev.id]){render();return;}
  insights[ev.id]='...';render();
  var prompt='You are a field measure prep assistant for Visionaire Windows. Write a single practical 1-2 sentence prep note for the measurer heading to this appointment. Be specific.\n\nCustomer: '+ev.customer+'\nAddress: '+ev.address+'\nNotes: '+ev.notes+'\n\nRespond with 1-2 sentences only.';
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+geminiKey,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.4,maxOutputTokens:120}})
  }).then(function(r){return r.json();})
  .then(function(d){
    var t='';try{t=d.candidates[0].content.parts[0].text.trim();}catch(e){}
    insights[ev.id]=t||'No insight available.';render();
  }).catch(function(){insights[ev.id]='Could not load insight.';render();});
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById('root');if(!root)return;
  root.innerHTML='';
  var wrap=el('div',{C:'app'});
  wrap.appendChild(rHeader());
  var main=el('div',{C:'main'});
  if(view==='setup')rSetup(main);
  else if(view==='hub')rHub(main);
  else if(view==='sched')rSched(main);
  wrap.appendChild(main);root.appendChild(wrap);
}

function rHeader(){
  var h=el('div',{C:'hdr'});
  var top=el('div',{C:'hdr-top'});
  var logo=el('div',{C:'hdr-logo'});
  logo.appendChild(el('span',{C:'hdr-title',t:'Visionaire'}));
  logo.appendChild(el('span',{C:'hdr-sub',t:'Customer Hub'}));
  top.appendChild(logo);
  var right=el('div',{C:'hdr-right'});
  var badge=el('div',{C:'acct-badge'});
  badge.appendChild(el('span',{C:'acct-dot'+(accessToken?'':' off')}));
  badge.appendChild(el('span',{C:'acct-txt',t:userEmail||'Not signed in'}));
  right.appendChild(badge);
  var sb=el('button',{C:'hdr-btn',t:'\u2699',click:function(){view='setup';render();}});
  right.appendChild(sb);top.appendChild(right);h.appendChild(top);
  var tabs=el('div',{C:'vtabs'});
  [['hub','\uD83D\uDCCB Today'],['sched','\uD83D\uDCC5 Schedule'],['setup','\u2699 Setup']].forEach(function(t){
    var tab=el('button',{C:'vtab'+(view===t[0]?' on':''),t:t[1],click:function(v){return function(){view=v;render();};}(t[0])});
    tabs.appendChild(tab);
  });
  h.appendChild(tabs);return h;
}

function rHub(main){
  if(!accessToken){rNoAuth(main);return;}
  // Sync bar
  var sb=el('div',{C:'sync-bar'});
  var sbl=el('div',{C:'sync-l'});
  sbl.appendChild(el('span',{t:'\uD83D\uDCC5',style:'font-size:1.1rem'}));
  var si=el('div');
  si.appendChild(el('div',{C:'sync-title',t:userEmail||'Visionaire Calendar'}));
  si.appendChild(el('div',{C:'sync-sub',t:lastSync?'Synced '+lastSync:'Not yet synced'}));
  sbl.appendChild(si);sb.appendChild(sbl);
  var syn=el('button',{C:'sync-btn',t:loading?'\u2026':'\u21BB Sync',click:syncCalendar});
  syn.disabled=loading;sb.appendChild(syn);main.appendChild(sb);
  if(syncErr)main.appendChild(el('div',{C:'err',t:'\u26A0 '+syncErr}));
  if(loading){var lr=el('div',{C:'lrow'});lr.appendChild(el('div',{C:'spin'}));lr.appendChild(el('div',{C:'ltxt',t:loadTxt}));main.appendChild(lr);return;}
  if(!calEvents.length&&!syncErr){

    es.appendChild(el('div',{C:'e-title',t:'No Final Measures Found'}));

  sr.appendChild(el('div',{C:'sec-lbl',t:fmtDate(selDate)}));
  sr.appendChild(el('div',{C:'sec-ct',t:dayEvs.length+' job'+(dayEvs.length===1?'':'s')}));

    var nd=el('div',{C:'empty',style:'padding:24px 20px'});

  } else {dayEvs.forEach(function(ev){main.appendChild(rCard(ev));});}
}

function rNoAuth(main){
  var es=el('div',{C:'empty'});es.appendChild(el('div',{C:'e-icon',t:'\uD83D\uDD11'}));

  es.appendChild(btn);main.appendChild(es);
}

function rDateStrip(main){
  var strip=el('div',{C:'dstrip'});
  var evd=evDates();var evs={};evd.forEach(function(d){evs[d]=1;});
  var base=new Date();base.setHours(0,0,0,0);
  var days=[];
  for(var i=-1;i<=28;i++){var d=new Date(base);d.setDate(d.getDate()+i);days.push(d.toISOString().slice(0,10));}
  evd.forEach(function(d){if(days.indexOf(d)<0)days.push(d);});
  days.sort();
  var shown=days.filter(function(d){return evs[d]||Math.abs(ddiff(d,todayStr()))<=1;});
  shown.forEach(function(ds){
    var d=new Date(ds+'T12:00:00');var active=ds===selDate;var hasEv=!!evs[ds];
    var chip=el('div',{C:'dchip'+(active?' on':'')+(hasEv?' ev':''),click:function(s){return function(){selDate=s;render();};}(ds)});
    var dnames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    chip.appendChild(el('div',{C:'dc-d',t:isToday(ds)?'Today':dnames[d.getDay()]}));
    chip.appendChild(el('div',{C:'dc-n',t:d.getDate()}));
    if(hasEv&&!active)chip.appendChild(el('div',{C:'dc-dot'}));
    strip.appendChild(chip);
  });
  main.appendChild(strip);
}

function fmtDate(ds){
  if(isToday(ds))return'Today';
  var diff=Math.round(ddiff(ds,todayStr()));
  if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';
  return new Date(ds+'T12:00:00').toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
}

function rCard(ev){
  var card=el('div',{C:'cc'});var isExp=expandId===ev.id;
  var head=el('div',{C:'cc-head'});
  var bc=ev.hasWin&&ev.hasDoor?'both':ev.hasDoor?'door':ev.hasWin?'win':'gen';
  head.appendChild(el('div',{C:'cc-bar '+bc}));
  var body=el('div',{C:'cc-body'});
  var top=el('div',{C:'cc-top'});
  top.appendChild(el('div',{C:'cc-name',t:ev.customer}));
  if(ev.startTime){var tc='cc-time'+(isSoon(ev)?' soon':isPast(ev)?' past':'');top.appendChild(el('span',{C:tc,t:ev.startTime}));}
  body.appendChild(top);
  if(ev.address)body.appendChild(el('div',{C:'cc-addr',t:'\uD83D\uDCCD '+ev.address}));
  var pills=el('div',{C:'cc-pills'});
  if(ev.hasWin)pills.appendChild(el('span',{C:'pill win',t:'\uD83E\uDE9F Windows'}));
  if(ev.hasDoor)pills.appendChild(el('span',{C:'pill door',t:'\uD83D\uDEAA Doors'}));
  if(ev.consultant)pills.appendChild(el('span',{C:'pill rep',t:'\uD83D\uDC64 '+ev.consultant}));
  if(!ev.hasWin&&!ev.hasDoor)pills.appendChild(el('span',{C:'pill',t:'Final Measure'}));
  body.appendChild(pills);head.appendChild(body);card.appendChild(head);

  if(isExp){
    var det=el('div',{C:'cc-det'});
    var cols=el('div',{C:'d2'});
    if(ev.startTime){var tf=el('div',{C:'df'});tf.appendChild(el('span',{C:'lbl',t:'Time'}));tf.appendChild(el('div',{C:'dv',t:ev.startTime}));cols.appendChild(tf);}
    if(ev.consultant){var cf=el('div',{C:'df'});cf.appendChild(el('span',{C:'lbl',t:'Consultant'}));cf.appendChild(el('div',{C:'dv',t:ev.consultant}));cols.appendChild(cf);}
    if(cols.childNodes.length)det.appendChild(cols);
    if(ev.notes&&ev.notes.trim()){det.appendChild(el('span',{C:'lbl',t:'Event Notes'}));det.appendChild(el('div',{C:'dnotes',t:ev.notes.trim()}));}
    if(geminiKey){
      var gi=el('div',{C:'gi'});
      var gih=el('div',{C:'gi-head'});
      gih.appendChild(el('span',{C:'gi-badge',t:'\u2736 Gemini'}));
      gih.appendChild(el('span',{style:'font-size:0.68rem;font-weight:700;color:var(--s600)',t:'AI Prep Note'}));
      gi.appendChild(gih);
      var ins=insights[ev.id];
      if(!ins){var tap=el('button',{C:'gi-tap',t:'Tap to generate prep note\u2026',click:function(e){return function(){geminiInsight(e);};}(ev)});gi.appendChild(tap);}
      else if(ins==='...'){var sr2=el('div',{C:'lrow',style:'padding:6px 0;justify-content:flex-start'});sr2.appendChild(el('div',{C:'spin'}));sr2.appendChild(el('span',{C:'ltxt',t:'Gemini is thinking\u2026'}));gi.appendChild(sr2);}
      else{gi.appendChild(el('div',{C:'gi-txt',t:ins}));}
      det.appendChild(gi);
    }
    card.appendChild(det);
  }

 var acts=el('div',{C:'cc-acts'});
  var fm=el('button',{C:'ca p',t:'\uD83D\uDCCB FM Sheet',click:function(){
    try {
      // 1. Inject the job directly into the Field Command app's memory
      var existingJobs = JSON.parse(localStorage.getItem('visionaireJobs')) || [];
      var jobExists = false;
      for(var i=0; i<existingJobs.length; i++) {
        if(existingJobs[i].customer === ev.customer) { jobExists = true; break; }
      }
      
      if(!jobExists) {
        existingJobs.unshift({
          id: Date.now(),
          customer: ev.customer,
          time: ev.startTime ? ev.startTime : 'Scheduled',
          data: []
        });
        localStorage.setItem('visionaireJobs', JSON.stringify(existingJobs));
      }
      
      // 2. Redirect instantly to the Field Command app
      window.location.href = 'index.html';
      
    } catch(e) {
      alert('Error transferring data to Field Command.');
    }
  }});
  acts.appendChild(fm);
  var ca=el('button',{C:'ca',t:'\uD83D\uDCC5 Event',click:function(){if(ev.htmlLink)window.open(ev.htmlLink,'_blank');}});
  acts.appendChild(ca);
  var exp=el('button',{C:'ca',t:isExp?'\u25B2 Less':'\u25BC Details',click:function(){expandId=isExp?null:ev.id;render();}});
  acts.appendChild(exp);
  card.appendChild(acts);return card;
}

function rSched(main){
  if(!accessToken){rNoAuth(main);return;}
  if(!calEvents.length){
    var es=el('div',{C:'empty'});es.appendChild(el('div',{C:'e-icon',t:'\uD83D\uDCC5'}));
    es.appendChild(el('div',{C:'e-title',t:'No events loaded'}));
    es.appendChild(el('div',{C:'e-sub',t:'Go to Today and tap Sync first.'}));
    main.appendChild(es);return;
  }
  evDates().forEach(function(ds){
    main.appendChild(el('div',{C:'wlbl',t:fmtDate(ds)}));
    evsFor(ds).forEach(function(ev){main.appendChild(rCard(ev));});
  });
}

// ── UTILITY ───────────────────────────────────────────────────────────────
function el(tag,props){
  var e=document.createElement(tag);
  if(!props)return e;
  for(var k in props){
    if(k==='C')e.className=props[k];
    else if(k==='t')e.textContent=props[k];
    else if(k==='style'&&typeof props[k]==='string')e.style.cssText=props[k];
    else if(k==='click')e.addEventListener('click',props[k]);
    else e[k]=props[k];
  }
  return e;
}

document.addEventListener('DOMContentLoaded',function(){
  if(accessToken)syncCalendar();
  render();
});
