<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Hub</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script>
    window.onerror = function(msg, url, line) {
      alert("System Error: " + msg + "\nLine: " + line);
      return false;
    };

    // --- REDIRECT HANDLER ---
    // This runs automatically when Google sends you back to the page
    window.onload = function() {
      const prefs = JSON.parse(localStorage.getItem('vhub_v2')) || {};
      
      // Check if we just came back from a login redirect
      google.accounts.id.initialize({
        client_id: prefs.clientId,
        callback: (response) => {
          const payload = JSON.parse(window.atob(response.credential.split('.')[1]));
          prefs.userEmail = payload.email;
          // We also need the Access Token for Drive/Calendar
          // The redirect gives us Identity; we use this to trigger the final permission
          localStorage.setItem('vhub_v2', JSON.stringify(prefs));
          alert("Welcome, " + payload.email + ". Finalizing Sync...");
          signIn(); 
        }
      });

      render();
    };
  </script>
  <style>
    :root { --navy:#1a3a5c; --amber:#f59e0b; --s100:#f1f5f9; --s200:#e2e8f0; --s500:#64748b; }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain;touch-action:manipulation}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200;color:white}
    .hdr-top{display:flex;align-items:center;justify-content:space-between}
    .hdr-title{font-size:1.2rem;font-weight:900;font-style:italic;text-transform:uppercase}
    .acct-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:8px}
    .acct-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
    .acct-dot.off{background:#94a3b8}
    .acct-txt{font-size:0.65rem;font-weight:700}
    .main{padding:16px}
    .sc{background:white;border-radius:12px;border:1px solid var(--s200);overflow:hidden;margin-bottom:16px}
    .sc-head{background:var(--navy);padding:12px;color:white;font-weight:800;text-transform:uppercase;font-size:0.7rem}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .lbl{font-size:0.6rem;font-weight:800;text-transform:uppercase;color:var(--s500)}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:8px;padding:10px;font-size:0.85rem;outline:none}
    .btn-p{background:var(--navy);color:white;border:none;border-radius:8px;padding:14px;font-weight:800;text-transform:uppercase;font-size:0.75rem;cursor:pointer}
  </style>
</head>
<body>
<div id="root"></div>

<script>
var STORAGE_KEY = 'vhub_v2';
var GCAL_SCOPE  = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email';

var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
var clientId = prefs.clientId || '';
var geminiKey = prefs.geminiKey || '';
var accessToken = prefs.accessToken || null;
var userEmail = prefs.userEmail || null;

function save(){
  clientId = document.getElementById('ci').value;
  geminiKey = document.getElementById('gk').value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({clientId, geminiKey, accessToken, userEmail}));
}

function signIn() {
  if (!clientId) return;
  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId, scope: GCAL_SCOPE,
    callback: (resp) => {
      if (resp.access_token) {
        accessToken = resp.access_token;
        save();
        location.reload(); 
      }
    }
  });
  client.requestAccessToken({prompt: ''});
}

function renderGoogleBtn() {
  if (!clientId) return;
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({
      client_id: clientId,
      callback: window.handleCredentialResponse,
      ux_mode: "redirect", // CRITICAL FIX: Same-window redirect
      login_uri: window.location.href // Redirect back here
    });
    google.accounts.id.renderButton(
      document.getElementById("google-btn-slot"),
      { theme: "outline", size: "large", width: "100%" }
    );
  } else {
    setTimeout(renderGoogleBtn, 500);
  }
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      <header class="hdr">
        <div class="hdr-top">
          <span class="hdr-title">Visionaire Hub</span>
          <div class="acct-badge">
            <div class="acct-dot ${accessToken ? '' : 'off'}"></div>
            <span class="acct-txt">${userEmail || 'Signed Out'}</span>
          </div>
        </div>
      </header>
      <main class="main">
        <div class="sc">
          <div class="sc-head">System Settings</div>
          <div class="sc-body">
            <span class="lbl">Google Client ID</span>
            <input class="inp" id="ci" value="${clientId}">
            <span class="lbl">Gemini Key</span>
            <input class="inp" id="gk" type="password" value="${geminiKey}">
            <button class="btn-p" onclick="save(); alert('Saved. Enabling Button...'); location.reload();">1. Save & Enable Button</button>
            
            <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
               <div id="google-btn-slot"></div>
            </div>
            
            ${accessToken ? `<button onclick="localStorage.clear(); location.reload();" style="margin-top:30px; color:red; font-size:10px; border:none; background:none; text-decoration:underline; width:100%;">Full Reset</button>` : ''}
          </div>
        </div>
      </main>
    </div>
  `;
  renderGoogleBtn();
}
</script>
</body>
</html>
