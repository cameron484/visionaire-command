<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style> body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; } </style>
</head>
<body class="bg-[#f8fafc]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [showSettings, setShowSettings] = useState(false);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));

      const connectGoogle = () => {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => {
            if (res.access_token) {
              localStorage.setItem('googleAccessToken', res.access_token);
              setIsLinked(true);
              alert("Workspace Link Established!");
              setShowSettings(false);
            }
          },
        });
        client.requestAccessToken({ prompt: 'consent' });
      };

      const logOut = () => {
        localStorage.removeItem('googleAccessToken');
        setIsLinked(false);
        alert("Logged Out.");
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white shadow-2xl">
          <header className="p-4 flex justify-between items-center bg-[#1a3a5c] border-b-2 border-[#f59e0b]">
            <div className="flex flex-col">
              <span className="text-[#f59e0b] font-black italic text-xl">VISIONAIRE</span>
              <span className="text-white font-bold text-[8px] tracking-[0.3em] ml-1 uppercase">Field Command</span>
            </div>
            <button onClick={() => setShowSettings(!showSettings)} className="text-2xl p-2 bg-white/10 rounded-full">⚙️</button>
          </header>

          {showSettings && (
            <div className="p-6 bg-white border-b-4 border-[#f59e0b] animate-in slide-in-from-top duration-300">
              <label className="text-[10px] font-black text-slate-400 block mb-1">GOOGLE CLIENT ID</label>
              <input type="text" value={clientId} onChange={(e) => {setClientId(e.target.value); localStorage.setItem('googleClientId', e.target.value)}} 
                     className="w-full p-3 bg-slate-100 rounded mb-6 text-xs font-mono" />
              
              <div className="flex gap-2">
                <button onClick={connectGoogle} className="flex-1 bg-blue-600 text-white p-4 rounded-xl font-black text-xs uppercase shadow-lg">
                  {isLinked ? 'Refresh Link' : 'Link Workspace'}
                </button>
                {isLinked && (
                  <button onClick={logOut} className="bg-red-500 text-white px-4 rounded-xl font-black text-xs uppercase">Logout</button>
                )}
              </div>
            </div>
          )}

          <div className="p-20 text-center">
            <div className={`w-3 h-3 rounded-full mx-auto mb-2 ${isLinked ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-red-500'}`}></div>
            <h2 className="text-slate-400 font-black uppercase text-[10px] tracking-widest">
                {isLinked ? 'Command Center Connected' : 'System Disconnected'}
            </h2>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
