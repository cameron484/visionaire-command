<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire — Customer Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --amber:#f59e0b; --s100:#f1f5f9; --s200:#e2e8f0; --s400:#94a3b8; --s500:#64748b; --s700:#334155; --s800:#1e293b; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;color:white;text-transform:uppercase}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:12px 4px;font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.4);background:transparent;border:none;border-bottom:3px solid transparent}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}
    .main{padding:14px 12px 100px}
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-title{font-size:0.72rem;font-weight:800;color:var(--navy)}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 13px;font-size:0.65rem;font-weight:800;text-transform:uppercase}
    .dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px}
    .dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:white;min-width:55px}
    .dchip.on{background:var(--navy);border-color:var(--navy);color:white}
    .dchip.on .dc-d, .dchip.on .dc-n {color:white}
    .dc-d{font-size:0.57rem;font-weight:800;text-transform:uppercase;color:var(--s400)}
    .dc-n{font-size:1.1rem;font-weight:900;color:var(--s700)}
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);display:flex;flex-direction:column}
    .cc-head{padding:12px;display:flex;justify-content:space-between;align-items:flex-start}
    .cc-name{font-size:1rem;font-weight:900;color:var(--s800);text-transform:uppercase}
    .cc-time{font-size:0.64rem;font-weight:800;color:white;background:var(--navy);border-radius:6px;padding:3px 7px}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:12px;border:none;background:transparent;font-size:0.68rem;font-weight:800;text-transform:uppercase;color:var(--s500);border-right:1px solid var(--border)}
    .ca.p{color:var(--navy)}
    .dnotes{padding:12px;background:var(--s100);font-size:0.75rem;color:var(--s700);line-height:1.5;white-space:pre-wrap}
  </style>
</head>
<body>
<div id="root"></div>
<script>
var STORAGE_KEY = 'vhub_v2';
var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY))||{};
var view = prefs.accessToken ? 'sched' : 'setup';
var calEvents = prefs.calEvents || [];
var selDate = new Date().toISOString().slice(0,10);
var loading = false;

function save(){ 
  prefs.calEvents = calEvents; 
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs)); 
}

function syncCalendar(){
  if(!prefs.accessToken) return;
  loading = true; render();
  var past = new Date(); past.setDate(past.getDate()-7);
  var future = new Date(); future.setDate(future.getDate()+30);
  var url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+past.toISOString()+'&timeMax='+future.toISOString()+'&singleEvents=true&orderBy=startTime&q=Final Measure';
  fetch(url,{headers:{'Authorization':'Bearer '+prefs.accessToken}})
    .then(r=>r.json()).then(data=>{
      calEvents = (data.items||[]).map(ev=>({
        id: ev.id,
        customer: ev.summary.replace(/final measure/i,'').trim(),
        startTime: ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'Scheduled',
        startDate: (ev.start.dateTime||ev.start.date).slice(0,10),
        notes: ev.description || 'No notes.'
      }));
      loading = false; save(); render();
    });
}

function render(){
  var root = document.getElementById('root');
  root.innerHTML = '';
  var wrap = el('div',{C:'app'});
  
  // Header
  var h = el('div',{C:'hdr'});
  var ht = el('div',{C:'hdr-top'});
  ht.appendChild(el('span',{C:'hdr-title',t:'Visionaire Hub'}));
  h.appendChild(ht);
  var tabs = el('div',{C:'vtabs'});
  [['sched','Schedule'],['setup','Setup']].forEach(t=>{
    tabs.appendChild(el('button',{C:'vtab'+(view===t[0]?' on':''),t:t[1],click:()=>{view=t[0];render();}}));
  });
  h.appendChild(tabs); wrap.appendChild(h);

  var main = el('div',{C:'main'});
  if(view==='setup'){
    main.appendChild(el('div',{t:'Go to Setup to manage Google/Gemini connection.'}));
  } else {
    var sb = el('div',{C:'sync-bar'});
    sb.appendChild(el('span',{C:'sync-title',t:'Visionaire Calendar'}));
    sb.appendChild(el('button',{C:'sync-btn',t:loading?'...':'Sync',click:syncCalendar}));
    main.appendChild(sb);

    // Date Strip
    var ds = el('div',{C:'dstrip'});
    for(var i=-1; i<10; i++){
      var d = new Date(); d.setDate(d.getDate()+i);
      var iso = d.toISOString().slice(0,10);
      var chip = el('div',{C:'dchip'+(selDate===iso?' on':''),click:((val)=>{return()=>{selDate=val;render();}})(iso)});
      chip.appendChild(el('div',{C:'dc-d',t:d.toLocaleDateString([],{weekday:'short'})}));
      chip.appendChild(el('div',{C:'dc-n',t:d.getDate()}));
      ds.appendChild(chip);
    }
    main.appendChild(ds);

    calEvents.filter(e=>e.startDate===selDate).forEach(ev=>{
      var card = el('div',{C:'cc'});
      var head = el('div',{C:'cc-head'});
      head.appendChild(el('div',{C:'cc-name',t:ev.customer}));
      head.appendChild(el('div',{C:'cc-time',t:ev.startTime}));
      card.appendChild(head);
      
      var acts = el('div',{C:'cc-acts'});
      acts.appendChild(el('button',{C:'ca p',t:'FM Sheet',click:()=>{
        localStorage.setItem('activeJobId', JSON.stringify(ev.id));
        var jobs = JSON.parse(localStorage.getItem('visionaireJobs'))||[];
        if(!jobs.find(j=>j.id===ev.id)) jobs.unshift({id:ev.id, customer:ev.customer, data:[]});
        localStorage.setItem('visionaireJobs', JSON.stringify(jobs));
        window.location.href = 'measure.html';
      }}));
      card.appendChild(acts);
      main.appendChild(card);
    });
  }
  wrap.appendChild(main); root.appendChild(wrap);
}

function el(tag,props){
  var e=document.createElement(tag);
  for(var k in props){
    if(k==='C')e.className=props[k]; else if(k==='t')e.textContent=props[k]; else if(k==='click')e.addEventListener('click',props[k]); else e[k]=props[k];
  }
  return e;
}
render();
</script>
</body>
</html>
