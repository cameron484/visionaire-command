<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; } 
    .num-btn { @apply bg-white p-5 rounded-2xl font-black text-3xl shadow-sm active:bg-slate-200 active:scale-90 transition-all border-b-4 border-slate-300 flex items-center justify-center; }
    .frac-btn { @apply bg-[#1a3a5c] text-white p-4 rounded-xl font-black text-xl active:scale-90 transition-all shadow-md flex items-center justify-center border-b-4 border-blue-900; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function VisionaireApp() {
      // Data Persistance
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [trash, setTrash] = useState(() => JSON.parse(localStorage.getItem('visionaireTrash')) || []);
      
      // UI State
      const [view, setView] = useState('main'); 
      const [activeJobId, setActiveJobId] = useState(null); 
      const [activeItemIndex, setActiveItemIndex] = useState(null);
      const [activeField, setActiveField] = useState('fmWidth');
      const [showSettings, setShowSettings] = useState(false);
      const [loading, setLoading] = useState(false);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));

      // Sort Jobs: Newest at the top
      const sortedJobs = [...jobs].sort((a, b) => b.id - a.id);

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);
      useEffect(() => { localStorage.setItem('visionaireTrash', JSON.stringify(trash)); }, [trash]);

      // --- ACCOUNT CONNECTION ---
      const connectGoogle = () => {
        if (!clientId) return alert("Enter Client ID in Settings first.");
        
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => {
            if (res.access_token) {
              localStorage.setItem('googleAccessToken', res.access_token);
              setIsLinked(true);
              alert("Linked to Visionaire Workspace!");
              setShowSettings(false);
            }
          },
        });
        
        // This forces Google to show the account selection screen
        client.requestAccessToken({ prompt: 'select_account consent' });
      };

      // --- JOB MANAGEMENT ---
      const moveToTrash = (jobId) => {
        const job = jobs.find(j => j.id === jobId);
        setJobs(jobs.filter(j => j.id !== jobId));
        setTrash([job, ...trash]);
      };

      const restoreJob = (jobId) => {
        const job = trash.find(j => j.id === jobId);
        setTrash(trash.filter(j => j.id !== jobId));
        setJobs([job, ...jobs]);
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || !apiKey) return alert("Enter Gemini Key in Settings ⚙️");
        setLoading(true);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: "Extract Customer Name and window lines. JSON: { 'customerName': 'Name', 'items': [{'line': '1', 'location': '...', 'specs': '...', 'qty': '1'}] }." }, { inlineData: { mimeType: "application/pdf", data: base64 } }] }]
              })
            });
            const result = await response.json();
            const text = result.candidates[0].content.parts[0].text;
            const extracted = JSON.parse(text.replace(/```json/gi, '').replace(/```/g, '').trim());
            const newJob = { id: Date.now(), customer: extracted.customerName, dateAdded: new Date().toLocaleDateString(), data: extracted.items.map(i => ({ ...i, fmWidth: '', fmHeight: '', notes: '' })) };
            setJobs(prev => [newJob, ...prev]);
            setLoading(false);
          } catch (e) { alert("Error: " + e.message); setLoading(false); }
        };
      };

      const handleKeyPress = (value) => {
        if (activeItemIndex === null) return;
        setJobs(prev => prev.map(job => {
          if (job.id === activeJobId) {
            const updated = [...job.data];
            let cur = updated[activeItemIndex][activeField] || '';
            if (value === 'DEL') cur = cur.slice(0, -1);
            else if (value === 'CLR') cur = '';
            else cur += value;
            updated[activeItemIndex][activeField] = cur;
            if (value.includes('/') && activeField === 'fmWidth') setActiveField('fmHeight');
            return { ...job, data: updated };
          }
          return job;
        }));
      };

      const activeJob = jobs.find(j => j.id === activeJobId);

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white shadow-2xl pb-10">
          
          {/* HEADER */}
          <header className="p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg border-b-2 border-[#f59e0b]" style={{ backgroundColor: theme.navy }}>
            <div className="flex flex-col cursor-pointer" onClick={() => {setActiveJobId(null); setView('main');}}>
                <span className="text-[#f59e0b] font-black italic text-xl leading-none tracking-tighter uppercase">Visionaire</span>
                <span className="text-white font-bold text-[8px] tracking-[0.4em] ml-1 uppercase">Field Command</span>
            </div>
            <div className="flex items-center gap-4">
                {!activeJobId && trash.length > 0 && (
                    <button onClick={() => setView(view === 'main' ? 'trash' : 'main')} className="text-xl">
                        {view === 'main' ? '🗑️' : '◀'}
                    </button>
                )}
                <button onClick={() => setShowSettings(!showSettings)} className="text-2xl p-2 bg-white/10 rounded-full">⚙️</button>
            </div>
          </header>

          {showSettings && (
            <div className="bg-white p-6 shadow-2xl border-b-8 border-[#f59e0b] absolute top-[75px] left-0 right-0 z-40">
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">Gemini API Key</label>
                <input type="password" value={apiKey} onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('geminiApiKey', e.target.value)}} className="w-full p-3 bg-slate-100 rounded mb-4 text-xs font-mono" />
                
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">Google Client ID</label>
                <input type="text" value={clientId} onChange={(e) => {setClientId(e.target.value); localStorage.setItem('googleClientId', e.target.value)}} className="w-full p-3 bg-slate-100 rounded mb-6 text-xs font-mono" />
                
                <div className="flex gap-2">
                    <button onClick={connectGoogle} className="flex-1 bg-blue-600 text-white p-4 rounded-xl font-black text-xs uppercase shadow-md active:scale-95">Link Work Account</button>
                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-200 text-slate-600 p-4 rounded-xl font-black text-xs uppercase">Close</button>
                </div>
            </div>
          )}

          <div className="p-4">
            {view === 'trash' ? (
                <div>
                    <h2 className="text-xl font-black mb-4 uppercase tracking-widest">Trash Bin</h2>
                    {trash.map(job => (
                        <div key={job.id} className="bg-white p-6 rounded-3xl mb-3 flex justify-between border-l-[12px] border-slate-300 shadow-sm items-center">
                            <span className="font-bold text-lg">{job.customer}</span>
                            <button onClick={() => restoreJob(job.id)} className="text-xs font-black text-green-600 uppercase">Restore</button>
                        </div>
                    ))}
                </div>
            ) : !activeJobId ? (
              <div>
                <div className="bg-white p-12 rounded-[2.5rem] shadow-sm border-4 border-dashed border-slate-200 mb-10 text-center relative">
                    <h2 className="font-black text-slate-800 text-xl uppercase tracking-tighter">Scan New Job</h2>
                    <input type="file" onChange={handleFileUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                    <button className="mt-4 bg-[#f59e0b] text-navy px-10 py-4 rounded-2xl font-black text-xs uppercase shadow-xl pointer-events-none tracking-widest">Select PDF</button>
                    {loading && <div className="mt-4 animate-pulse font-black text-navy uppercase text-xs">AI Processing...</div>}
                </div>
                <h2 className="text-[10px] font-black mb-4 text-slate-400 uppercase tracking-widest ml-2 italic underline">Active Schedule</h2>
                {sortedJobs.map(job => (
                  <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-white mb-4 p-6 shadow-sm rounded-[2rem] border-l-[16px] border-[#1a3a5c] flex justify-between items-center active:scale-95 transition-all">
                    <div><h3 className="font-black text-slate-700 text-2xl leading-none">{job.customer}</h3><p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-2">{job.data.length} Units • {job.dateAdded}</p></div>
                    <button onClick={(e) => {e.stopPropagation(); moveToTrash(job.id)}} className="text-2xl opacity-10 p-2">🗑️</button>
                  </div>
                ))}
              </div>
            ) : (
              <div className="space-y-4">
                <button onClick={() => setActiveJobId(null)} className="font-black text-navy uppercase text-xs mb-4 ml-2 tracking-widest flex items-center gap-1">◀ Route Dashboard</button>
                {activeJob.data.map((item, index) => (
                  <div key={index} className="bg-white shadow-sm rounded-[2rem] border-l-[12px] overflow-hidden" style={{ borderColor: item.fmWidth ? '#22c55e' : '#f59e0b' }}>
                    <div className="p-6 flex justify-between items-center cursor-pointer active:bg-slate-50" onClick={() => {setActiveItemIndex(activeItemIndex === index ? null : index); setActiveField('fmWidth');}}>
                      <div>
                        <p className="text-[10px] font-black text-slate-300 uppercase underline">Line {item.line} • Qty {item.qty}</p>
                        <h4 className="font-black text-slate-800 text-xl uppercase tracking-tighter leading-none">{item.location}</h4>
                      </div>
                      <div className={`w-3 h-3 rounded-full ${item.fmWidth ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-amber-400 animate-pulse'}`}></div>
                    </div>
                    {activeItemIndex === index && (
                      <div className="p-6 bg-slate-50 border-t border-slate-100">
                        <div className="flex gap-4 mb-6">
                          <div className={`flex-1 text-center p-5 rounded-3xl border-4 transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-xl scale-105' : 'border-slate-200 opacity-40'}`} onClick={() => setActiveField('fmWidth')}>
                            <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Width</label>
                            <div className="text-3xl font-black h-10 flex items-center justify-center">{item.fmWidth || '--'}</div>
                          </div>
                          <div className={`flex-1 text-center p-5 rounded-3xl border-4 transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-xl scale-105' : 'border-slate-200 opacity-40'}`} onClick={() => setActiveField('fmHeight')}>
                            <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Height</label>
                            <div className="text-3xl font-black h-10 flex items-center justify-center">{item.fmHeight || '--'}</div>
                          </div>
                        </div>
                        <div className="bg-slate-300 p-3 rounded-[3rem] shadow-inner mb-6">
                          <div className="grid grid-cols-7 gap-1.5 mb-3">
                            {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(' '+f)} className="frac-btn">{f}</button>)}
                          </div>
                          <div className="grid grid-cols-3 gap-2">
                             {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleKeyPress(n.toString())} className="num-btn">{n}</button>)}
                             <button onClick={() => handleKeyPress('CLR')} className="num-btn text-red-500 text-sm">CLR</button>
                             <button onClick={() => handleKeyPress('0')} className="num-btn">0</button>
                             <button onClick={() => handleKeyPress('DEL')} className="num-btn text-orange-500 text-sm">⌫</button>
                          </div>
                        </div>
                        <button onClick={() => setActiveItemIndex(index < activeJob.data.length - 1 ? index + 1 : null)} className="w-full p-6 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all" style={{ backgroundColor: theme.navy }}>Save & Next</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
