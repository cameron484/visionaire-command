<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command v3.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, sans-serif; } 
    .industrial-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 92, 0.3); }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [loading, setLoading] = useState(false);
      const [showSettings, setShowSettings] = useState(false);

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      // AUTO-PULL CALENDAR ON LOAD
      useEffect(() => { if (isLinked) pullCalendar(); }, [isLinked]);

      const connectGoogle = () => {
        if (!clientId) return alert("Enter Client ID!");
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => { if(res.access_token) { localStorage.setItem('googleAccessToken', res.access_token); setIsLinked(true); setShowSettings(false); pullCalendar(); } }
        });
        client.requestAccessToken({ prompt: 'select_account' });
      };

      const pullCalendar = async () => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return;
        setLoading(true);
        try {
          const now = new Date();
          const timeMin = now.toISOString();
          const future = new Date(); future.setDate(now.getDate() + 14);
          const timeMax = future.toISOString();

          const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.items) {
            const filtered = data.items.filter(e => {
              const t = (e.summary || '').toLowerCase();
              return t.includes('fm') || t.includes('measure') || t.includes('final') || t.includes('agreement') || t.includes('saunders');
            }).map(e => ({
              id: e.id,
              customer: e.summary.replace(/fm|measure|final|agreement/gi, '').replace(/[:-]/g, '').trim(),
              time: new Date(e.start.dateTime || e.start.date).toLocaleDateString() + ' @ ' + new Date(e.start.dateTime || e.start.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
              data: []
            }));
            
            setJobs(prev => {
                const existing = prev.map(j => j.customer.toLowerCase());
                const news = filtered.filter(f => !existing.includes(f.customer.toLowerCase()));
                return [...news, ...prev];
            });
          }
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      const addManualJob = () => {
        const name = prompt("Enter Customer Name:");
        if (name) {
          const newJob = { id: Date.now(), customer: name, time: "Manual Entry", data: [] };
          setJobs([newJob, ...jobs]);
        }
      };

      const activeJob = jobs.find(j => j.id === activeJobId);

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-slate-100 flex flex-col industrial-shadow">
          <header className="p-5 flex justify-between items-center sticky top-0 z-[60] shadow-lg border-b-2" style={{ backgroundColor: theme.navy, borderColor: theme.gold }}>
            <div>
                <span className="text-[#f59e0b] font-black italic text-2xl uppercase tracking-tighter leading-none">Visionaire</span>
                <p className="text-white font-bold text-[9px] tracking-[0.4em] uppercase leading-none">
                    {isLinked ? '● CONNECTED' : '○ OFFLINE'}
                </p>
            </div>
            <button onClick={() => setShowSettings(!showSettings)} className="text-xl p-2 bg-white/10 rounded-full">⚙️</button>
          </header>

          {showSettings && (
            <div className="absolute top-[75px] left-0 right-0 z-[100] bg-white p-6 shadow-2xl border-b-8 border-[#f59e0b]">
                <input type="password" placeholder="Gemini Key" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-xs font-mono" />
                <input type="text" placeholder="Google Client ID" value={clientId} onChange={e => setClientId(e.target.value)} className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-xs font-mono" />
                <button onClick={connectGoogle} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase shadow-lg mb-3 tracking-widest">Link Account</button>
                <button onClick={() => { localStorage.clear(); location.reload(); }} className="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-[10px] uppercase">Wipe Cache</button>
            </div>
          )}

          <div className="p-4 flex-1">
            {!activeJobId ? (
              <div className="space-y-4">
                  <div className="flex justify-between items-center mb-2 px-1">
                    <h2 className="text-slate-800 font-black text-xl uppercase tracking-tighter">Appointments</h2>
                    <div className="flex gap-2">
                        <button onClick={pullCalendar} className="bg-slate-200 text-slate-600 p-2 rounded-xl text-lg">🔄</button>
                        <button onClick={addManualJob} className="bg-[#1a3a5c] text-[#f59e0b] px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md">+ Add Job</button>
                    </div>
                  </div>
                  
                  {loading && <div className="p-10 text-center font-black text-slate-300 animate-pulse uppercase text-xs">Syncing Calendar...</div>}
                  
                  {jobs.length === 0 && !loading && (
                    <div className="p-16 text-center border-4 border-dashed border-slate-200 rounded-[2.5rem]">
                      <p className="text-slate-300 font-black uppercase text-xs tracking-[0.2em]">Searching for FM Keywords...</p>
                    </div>
                  )}

                  {jobs.map(job => (
                    <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-white p-6 rounded-[2.2rem] shadow-sm border-l-[12px] border-[#1a3a5c] flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                        <div className="min-w-0 pr-4">
                            <h3 className="font-black text-slate-800 text-xl truncate leading-none uppercase">{job.customer}</h3>
                            <p className="text-[10px] text-slate-400 font-bold mt-2 uppercase">{job.time}</p>
                        </div>
                        <span className="text-slate-300">➔</span>
                    </div>
                  ))}
              </div>
            ) : (
              <div className="space-y-4">
                <button onClick={() => setActiveJobId(null)} className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">◀ Back to Dispatch</button>
                <h3 className="font-black text-2xl uppercase text-slate-800 border-b-4 border-[#f59e0b] inline-block">{activeJob.customer}</h3>
                <div className="mt-10 p-20 border-4 border-dashed border-slate-200 rounded-[3rem] text-center">
                    <p className="text-slate-300 font-black uppercase text-xs italic">Tap manual add if contract scan fails</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
