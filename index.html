<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Visionaire">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style> 
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; } 
    .num-btn { @apply bg-white p-5 rounded-2xl font-black text-3xl shadow-sm active:bg-slate-200 active:scale-95 transition-all border-b-4 border-slate-300 flex items-center justify-center text-slate-700; }
    .frac-btn { @apply bg-[#1a3a5c] text-white p-4 rounded-xl font-black text-xl active:scale-95 transition-all shadow-md flex items-center justify-center border-b-4 border-blue-900; }
    .action-btn { @apply flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-all border; }
    canvas { touch-action: none; }
  </style>
</head>
<body class="bg-slate-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const theme = { navy: '#1a3a5c', gold: '#f59e0b' };

    function SignaturePad({ onSave, onCancel }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
      }, []);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const startDrawing = (e) => { setIsDrawing(true); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); };
      const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
      const stopDrawing = () => setIsDrawing(false);
      const clearPad = () => { const canvas = canvasRef.current; canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); };
      const savePad = () => onSave(canvasRef.current.toDataURL('image/png'));

      return (
        <div className="fixed inset-0 bg-slate-900/80 flex flex-col items-center justify-center z-[100] p-4 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden border-4 border-[#1a3a5c] flex flex-col md:flex-row">
            <div className="bg-slate-50 p-6 md:w-1/3 border-b md:border-b-0 md:border-r border-slate-200 flex flex-col justify-center">
                <h3 className="font-black uppercase text-slate-800 text-lg mb-2">Next Steps</h3>
                <ul className="text-[10px] text-slate-500 font-bold uppercase space-y-3">
                    <li className="flex gap-2"><span>1.</span> Measurements are sent directly to engineering.</li>
                    <li className="flex gap-2"><span>2.</span> Custom windows are ordered from the manufacturer.</li>
                    <li className="flex gap-2"><span>3.</span> The Visionaire office will contact you to schedule installation.</li>
                </ul>
            </div>
            <div className="p-6 md:w-2/3 bg-white">
                <h3 className="font-black uppercase tracking-widest text-slate-800 mb-4 text-center">Customer Sign-Off</h3>
                <div className="bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300 overflow-hidden shadow-inner relative mb-4">
                    <canvas ref={canvasRef} width={500} height={250} className="w-full h-[200px] cursor-crosshair"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                    <div className="absolute bottom-2 left-4 text-slate-300 font-black text-2xl select-none pointer-events-none opacity-50">X</div>
                    <div className="absolute bottom-2 left-10 right-4 border-b-2 border-slate-200 pointer-events-none"></div>
                </div>
                <div className="flex gap-2">
                    <button onClick={clearPad} className="flex-1 py-3 bg-slate-200 text-slate-600 rounded-xl font-black text-xs uppercase">Clear</button>
                    <button onClick={onCancel} className="flex-1 py-3 bg-red-100 text-red-600 rounded-xl font-black text-xs uppercase">Cancel</button>
                    <button onClick={savePad} className="flex-[2] py-3 bg-green-500 text-white rounded-xl font-black text-xs uppercase shadow-lg">Approve</button>
                </div>
            </div>
          </div>
        </div>
      );
    }

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [activeJobId, setActiveJobId] = useState(null);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));
      const [activeItemIndex, setActiveItemIndex] = useState(null);
      const [activeField, setActiveField] = useState('fmWidth');
      const [signingJobId, setSigningJobId] = useState(null);
      const [loading, setLoading] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);
      useEffect(() => { if (isLinked) pullCalendarMeasures(); }, [isLinked]);

      const connectGoogle = () => {
        if (!clientId) return alert("Enter Client ID in Settings!");
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/calendar.readonly',
          callback: (res) => { if(res.access_token) { localStorage.setItem('googleAccessToken', res.access_token); setIsLinked(true); setShowSettings(false); pullCalendarMeasures(); } }
        });
        client.requestAccessToken({ prompt: 'select_account consent' });
      };

      const pullCalendarMeasures = async () => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token) return;
        setIsSyncing(true);
        try {
          const calListRes = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { Authorization: `Bearer ${token}` } });
          
          if (calListRes.status === 401 || calListRes.status === 403) { 
              setIsLinked(false); 
              localStorage.removeItem('googleAccessToken'); 
              setIsSyncing(false); 
              alert("Google blocked calendar access! Please go to Settings ⚙️ -> 'Refresh Google Link' and make sure to CHECK the permission boxes.");
              return; 
          }
          
          const calListData = await calListRes.json();
          const now = new Date(); now.setHours(0,0,0,0);
          const timeMin = now.toISOString();
          const future = new Date(); future.setDate(now.getDate() + 14); 
          const timeMax = future.toISOString();

          let allFoundJobs = [];

          if (calListData.items) {
              for (const calendar of calListData.items) {
                  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendar.id)}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`, { headers: { Authorization: `Bearer ${token}` } });
                  if (res.ok) {
                      const data = await res.json();
                      if (data.items) {
                          const matched = data.items.filter(e => {
                              const title = (e.summary || '').toLowerCase();
                              return title.includes('final') || title.includes('measure') || title.includes('fm -') || title.includes('fm:') || title.includes('fm ');
                          });

                          matched.forEach(e => {
                              const title = e.summary || '';
                              let name = title;
                              
                              // NEW: Parses names like "Final Meas 10am, 2703 Main St"
                              if (title.includes(',')) {
                                  name = title.split(',').slice(1).join(',').trim(); 
                              } else if (title.includes('-')) {
                                  name = title.split('-').pop().trim();
                              } else if (title.includes(':')) {
                                  name = title.split(':').pop().trim();
                              }

                              let startTime = 'TBD'; let dateRaw = Date.now();
                              if (e.start.dateTime) {
                                  const d = new Date(e.start.dateTime);
                                  startTime = `${d.getMonth()+1}/${d.getDate()} @ ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                                  dateRaw = d.getTime();
                              }

                              let phoneNum = '';
                              if (e.description) {
                                  const phoneMatch = e.description.match(/(\+?1[-.\s]?)?(\()?\d{3}(\))?[-.\s]?\d{3}[-.\s]?\d{4}/);
                                  if (phoneMatch) phoneNum = phoneMatch[0].replace(/[^\d]/g, ''); 
                              }

                              allFoundJobs.push({
                                  id: Date.now() + Math.random(),
                                  customer: name, location: e.location || '', phone: phoneNum, time: startTime, rawDate: dateRaw, data: [], signature: null
                              });
                          });
                      }
                  }
              }
          }
          setJobs(prev => {
              const existingNames = prev.map(j => j.customer.toLowerCase());
              const trulyNew = allFoundJobs.filter(j => !existingNames.includes(j.customer.toLowerCase()));
              return [...prev, ...trulyNew].sort((a, b) => a.rawDate - b.rawDate);
          });
        } catch (e) { 
            console.error("Sync error", e); 
        }
        setIsSyncing(false);
      };

      const autoLoadContract = async (job) => {
        const token = localStorage.getItem('googleAccessToken');
        if (!token || !apiKey) return alert("Ensure your Google Account is linked and Gemini Key is in settings!");
        setLoading(true);
        try {
          // If the office puts the address in the title, we search Drive using that!
          const query = `name contains '${job.customer}' and mimeType='application/pdf'`;
          const driveRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=createdTime desc&pageSize=1`, { headers: { Authorization: `Bearer ${token}` } });
          const driveData = await driveRes.json();

          if (!driveData.files || driveData.files.length === 0) {
            alert(`No contract PDF found in Drive containing: "${job.customer}". Try manual entry or check Drive.`); 
            setLoading(false); setActiveJobId(null); return;
          }

          const fileId = driveData.files[0].id;
          const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
          const blob = await fileRes.blob();
          
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [ { text: "Extract Window Lines from this contract. Return JSON ONLY in this format: [{'line': '1', 'location': '...', 'qty': '1'}]. If no windows found, return []." }, { inlineData: { mimeType: "application/pdf", data: base64 } } ]}] })
            });
            const result = await geminiRes.json();
            const text = result.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            const items = JSON.parse(text);
            setJobs(prev => prev.map(j => j.id === job.id ? { ...j, data: items.map(i => ({ ...i, fmWidth: '', fmHeight: '' })) } : j));
            setLoading(false);
          };
        } catch (e) { alert("Error analyzing contract: " + e.message); setLoading(false); setActiveJobId(null); }
      };

      const handleKeyPress = (val) => {
          if(activeItemIndex === null) return;
          setJobs(prev => prev.map(job => {
              if(job.id === activeJobId) {
                  const items = [...job.data];
                  let cur = items[activeItemIndex][activeField] || '';
                  if(val === 'DEL') cur = cur.slice(0, -1);
                  else if(val === 'CLR') cur = '';
                  else cur += val;
                  items[activeItemIndex][activeField] = cur;
                  if (val.includes('/') && activeField === 'fmWidth') setActiveField('fmHeight');
                  return { ...job, data: items };
              }
              return job;
          }));
      };

      const copyPrevious = () => {
          if (activeItemIndex === null || activeItemIndex === 0) return;
          setJobs(prev => prev.map(job => {
              if(job.id === activeJobId) {
                  const items = [...job.data];
                  const prevItem = items[activeItemIndex - 1];
                  items[activeItemIndex].fmWidth = prevItem.fmWidth;
                  items[activeItemIndex].fmHeight = prevItem.fmHeight;
                  return { ...job, data: items };
              }
              return job;
          }));
      };

      const handlePhotoUpload = (e, index) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => {
              setJobs(prev => prev.map(job => {
                  if(job.id === activeJobId) {
                      const items = [...job.data];
                      items[index].photo = reader.result;
                      return { ...job, data: items };
                  }
                  return job;
              }));
          };
      };

      const pushToOfficeDrive = async (job) => {
          const token = localStorage.getItem('googleAccessToken');
          if (!token) return alert("Please Link Google Account.");
          setLoading(true);

          try {
              const folderName = "Completed Measures";
              let folderId = null;
              const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${folderName}' and mimeType='application/vnd.google-apps.folder'`, { headers: { Authorization: `Bearer ${token}` } });
              const searchData = await searchRes.json();
              
              if (searchData.files && searchData.files.length > 0) {
                  folderId = searchData.files[0].id;
              } else {
                  const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                      method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                      body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' })
                  });
                  const createData = await createRes.json();
                  folderId = createData.id;
              }

              const fileName = `COMPLETED_${job.customer.replace(/\s+/g, '_')}_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
              const metadata = { name: fileName, parents: [folderId] };
              const fileData = new Blob([JSON.stringify(job, null, 2)], { type: 'application/json' });
              
              const form = new FormData();
              form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
              form.append('file', fileData);

              await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                  method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
              });

              alert(`Successfully synced ${job.customer} to the Office Drive!`);
          } catch (e) {
              alert("Sync Error: " + e.message);
          }
          setLoading(false);
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const completedLines = activeJob ? activeJob.data.filter(i => i.fmWidth && i.fmHeight).length : 0;
      const progressPercent = activeJob && activeJob.data.length > 0 ? Math.round((completedLines / activeJob.data.length) * 100) : 0;

      return (
        <div className="max-w-2xl mx-auto min-h-screen flex flex-col relative shadow-2xl bg-slate-100">
          {signingJobId && <SignaturePad onSave={(img) => { setJobs(prev => prev.map(j => j.id === signingJobId ? { ...j, signature: img } : j)); setSigningJobId(null); }} onCancel={() => setSigningJobId(null)} />}

          <header className="p-4 flex justify-between items-center sticky top-0 z-50 shadow-md border-b-2" style={{ backgroundColor: theme.navy, borderColor: theme.gold }}>
            <div className="flex flex-col cursor-pointer" onClick={() => {setActiveJobId(null); setActiveItemIndex(null);}}>
                <span className="text-[#f59e0b] font-black italic text-2xl uppercase leading-none tracking-tighter">Visionaire</span>
                <span className="text-white font-bold text-[9px] tracking-[0.4em] ml-1 uppercase leading-none mt-1">Field Command</span>
            </div>
            <div className="flex items-center gap-3">
              {isSyncing && <span className="text-white text-xs font-bold animate-pulse">SYNCING...</span>}
              <button onClick={() => setShowSettings(!showSettings)} className="text-xl p-2 bg-white/10 rounded-full">⚙️</button>
            </div>
          </header>

          {showSettings && (
            <div className="absolute top-[70px] left-0 right-0 z-40 bg-white p-6 shadow-2xl border-b-8 border-[#f59e0b]">
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Gemini API Key</label>
                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-3 bg-slate-100 rounded mb-4 text-xs font-mono" />
                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Google Client ID</label>
                <input type="text" value={clientId} onChange={e => setClientId(e.target.value)} className="w-full p-3 bg-slate-100 rounded mb-6 text-xs font-mono" />
                <button onClick={connectGoogle} className="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-xs uppercase shadow-md mb-2">
                    {isLinked ? '🔄 Refresh Google Link' : 'Link Google Account'}
                </button>
                <button onClick={() => setShowSettings(false)} className="w-full bg-slate-200 text-slate-700 p-4 rounded-xl font-black text-xs uppercase">Close Settings</button>
            </div>
          )}

          <div className="p-4 flex-1">
            {!activeJobId ? (
              <div className="space-y-4">
                  <div className="flex justify-between items-end mb-2 px-1">
                    <h2 className="text-slate-800 font-black text-xl tracking-tighter uppercase">Dispatch Board</h2>
                    {!isLinked ? <span className="text-red-500 font-bold text-xs flex items-center gap-1"><div className="w-2 h-2 bg-red-500 rounded-full"></div>Offline</span> : <span className="text-green-600 font-bold text-xs flex items-center gap-1"><div className="w-2 h-2 bg-green-500 rounded-full"></div>Live</span>}
                  </div>

                  {jobs.length === 0 && !isSyncing && (
                    <div className="bg-white p-10 rounded-[2rem] border-4 border-dashed border-slate-200 text-center shadow-sm">
                        <div className="text-4xl mb-3">📅</div>
                        <h3 className="font-black text-slate-700 uppercase">Schedule Clear</h3>
                        <p className="text-xs text-slate-400 font-bold mt-1">No appointments found.</p>
                        <button onClick={pullCalendarMeasures} className="mt-6 px-6 py-3 bg-[#1a3a5c] text-white rounded-xl font-black text-xs uppercase shadow-lg active:scale-95">Force Sync</button>
                    </div>
                  )}

                  {jobs.map((job, index) => {
                    const isNext = index === 0; 
                    const isComplete = job.data.length > 0 && job.data.every(i => i.fmWidth && i.fmHeight);
                    const textMessage = encodeURIComponent(`Hi ${job.customer}, this is Cameron with Visionaire Windows. I am heading your way for the final measure. My ETA is about [   ] minutes.`);
                    
                    return (
                    <div key={job.id} className={`relative bg-white shadow-md rounded-[2rem] border-l-[12px] flex flex-col transition-transform ${isNext && !isComplete ? 'border-[#f59e0b] ring-4 ring-[#f59e0b]/20' : isComplete ? 'border-green-500 opacity-80' : 'border-[#1a3a5c]'}`}>
                      {isNext && !isComplete && <div className="absolute -top-3 left-4 bg-[#f59e0b] text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-md z-10">Next Up</div>}
                      
                      <div onClick={() => { setActiveJobId(job.id); if(job.data.length === 0) autoLoadContract(job); }} className="p-5 flex items-center gap-4 w-full cursor-pointer active:bg-slate-50 rounded-[2rem]">
                          <div className="flex flex-col items-center justify-center bg-slate-50 rounded-xl px-3 py-4 border border-slate-100 flex-shrink-0 min-w-[70px]">
                              <span className="text-slate-800 font-black text-xs text-center leading-tight">{job.time}</span>
                          </div>
                          <div className="flex-1 min-w-0">
                              <h3 className="font-black text-slate-800 text-xl truncate leading-none mb-1">{job.customer}</h3>
                              <p className="text-[10px] text-slate-500 font-bold uppercase truncate">{job.location || 'No Address'}</p>
                              
                              <div className="mt-2 flex items-center gap-2">
                                  {job.signature ? (
                                      <span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider flex items-center gap-1">✍️ Signed</span>
                                  ) : isComplete ? (
                                      <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">Completed</span>
                                  ) : job.data.length > 0 ? (
                                      <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">In Progress</span>
                                  ) : (
                                      <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">Ready for Scan</span>
                                  )}
                              </div>
                          </div>
                          <div className="flex-shrink-0 flex items-center justify-center w-10 h-10 bg-slate-50 rounded-full border-2 border-slate-200"><span className="text-slate-400 font-black">➔</span></div>
                      </div>

                      <div className="flex gap-2 p-3 bg-slate-50 border-t border-slate-100 rounded-b-[2rem]" onClick={(e) => e.stopPropagation()}>
                          {job.location ? <a href={`https://maps.google.com/?q=${encodeURIComponent(job.location)}`} target="_blank" className="action-btn bg-white text-blue-600 border-blue-100"><span>📍</span> Map</a> : <button disabled className="action-btn bg-slate-100 text-slate-400 opacity-50">No Map</button>}
                          {job.phone ? <a href={`sms:${job.phone}?body=${textMessage}`} className="action-btn bg-white text-green-600 border-green-100"><span>💬</span> Text</a> : <button disabled className="action-btn bg-slate-100 text-slate-400 opacity-50">No Num</button>}
                          {job.phone ? <a href={`tel:${job.phone}`} className="action-btn bg-[#1a3a5c] text-white"><span>📞</span> Call</a> : <button disabled className="action-btn bg-slate-100 text-slate-400 opacity-50">No Num</button>}
                      </div>
                    </div>
                  )})}
              </div>
            ) : (
              <div className="space-y-4 pb-20">
                <div className="bg-white p-4 rounded-3xl shadow-sm mb-4">
                    <div className="flex justify-between items-end mb-2">
                        <button onClick={() => {setActiveJobId(null); setActiveItemIndex(null);}} className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-1">◀ Dispatch</button>
                        <span className="text-[10px] font-black text-slate-400 uppercase">{completedLines} / {activeJob.data.length} Measured</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden border border-slate-200">
                        <div className="bg-green-500 h-3 rounded-full transition-all duration-500" style={{ width: `${progressPercent}%` }}></div>
                    </div>
                </div>

                {loading && (
                    <div className="flex flex-col items-center justify-center p-20 bg-white rounded-[2rem] shadow-sm border-2 border-slate-100">
                        <div className="w-16 h-16 rounded-full border-4 border-slate-200 border-t-[#f59e0b] animate-spin mb-4"></div>
                        <h3 className="font-black text-slate-700 uppercase tracking-widest text-sm">Working...</h3>
                    </div>
                )}

                {!loading && activeJob.data.length === 0 && (
                    <div className="bg-white p-10 rounded-[2rem] text-center border-4 border-dashed border-slate-300">
                        <h3 className="font-black text-slate-500 uppercase">Awaiting Contract</h3>
                        <p className="text-xs text-slate-400 font-bold mt-2">Could not automatically load PDF.</p>
                        <button onClick={() => autoLoadContract(activeJob)} className="mt-4 bg-[#1a3a5c] text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-md">Retry Drive Search</button>
                    </div>
                )}

                {!loading && activeJob.data.map((item, index) => (
                  <div key={index} className="bg-white shadow-sm rounded-3xl border-l-[12px] overflow-hidden transition-all duration-300" style={{ borderColor: item.fmWidth && item.fmHeight ? '#22c55e' : '#f59e0b' }}>
                    
                    <div className="p-5 flex justify-between items-center cursor-pointer active:bg-slate-50" onClick={() => {setActiveItemIndex(activeItemIndex === index ? null : index); setActiveField('fmWidth');}}>
                      <div className="flex gap-4 items-center">
                          <div className="bg-slate-100 w-12 h-12 rounded-xl flex items-center justify-center border border-slate-200 relative">
                              <span className="font-black text-slate-400 text-lg">{item.line}</span>
                              {item.photo && <div className="absolute -top-1 -right-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>}
                          </div>
                          <div>
                            <h4 className="font-black text-slate-800 text-lg uppercase tracking-tighter leading-none">{item.location}</h4>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">QTY: {item.qty || 1} {item.photo && '• 📸 Photo Attached'}</p>
                          </div>
                      </div>
                      <div className={`w-4 h-4 rounded-full border-2 ${item.fmWidth && item.fmHeight ? 'bg-green-500 border-green-600' : 'bg-transparent border-amber-400'}`}></div>
                    </div>

                    <div className={`transition-all duration-300 overflow-hidden ${activeItemIndex === index ? 'max-h-[800px] opacity-100' : 'max-h-0 opacity-0'}`}>
                       <div className="p-5 bg-slate-50 border-t border-slate-200 shadow-inner">
                          
                          <div className="flex justify-between mb-4 gap-2">
                              {index > 0 ? (
                                  <button onClick={copyPrevious} className="flex-1 bg-white border border-slate-200 text-slate-500 rounded-lg py-2 text-[9px] font-black uppercase shadow-sm active:bg-slate-100">
                                      ⎘ Copy Line {activeJob.data[index-1].line}
                                  </button>
                              ) : <div className="flex-1"></div>}
                              
                              <label className="flex-1 bg-white border border-slate-200 text-blue-600 rounded-lg py-2 text-[9px] font-black uppercase shadow-sm active:bg-blue-50 cursor-pointer flex items-center justify-center gap-1">
                                  📸 {item.photo ? 'Retake Photo' : 'Attach Photo'}
                                  <input type="file" accept="image/*" capture="environment" onChange={(e) => handlePhotoUpload(e, index)} className="hidden" />
                              </label>
                          </div>

                          <div className="flex gap-3 mb-5">
                            <div className={`flex-1 p-4 rounded-2xl border-4 transition-all ${activeField === 'fmWidth' ? 'border-[#1a3a5c] bg-white shadow-lg scale-[1.02]' : 'border-slate-200/50 bg-slate-100 opacity-60'}`} onClick={() => setActiveField('fmWidth')}>
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center mb-1">Width</p>
                                <div className="text-3xl font-black text-slate-800 text-center h-10 flex items-center justify-center">{item.fmWidth || '-'}</div>
                            </div>
                            <div className={`flex-1 p-4 rounded-2xl border-4 transition-all ${activeField === 'fmHeight' ? 'border-[#1a3a5c] bg-white shadow-lg scale-[1.02]' : 'border-slate-200/50 bg-slate-100 opacity-60'}`} onClick={() => setActiveField('fmHeight')}>
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center mb-1">Height</p>
                                <div className="text-3xl font-black text-slate-800 text-center h-10 flex items-center justify-center">{item.fmHeight || '-'}</div>
                            </div>
                          </div>
                          
                          <div className="bg-slate-300 p-3 rounded-[2.5rem] shadow-inner mb-4">
                            <div className="grid grid-cols-7 gap-1.5 mb-3">
                                {['1/8','1/4','3/8','1/2','5/8','3/4','7/8'].map(f => <button key={f} onClick={() => handleKeyPress(' '+f)} className="frac-btn text-sm">{f}</button>)}
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleKeyPress(n.toString())} className="num-btn">{n}</button>)}
                                <button onClick={() => handleKeyPress('CLR')} className="num-btn text-red-500 text-sm">CLR</button>
                                <button onClick={() => handleKeyPress('0')} className="num-btn">0</button>
                                <button onClick={() => handleKeyPress('DEL')} className="num-btn text-orange-500 text-lg">⌫</button>
                            </div>
                          </div>

                          <button onClick={() => {
                              if(activeItemIndex < activeJob.data.length - 1) { setActiveItemIndex(activeItemIndex + 1); setActiveField('fmWidth'); }
                              else { setActiveItemIndex(null); }
                          }} className="w-full p-5 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2" style={{ backgroundColor: theme.navy }}>
                              {activeItemIndex < activeJob.data.length - 1 ? 'Save & Next Window ➔' : 'Close Line Item'}
                          </button>
                       </div>
                    </div>
                  </div>
                ))}

                {!loading && activeJob.data.length > 0 && (
                    <div className="mt-8 p-6 bg-white rounded-[2rem] shadow-md border-2 border-slate-100 text-center">
                        <h3 className="font-black text-slate-800 uppercase tracking-widest mb-4">Job Completion</h3>
                        
                        {activeJob.signature ? (
                            <div className="space-y-4">
                                <div className="p-4 bg-green-50 rounded-2xl border-2 border-green-200 flex flex-col items-center">
                                    <span className="text-green-600 font-black text-xs uppercase mb-2">Customer Signature Captured</span>
                                    <img src={activeJob.signature} alt="Signature" className="h-16 object-contain" />
                                </div>
                                <button onClick={() => pushToOfficeDrive(activeJob)} className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 flex justify-center items-center gap-2">
                                    {loading ? '⏳ Syncing...' : '☁️ Sync Final Data to Office Drive'}
                                </button>
                            </div>
                        ) : (
                            <button onClick={() => setSigningJobId(activeJob.id)} className="w-full py-5 bg-[#f59e0b] text-white rounded-2xl font-black text-sm uppercase shadow-lg active:scale-95 flex justify-center items-center gap-2">
                                <span className="text-xl">✍️</span> Capture Customer Signature
                            </button>
                        )}
                    </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
            console.log('Service Worker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
