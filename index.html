<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire — Customer Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --emerald:#064e3b; --emerald-mid:#065f46; --emerald-light:#ecfdf5;
      --amber:#f59e0b; --amber-dark:#d97706; --amber-light:#fef3c7;
      --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
      --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-logo{display:flex;flex-direction:column}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;letter-spacing:-0.03em;color:white;text-transform:uppercase;line-height:1}
    .hdr-sub{font-size:0.48rem;font-weight:800;letter-spacing:0.35em;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-top:3px}
    .hdr-right{display:flex;align-items:center;gap:7px}
    .acct-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:8px;padding:5px 9px}
    .acct-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
    .acct-dot.off{background:var(--s400)}
    .acct-txt{font-size:0.58rem;font-weight:700;color:rgba(255,255,255,0.75);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:10px 4px;font-size:0.68rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}
    .main{padding:14px 12px 100px}
    .lbl{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--s500);display:block;margin-bottom:4px}
    .sc{background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(26,58,92,0.08);margin-bottom:14px}
    .sc-head{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:20px 18px 16px; color:white; font-weight:900; text-transform:uppercase;}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:13px}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:9px;padding:10px 12px;font-size:0.85rem;font-family:inherit;background:var(--s50);outline:none;}
    .btn-p{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:14px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;}
    .g-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:1.5px solid var(--s200);border-radius:12px;padding:13px 16px;font-size:0.85rem;font-weight:700;color:var(--s700);cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .g-btn.conn{background:#dcfce7;border-color:#86efac;color:#166534}
    .btn-disc{width:100%;padding:12px;border:1.5px solid #fca5a5;border-radius:12px;background:var(--redl);color:var(--red);font-size:0.75rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer}
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-title{font-size:0.72rem;font-weight:800;color:var(--navy)}
    .sync-sub{font-size:0.61rem;color:var(--s500);margin-top:1px}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 13px;font-size:0.65rem;font-weight:800;text-transform:uppercase;cursor:pointer}
    .dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px; scrollbar-width: none;}
    .dstrip::-webkit-scrollbar { display: none; }
    .dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;min-width:55px}
    .dchip.on{background:var(--navy);border-color:var(--navy);box-shadow:0 4px 12px rgba(26,58,92,0.25)}
    .dchip.ev{border-color:var(--amber)}
    .dc-d{font-size:0.57rem;font-weight:800;text-transform:uppercase;color:var(--s400)}
    .dchip.on .dc-d, .dchip.on .dc-n {color:white}
    .dc-n{font-size:1.1rem;font-weight:900;color:var(--s700)}
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .cc-head{display:flex;align-items:stretch}
    .cc-bar{width:8px;flex-shrink:0}
    .cc-bar.win{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-mid) 100%)}
    .cc-bar.door{background:linear-gradient(180deg,var(--emerald) 0%,var(--emerald-mid) 100%)}
    .cc-bar.both{background:linear-gradient(180deg,var(--navy) 0%,var(--emerald) 100%)}
    .cc-body{flex:1;padding:12px 12px 12px 10px}
    .cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
    .cc-name{font-size:1.15rem;font-weight:900;color:var(--s800);text-transform:uppercase;line-height:1.15;flex:1;}
    .cc-time{font-size:0.64rem;font-weight:800;color:white;background:var(--navy);border-radius:6px;padding:3px 7px;white-space:nowrap;}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:12px 4px;border:none;background:transparent;font-size:0.68rem;font-weight:800;text-transform:uppercase;color:var(--s500);cursor:pointer;text-align:center;}
    .ca:not(:last-child){border-right:1px solid var(--border)}
    .ca.p{color:var(--navy)}
    .cc-det{padding:12px;border-top:1px solid var(--border);background:var(--s50);display:flex;flex-direction:column;gap:10px}
    .dnotes{background:white;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:0.82rem;color:var(--s700);line-height:1.7;}
    .note-line { display: block; padding-bottom: 6px; border-bottom: 1px dashed var(--s200); margin-bottom: 6px; }
    .note-line:last-child { border-bottom: none; }
    .note-label { font-weight: 800; color: var(--navy); text-transform: uppercase; font-size: 0.65rem; display: block; margin-bottom: 1px; }
    .tel-link { color: #2563eb; text-decoration: underline; font-weight: 700; }
    .gi{background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%);border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px}
    .gi-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
    .gi-badge{background:linear-gradient(135deg,#4285f4,#34a853);color:white;font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:99px;letter-spacing:0.05em}
    .gi-txt{font-size:0.75rem;color:var(--s700);line-height:1.5}
    .gi-tap{background:none;border:none;color:var(--navy);font-size:0.72rem;font-weight:700;cursor:pointer;padding:0;letter-spacing:0.04em}
    .lrow{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px 20px}
    .empty-state{text-align:center;padding:40px 20px;color:var(--s500);font-weight:700;font-size:0.85rem;background:white;border-radius:16px;border:2px dashed var(--s200);}
    .spin{width:18px;height:18px;border:2.5px solid var(--s200);border-top-color:var(--navy);border-radius:50%;animation:sp 0.7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
var STORAGE_KEY = 'vhub_v2';
var GCAL_SCOPE  = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email';

var prefs        = loadPrefs();
var view         = prefs.accessToken ? 'sched' : 'setup'; 
var calEvents    = prefs.calEvents || []; 
var loading      = false;
var lastSync     = prefs.lastSync   || null;
var selDate      = todayStr();
var expandId     = null;
var accessToken  = prefs.accessToken || null;
var userEmail    = prefs.userEmail   || null;
var geminiKey    = prefs.geminiKey   || '';
var clientId     = prefs.clientId   || '';
var searchTerm   = prefs.searchTerm  || 'Measure';
var insights     = {}; 

function loadPrefs(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}}
function save(){
  prefs.accessToken=accessToken; prefs.userEmail=userEmail;
  prefs.geminiKey=geminiKey; prefs.clientId=clientId; prefs.searchTerm=searchTerm;
  prefs.lastSync=lastSync; prefs.calEvents=calEvents; 
  localStorage.setItem(STORAGE_KEY,JSON.stringify(prefs));
}

function todayStr(){
  let d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadGIS(cb){
  if(window.google&&window.google.accounts){cb();return;}
  var s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=cb;
  document.head.appendChild(s);
}

function signIn(){
  if(!clientId){alert('Enter Client ID first.'); return;}
  loadGIS(function(){
    var client=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:GCAL_SCOPE,
      callback:function(resp){
        if(resp.error)return;
        accessToken=resp.access_token;
        fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{'Authorization':'Bearer '+accessToken}})
          .then(r=>r.json()).then(info=>{userEmail=info.email||'Connected User'; save(); syncCalendar();})
          .catch(()=>{userEmail='Connected User'; save(); syncCalendar();});
      }
    });
    client.requestAccessToken({prompt:'select_account'});
  });
}

function signOut(){
  accessToken=null; userEmail=null; calEvents=[];
  prefs.accessToken=null; prefs.userEmail=null; prefs.calEvents=[]; 
  save(); view='setup'; render();
}

function syncCalendar(){
  if(!accessToken) return;
  loading=true; render();
  var past = new Date(); past.setDate(past.getDate()-7);
  var future = new Date(); future.setDate(future.getDate()+30);
  var term = encodeURIComponent(searchTerm || 'Measure');
  var url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+past.toISOString()+'&timeMax='+future.toISOString()+'&singleEvents=true&orderBy=startTime&q='+term;
  fetch(url,{headers:{'Authorization':'Bearer '+accessToken}})
    .then(r=>r.json()).then(data=>{
      calEvents=(data.items||[]).map(parseEv);
      lastSync=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      save(); loading=false; render();
    });
}

function geminiInsight(ev){
  if(!geminiKey)return;
  if(insights[ev.id]){render();return;}
  insights[ev.id]='...';render();
  var rawText = (ev.notesHtml || '').replace(/<[^>]+>/g,' ');
  var prompt='You are a field measure prep assistant for Visionaire Windows. Write a single practical 1-2 sentence prep note for the measurer heading to this appointment. Be specific. Notes: '+rawText;
  
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+geminiKey,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.4,maxOutputTokens:120}})
  }).then(function(r){return r.json();})
  .then(function(d){
    var t='';try{t=d.candidates[0].content.parts[0].text.trim();}catch(e){}
    insights[ev.id]=t||'No insight available.';render();
  }).catch(function(){insights[ev.id]='Could not load insight.';render();});
}

function cleanNotes(html) {
  if (!html) return "";
  let text = html.replace(/<[^>]+>/g, ' ').replace(/ /g, ' ').replace(/&/g, '&').trim();
  const labels = ["Category:", "Contact:", "Product:", "Edit event at:"];
  labels.forEach(label => { text = text.replace(new RegExp(`(${label})`, 'gi'), `|||$1`); });
  
  return text.split('|||').filter(l => l.trim().length > 3).map(line => {
    let part = line.trim();
    let label = labels.find(lab => part.toLowerCase().startsWith(lab.toLowerCase()));
    
    if (label) {
      let content = part.substring(label.length).trim();
      if (label.toLowerCase() === 'contact:') {
          let phones = content.match(/(\(?\d{3}\)?[\s-]?\d{3}[\s-]?\d{4})/g);
          content = phones ? phones.map(p => `<a href="tel:${p}" class="tel-link">${p}</a>`).join(' | ') : "No phone listed";
          label = "CONTACT PHONE:";
      } else if (label.toLowerCase() === 'edit event at:') {
          return `<span class="note-line"><span class="note-label">CRM LINK:</span><a href="${content}" target="_blank" style="color:#2563eb; font-weight:700; text-decoration:underline;">Open in MarketSharp</a></span>`;
      }
      return `<span class="note-line"><span class="note-label">${label}</span>${content}</span>`;
    }
    return `<span class="note-line">${part}</span>`;
  }).join('');
}

function parseEv(ev){
  var start=(ev.start&&(ev.start.dateTime||ev.start.date))||'';
  let rawName = ev.summary.replace(/final\s*measure/ig, '').replace(/\bmeasure\b/ig, '').replace(/\bfm\b/ig, '').trim();
  rawName = rawName.replace(/^[^a-zA-Z0-9]+/, '').trim();
  return {
    id: ev.id, customer: rawName || 'Unnamed',
    address: ev.location || '', startDate: start.slice(0,10),
    startTime: start.indexOf('T')>=0?new Date(start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Scheduled',
    notesHtml: ev.description || '',
    hasWin: /window/i.test(ev.summary + ev.description), hasDoor: /door/i.test(ev.summary + ev.description)
  };
}

function render(){
  var root=document.getElementById('root'); root.innerHTML='';
  var wrap=el('div',{C:'app'}); wrap.appendChild(rHeader());
  var main=el('div',{C:'main'});
  if(view==='setup') rSetup(main); else rSched(main);
  wrap.appendChild(main); root.appendChild(wrap);
}

function rHeader(){
  var h=el('div',{C:'hdr'});
  var top=el('div',{C:'hdr-top'});
  var logo=el('div',{C:'hdr-logo'});
  logo.appendChild(el('span',{C:'hdr-title',t:'Visionaire Hub'}));
  top.appendChild(logo);
  var badge=el('div',{C:'acct-badge'});
  badge.appendChild(el('span',{C:'acct-dot'+(accessToken?'':' off')}));
  badge.appendChild(el('span',{C:'acct-txt',t:userEmail||(accessToken?'Connected':'Not signed in')}));
  top.appendChild(badge); h.appendChild(top);
  var tabs=el('div',{C:'vtabs'});
  [['sched','Schedule'],['manual','Manual FM'],['setup','Setup']].forEach(t => {
    tabs.appendChild(el('button',{
      C:'vtab'+(view===t[0]?' on':''), t:t[1],
      click:()=>{
        if(t[0]==='manual'){
          var n=prompt("Enter Customer Name:");
          if(n){
            var j=JSON.parse(localStorage.getItem('visionaireJobs'))||[];
            var id=Date.now(); j.unshift({id:id, customer:n, time:'Manual', data:[]});
            localStorage.setItem('visionaireJobs',JSON.stringify(j));
            localStorage.setItem('activeJobId', JSON.stringify(id));
            window.location.href='measure.html';
          }
        } else { view=t[0]; render(); }
      }
    }));
  });
  h.appendChild(tabs); return h;
}

function rSetup(main){
  var body=el('div',{C:'sc-body'});
  body.appendChild(el('span',{C:'lbl',t:'Google Client ID'}));
  var ci=el('input',{C:'inp',value:clientId}); ci.addEventListener('input',e=>{clientId=e.target.value;save();});
  body.appendChild(ci);
  if(accessToken&&userEmail){ body.appendChild(el('button',{C:'g-btn conn',t:'✓ Signed In (' + (userEmail || 'Account') + ')', click: signOut})); }
  else { body.appendChild(el('button',{C:'g-btn',t:'Sign in with Google', click: signIn})); }
  body.appendChild(el('span',{C:'lbl',t:'Gemini Key'}));
  var gk=el('input',{C:'inp',type:'password',value:geminiKey}); gk.addEventListener('input',e=>{geminiKey=e.target.value;save();});
  body.appendChild(gk);
  body.appendChild(el('span',{C:'lbl',t:'Calendar Search Term'}));
  var st=el('input',{C:'inp',value:searchTerm}); st.addEventListener('input',e=>{searchTerm=e.target.value;save();});
  body.appendChild(st);
  body.appendChild(el('button',{C:'btn-p',t:'Save Config & Sync',click:()=>{save();syncCalendar();}}));
  if(accessToken){ body.appendChild(el('button',{C:'btn-disc',t:'Force Sign Out / Disconnect',click:signOut})); }
  var sc=el('div',{C:'sc'}); sc.appendChild(el('div',{C:'sc-head',t:'System Config'})); sc.appendChild(body);
  main.appendChild(sc);
}

function rSched(main){
  if(!accessToken){main.appendChild(el('div',{t:'Go to Setup to sign in.'})); return;}
  var sb=el('div',{C:'sync-bar'});
  var si=el('div'); si.appendChild(el('div',{C:'sync-title',t:userEmail||'Calendar Sync'})); si.appendChild(el('div',{C:'sync-sub',t:'Last: '+lastSync}));
  sb.appendChild(si); sb.appendChild(el('button',{C:'sync-btn',t:loading?'...':'Sync',click:syncCalendar}));
  main.appendChild(sb);
  if(loading){main.appendChild(el('div',{C:'lrow',t:'Pulling Calendar...'})); return;}
  rDateStrip(main);
  var dayEvs = calEvents.filter(e=>e.startDate===selDate);
  if(dayEvs.length === 0) {
     let niceDate = new Date(selDate+'T12:00:00').toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
     main.appendChild(el('div', {C: 'empty-state', t: 'No measurements scheduled for ' + niceDate + '.'}));
  } else { dayEvs.forEach(ev=>main.appendChild(rCard(ev))); }
}

function rDateStrip(main){
  var strip=el('div',{C:'dstrip'});
  for(let i=-1; i<=14; i++){
    let d=new Date(); d.setDate(d.getDate()+i); 
    let iso=d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    let chip=el('div',{C:'dchip'+(iso===selDate?' on':'')+(calEvents.some(e=>e.startDate===iso)?' ev':''), click:()=>{selDate=iso; render();} });
    chip.appendChild(el('div',{C:'dc-d',t:d.toLocaleDateString([],{weekday:'short'})}));
    chip.appendChild(el('div',{C:'dc-n',t:d.getDate()}));
    strip.appendChild(chip);
  }
  main.appendChild(strip);
}

function rCard(ev){
  var isExp=expandId===ev.id;
  var card=el('div',{C:'cc'});
  var head=el('div',{C:'cc-head'});
  head.appendChild(el('div',{C:'cc-bar '+(ev.hasWin&&ev.hasDoor?'both':ev.hasDoor?'door':'win')}));
  var body=el('div',{C:'cc-body'});
  var top=el('div',{C:'cc-top'}); 
  top.appendChild(el('div',{C:'cc-name',t:ev.customer}));
  top.appendChild(el('span',{C:'cc-time',t:ev.startTime})); 
  body.appendChild(top);
  head.appendChild(body); card.appendChild(head);
  if(isExp){
    var det=el('div',{C:'cc-det'});
    if(geminiKey){
      var gi=el('div',{C:'gi'});
      var gih=el('div',{C:'gi-head'});
      gih.appendChild(el('span',{C:'gi-badge',t:'✦ Gemini'}));
      gih.appendChild(el('span',{style:'font-size:0.68rem;font-weight:700;color:var(--s600)',t:'AI Prep Note'}));
      gi.appendChild(gih);
      var ins=insights[ev.id];
      if(!ins){var tap=el('button',{C:'gi-tap',t:'Tap to generate prep note...',click:function(e){return function(){geminiInsight(e);};}(ev)});gi.appendChild(tap);}
      else if(ins==='...'){var sr2=el('div',{C:'lrow',style:'padding:6px 0;justify-content:flex-start'});sr2.appendChild(el('div',{C:'spin'}));sr2.appendChild(el('span',{C:'ltxt',t:'Thinking...'}));gi.appendChild(sr2);}
      else{gi.appendChild(el('div',{C:'gi-txt',t:ins}));}
      det.appendChild(gi);
    }
    var n = el('div',{C:'dnotes'}); 
    let notesHtml = "";
    if(ev.address) {
        notesHtml += '<span class="note-line"><span class="note-label">ADDRESS:</span><a href="https://maps.google.com/?q=' + encodeURIComponent(ev.address) + '" target="_blank" style="color:#2563eb; text-decoration:underline; font-weight:700;">' + ev.address + '</a></span>';
    }
    notesHtml += cleanNotes(ev.notesHtml);
    n.innerHTML = notesHtml || "No job notes.";
    det.appendChild(n); card.appendChild(det);
  }
  var acts=el('div',{C:'cc-acts'});
  acts.appendChild(el('button',{C:'ca p',t:'FM Sheet',click:()=>{
    localStorage.setItem('activeJobId', JSON.stringify(ev.id));
    var jobs = JSON.parse(localStorage.getItem('visionaireJobs'))||[];
    if(!jobs.find(j=>j.id===ev.id)) jobs.unshift({id:ev.id, customer:ev.customer, time:ev.startTime, data:[]});
    localStorage.setItem('visionaireJobs', JSON.stringify(jobs));
    window.location.href='measure.html';
  }}));
  acts.appendChild(el('button',{C:'ca',t:isExp?'Less':'More',click:()=>{expandId=isExp?null:ev.id;render();}}));
  card.appendChild(acts); return card;
}
function el(tag,props){
  var e=document.createElement(tag);
