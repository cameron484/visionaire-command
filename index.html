<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Field Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body class="bg-[#f8fafc]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VisionaireApp() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
      const [jobs, setJobs] = useState(() => JSON.parse(localStorage.getItem('visionaireJobs')) || []);
      const [showSettings, setShowSettings] = useState(false);
      const [isLinked, setIsLinked] = useState(!!localStorage.getItem('googleAccessToken'));

      useEffect(() => { localStorage.setItem('visionaireJobs', JSON.stringify(jobs)); }, [jobs]);

      const connectGoogle = () => {
        if (!clientId) return alert("Please enter your Client ID in Settings.");
        
        // This logic ensures the login works on your specific GitHub Pages link
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
          callback: (tokenResponse) => {
            if (tokenResponse.access_token) {
              localStorage.setItem('googleAccessToken', tokenResponse.access_token);
              setIsLinked(true);
              setShowSettings(false);
              alert("Linked to Visionaire Workspace!");
            }
          },
        });
        // 'prompt: consent' is the magic key for Workspace accounts
        client.requestAccessToken({ prompt: 'consent' });
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-white shadow-2xl">
          <header className="p-4 flex justify-between items-center bg-[#1a3a5c] border-b-2 border-[#f59e0b]">
            <div className="flex flex-col">
              <span className="text-[#f59e0b] font-black italic text-xl">VISIONAIRE</span>
              <span className="text-white font-bold text-[8px] tracking-[0.3em] ml-1 uppercase">Field Command</span>
            </div>
            <button onClick={() => setShowSettings(!showSettings)} className="text-2xl p-2 bg-white/10 rounded-full">⚙️</button>
          </header>

          <div className="p-4">
            {showSettings && (
              <div className="p-6 bg-slate-50 border-2 border-[#f59e0b] rounded-3xl mb-6">
                <label className="text-[10px] font-black text-slate-400 block mb-1">GEMINI AI KEY</label>
                <input type="password" value={apiKey} onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('geminiApiKey', e.target.value)}} 
                       className="w-full p-3 bg-white border rounded mb-4 text-xs font-mono" />

                <label className="text-[10px] font-black text-slate-400 block mb-1">GOOGLE CLIENT ID</label>
                <input type="text" value={clientId} onChange={(e) => {setClientId(e.target.value); localStorage.setItem('googleClientId', e.target.value)}} 
                       className="w-full p-3 bg-white border rounded mb-6 text-xs font-mono" />
                
                <button onClick={connectGoogle} className="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-lg">Link Account</button>
              </div>
            )}

            {!showSettings && (
              <div className="p-10 text-center">
                <div className={`w-4 h-4 rounded-full mx-auto mb-4 ${isLinked ? 'bg-green-500 shadow-[0_0_15px_#22c55e]' : 'bg-red-500'}`}></div>
                <h2 className="text-slate-700 font-black uppercase text-sm tracking-widest">
                    {isLinked ? 'System Online' : 'Connect Account'}
                </h2>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VisionaireApp />);
  </script>
</body>
</html>
