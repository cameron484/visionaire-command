<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --emerald:#064e3b; --amber:#f59e0b; --s100:#f1f5f9; --s400:#94a3b8; --s500:#64748b; --s800:#1e293b; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;color:white;text-transform:uppercase;}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:12px 4px;font-size:0.7rem;font-weight:800;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;border-bottom:3px solid transparent;}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}
    .main{padding:14px 12px 100px}
    .sc{background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:14px}
    .sc-head{background:var(--navy);padding:15px;color:white;font-weight:900;text-transform:uppercase;font-size:0.8rem;}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:12px;font-size:0.9rem;background:var(--s100);outline:none;}
    .btn-p{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:15px;font-weight:800;text-transform:uppercase;cursor:pointer;}
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:8px 15px;font-size:0.7rem;font-weight:800;text-transform:uppercase;}
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;}
    .cc-head{display:flex;align-items:center;padding:15px;}
    .cc-bar{width:6px;height:40px;border-radius:10px;margin-right:12px;}
    .cc-name{font-size:1rem;font-weight:900;color:var(--s800);text-transform:uppercase;flex:1}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:14px;border:none;background:transparent;font-size:0.7rem;font-weight:800;text-transform:uppercase;color:var(--s500);text-align:center;}
    .ca.p{color:var(--navy);background:var(--navy-light)}
  </style>
</head>
<body>
<div id="root"></div>

<script>
// Emergency Mobile Error Logger
window.onerror = function(m, u, l) { alert("Hub Error: " + m + " on line " + l); };

var STORAGE_KEY = 'vhub_v2';
var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
var accessToken = prefs.accessToken || null;
var view = accessToken ? 'sched' : 'setup';
var calEvents = prefs.calEvents || [];
var loading = false;

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs));
}

function loadGIS(cb){
  if(window.google && window.google.accounts){ cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = cb;
  document.head.appendChild(s);
}

function signIn(){
  if(!prefs.clientId){ alert('Enter Client ID in Setup'); return; }
  loadGIS(function(){
    var client = google.accounts.oauth2.initTokenClient({
      client_id: prefs.clientId,
      scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email',
      callback: function(resp){
        accessToken = resp.access_token;
        prefs.accessToken = accessToken;
        save();
        location.reload();
      }
    });
    client.requestAccessToken({prompt:'select_account'});
  });
}

async function processSingleJob(ev) {
  var token = accessToken;
  // Safer name cleaning for Opera
  var cleanName = ev.customer.split(':').pop().trim().replace(/[^a-zA-Z\s]/g, ' ');
  var searchTarget = cleanName.split(' ')[0];
  
  var q = "fullText contains '" + searchTarget + "' and name contains '2026' and mimeType='application/pdf' and trashed = false";
  var url = "https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent(q) + "&orderBy=createdTime desc&pageSize=1&includeItemsFromAllDrives=true&supportsAllDrives=true";
  
  try {
    var res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    var data = await res.json();
    if(data.files && data.files[0]) {
      // PDF Processing logic...
      alert("Found contract for " + ev.customer);
    }
  } catch(e) { console.log(e); }
}

function render(){
  var root = document.getElementById('root');
  root.innerHTML = '';
  var app = document.createElement('div');
  app.className = 'app';
  
  // Header
  var hdr = document.createElement('div');
  hdr.className = 'hdr';
  hdr.innerHTML = '<div class="hdr-top"><span class="hdr-title">Visionaire Hub</span></div>';
  
  var tabs = document.createElement('div');
  tabs.className = 'vtabs';
  var t1 = document.createElement('button'); t1.className = 'vtab ' + (view === 'sched' ? 'on' : ''); t1.innerText = 'Schedule';
  t1.onclick = function(){ view='sched'; render(); };
  var t2 = document.createElement('button'); t2.className = 'vtab ' + (view === 'setup' ? 'on' : ''); t2.innerText = 'Setup';
  t2.onclick = function(){ view='setup'; render(); };
  
  tabs.appendChild(t1); tabs.appendChild(t2);
  hdr.appendChild(tabs);
  app.appendChild(hdr);

  var main = document.createElement('div');
  main.className = 'main';

  if(view === 'setup') {
    var sc = document.createElement('div'); sc.className = 'sc';
    sc.innerHTML = '<div class="sc-head">Configuration</div>';
    var body = document.createElement('div'); body.className = 'sc-body';
    
    var i1 = document.createElement('input'); i1.className = 'inp'; i1.placeholder = 'Google Client ID'; i1.value = prefs.clientId || '';
    i1.oninput = function(e){ prefs.clientId = e.target.value; save(); };
    
    var i2 = document.createElement('input'); i2.className = 'inp'; i2.placeholder = 'Gemini API Key'; i2.value = prefs.geminiKey || '';
    i2.oninput = function(e){ prefs.geminiKey = e.target.value; save(); };

    var b1 = document.createElement('button'); b1.className = 'btn-p'; b1.innerText = accessToken ? '✓ Connected' : 'Connect Google';
    b1.onclick = signIn;

    body.appendChild(i1); body.appendChild(i2); body.appendChild(b1);
    sc.appendChild(body); main.appendChild(sc);
  } else {
    // Schedule View
    var bar = document.createElement('div'); bar.className = 'sync-bar';
    bar.innerHTML = '<div><div style="font-size:0.7rem; font-weight:800;">' + (accessToken ? 'System Ready' : 'Login Required') + '</div></div>';
    var sBtn = document.createElement('button'); sBtn.className = 'sync-btn'; sBtn.innerText = 'Sync';
    sBtn.onclick = function(){ alert('Syncing...'); };
    bar.appendChild(sBtn); main.appendChild(bar);

    calEvents.forEach(function(ev){
      var card = document.createElement('div'); card.className = 'cc';
      card.innerHTML = '<div class="cc-head"><div class="cc-bar" style="background:var(--navy)"></div><div class="cc-name">' + ev.customer + '</div></div>';
      var acts = document.createElement('div'); acts.className = 'cc-acts';
      var a1 = document.createElement('button'); a1.className = 'ca p'; a1.innerText = 'Open Measure';
      a1.onclick = function(){ 
        localStorage.setItem('activeJobId', JSON.stringify(ev.id)); 
        window.location.href = 'measure.html'; 
      };
      acts.appendChild(a1); card.appendChild(acts); main.appendChild(card);
    });
  }

  app.appendChild(main);
  root.appendChild(app);
}

window.onload = render;
</script>
</body>
</html>
