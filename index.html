<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visionaire — Customer Hub</title>
  <style>
    :root {
      --navy:#1a3a5c; --navy-dark:#0f2236; --navy-mid:#2d5a8e; --navy-light:#e8f0f8;
      --emerald:#064e3b; --emerald-mid:#065f46; --emerald-light:#ecfdf5;
      --amber:#f59e0b; --amber-dark:#d97706; --amber-light:#fef3c7;
      --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
      --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a; --border:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--s100);overscroll-behavior-y:contain}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px rgba(26,58,92,0.12)}
    .hdr{background:var(--navy);padding:14px 16px 0;border-bottom:4px solid var(--amber);position:sticky;top:0;z-index:200}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr-title{font-size:1.25rem;font-weight:900;font-style:italic;letter-spacing:-0.03em;color:white;text-transform:uppercase;line-height:1}
    .vtabs{display:flex;border-top:1px solid rgba(255,255,255,0.08)}
    .vtab{flex:1;padding:10px 4px;font-size:0.68rem;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,0.4);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;}
    .vtab.on{color:var(--amber);border-bottom-color:var(--amber)}
    .main{padding:14px 12px 100px}
    .lbl{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--s500);display:block;margin-bottom:4px}
    .sc{background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:0 4px 20px rgba(26,58,92,0.08)}
    .sc-head{background:var(--navy);padding:20px 18px 16px; color:white; font-weight:900; text-transform:uppercase;}
    .sc-body{padding:16px;display:flex;flex-direction:column;gap:13px}
    .inp{width:100%;border:1.5px solid var(--s200);border-radius:9px;padding:10px 12px;font-size:0.85rem;background:var(--s50);outline:none;}
    .btn-p{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:14px;font-size:0.82rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;}
    .sync-bar{background:var(--navy-light);border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sync-title{font-size:0.72rem;font-weight:800;color:var(--navy)}
    .sync-sub{font-size:0.55rem;color:var(--s500);font-weight:700}
    .sync-btn{background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 13px;font-size:0.65rem;font-weight:800;text-transform:uppercase;cursor:pointer}
    .dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px; scrollbar-width: none;}
    .dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;min-width:55px}
    .dchip.on{background:var(--navy);border-color:var(--navy);box-shadow:0 4px 12px rgba(26,58,92,0.25)}
    .dc-d{font-size:0.57rem;font-weight:800;text-transform:uppercase;color:var(--s400)}
    .dchip.on .dc-d, .dchip.on .dc-n {color:white}
    .dc-n{font-size:1.1rem;font-weight:900;color:var(--s700)}
    .cc{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .cc-head{display:flex;align-items:stretch}
    .cc-bar{width:8px;flex-shrink:0}
    .cc-body{flex:1;padding:12px 12px 12px 10px}
    .cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
    .cc-name{font-size:1.15rem;font-weight:900;color:var(--s800);text-transform:uppercase;line-height:1.15;flex:1;}
    .cc-time{font-size:0.64rem;font-weight:800;color:white;background:var(--navy);border-radius:6px;padding:3px 7px;}
    .cc-acts{display:flex;border-top:1px solid var(--border)}
    .ca{flex:1;padding:12px 4px;border:none;background:transparent;font-size:0.68rem;font-weight:800;text-transform:uppercase;color:var(--s500);cursor:pointer;text-align:center;}
    .ca.p{color:var(--navy)}
    .cc-det{padding:12px;border-top:1px solid var(--border);background:var(--s50);display:flex;flex-direction:column;gap:10px}
    .dnotes{background:white;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:0.82rem;color:var(--s700);line-height:1.7;}
    .note-line { display: block; padding-bottom: 6px; border-bottom: 1px dashed var(--s200); margin-bottom: 6px; }
    .note-label { font-weight: 800; color: var(--navy); text-transform: uppercase; font-size: 0.65rem; display: block; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
var STORAGE_KEY = 'vhub_v2';
var prefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
var accessToken = prefs.accessToken || null;
var view = accessToken ? 'sched' : 'setup';
var calEvents = prefs.calEvents || [];
var selDate = new Date().toISOString().slice(0,10);
var expandId = null;

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs)); }

function loadGIS(cb){
  if(window.google && window.google.accounts){ cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = cb;
  document.head.appendChild(s);
}

function signIn(){
  loadGIS(function(){
    var client = google.accounts.oauth2.initTokenClient({
      client_id: prefs.clientId,
      scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email',
      callback: function(resp){
        accessToken = resp.access_token;
        prefs.accessToken = accessToken;
        save(); location.reload();
      }
    });
    client.requestAccessToken({prompt:'select_account'});
  });
}

async function syncCalendar(){
  if(!accessToken) return;
  var term = encodeURIComponent(prefs.searchTerm || 'Measure');
  var url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&q='+term;
  const r = await fetch(url,{headers:{'Authorization':'Bearer '+accessToken}});
  const d = await r.json();
  calEvents = (d.items||[]).map(ev => {
    var start=(ev.start&&(ev.start.dateTime||ev.start.date))||'';
    return { 
      id: ev.id, customer: ev.summary.replace(/final\s*measure|measure|fm/ig, '').replace(/^[:\s]+/, '').trim(), 
      address: ev.location || '', startDate: start.slice(0,10), 
      startTime: start.indexOf('T')>=0?new Date(start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Scheduled', 
      notesHtml: ev.description || '', hasWin: /window/i.test(ev.summary + ev.description), hasDoor: /door/i.test(ev.summary + ev.description) 
    };
  });
  prefs.calEvents = calEvents;
  prefs.lastSync = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  save(); render();
}

function render(){
  var root = document.getElementById('root'); root.innerHTML = '';
  var app = document.createElement('div'); app.className = 'app';
  
  var hdr = document.createElement('div'); hdr.className = 'hdr';
  hdr.innerHTML = '<div class="hdr-top"><span class="hdr-title">Visionaire Hub</span></div>';
  var tabs = document.createElement('div'); tabs.className = 'vtabs';
  [['sched','Schedule'],['setup','Setup']].forEach(t => {
    var btn = document.createElement('button'); btn.className = 'vtab ' + (view===t[0]?'on':''); btn.innerText = t[1];
    btn.onclick = function(){ view=t[0]; render(); };
    tabs.appendChild(btn);
  });
  hdr.appendChild(tabs); app.appendChild(hdr);

  var main = document.createElement('div'); main.className = 'main';
  if(view === 'setup') {
    var sc = document.createElement('div'); sc.className = 'sc';
    sc.innerHTML = '<div class="sc-head">Configuration</div>';
    var body = document.createElement('div'); body.className = 'sc-body';
    
    // Client ID
    body.appendChild(el('span',{className:'lbl',innerText:'Google Client ID'}));
    var i1 = el('input',{className:'inp',value:prefs.clientId||''});
    i1.oninput = function(e){ prefs.clientId = e.target.value; save(); };
    body.appendChild(i1);

    // Gemini Key
    body.appendChild(el('span',{className:'lbl',innerText:'Gemini API Key'}));
    var i2 = el('input',{className:'inp',type:'password',value:prefs.geminiKey||''});
    i2.oninput = function(e){ prefs.geminiKey = e.target.value; save(); };
    body.appendChild(i2);

    // Manual FM Button
    body.appendChild(el('span',{className:'lbl',innerText:'Manual Entry'}));
    var bM = el('button',{className:'btn-p',style:'background:var(--s800); margin-bottom:10px',innerText:'Create Manual FM'});
    bM.onclick = function(){ 
      var n=prompt("Customer Name:"); 
      if(n){ 
        var id=Date.now(); 
        var jobs=JSON.parse(localStorage.getItem('visionaireJobs'))||[];
        jobs.unshift({id:id, customer:n, data:[]});
        localStorage.setItem('visionaireJobs',JSON.stringify(jobs));
        localStorage.setItem('activeJobId', JSON.stringify(id));
        window.location.href='measure.html';
      }
    };
    body.appendChild(bM);

    var b1 = el('button',{className:'btn-p',innerText: accessToken ? '✓ Connected' : 'Connect Google Account'});
    b1.onclick = signIn; body.appendChild(b1);
    
    sc.appendChild(body); main.appendChild(sc);
  } else {
    // Sync Bar
    var bar = el('div',{className:'sync-bar'});
    bar.innerHTML = '<div><div class="sync-title">System Ready</div><div class="sync-sub">Sync: '+(prefs.lastSync||'--')+'</div></div>';
    var sBtn = el('button',{className:'sync-btn',innerText:'Sync'});
    sBtn.onclick = syncCalendar; bar.appendChild(sBtn); main.appendChild(bar);

    // Date Strip
    var strip = el('div',{className:'dstrip'});
    for(let i=-2; i<=10; i++){
      let d = new Date(); d.setDate(d.getDate()+i); let iso = d.toISOString().slice(0,10);
      let chip = el('div',{className:'dchip ' + (iso===selDate?'on':'')});
      chip.innerHTML = '<div class="dc-d">'+d.toLocaleDateString([],{weekday:'short'})+'</div><div class="dc-n">'+d.getDate()+'</div>';
      chip.onclick = function(){ selDate=iso; render(); }; strip.appendChild(chip);
    }
    main.appendChild(strip);

    calEvents.filter(e => e.startDate === selDate).forEach(ev => {
      var isExp = expandId === ev.id;
      var card = el('div',{className:'cc'});
      var barClr = ev.hasWin && ev.hasDoor ? 'linear-gradient(var(--navy), var(--emerald))' : (ev.hasDoor ? 'var(--emerald)' : 'var(--navy)');
      card.innerHTML = `<div class="cc-head"><div class="cc-bar" style="background:${barClr}"></div><div class="cc-body"><div class="cc-top"><div class="cc-name">${ev.customer}</div><div class="cc-time">${ev.startTime}</div></div></div></div>`;
      if(isExp){
        var det = el('div',{className:'cc-det'});
        det.innerHTML = `<div class="dnotes"><span class="note-line"><span class="note-label">ADDRESS:</span><a href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank" class="tel-link">${ev.address}</a></span>${ev.notesHtml}</div>`;
        card.appendChild(det);
      }
      var acts = el('div',{className:'cc-acts'});
      var a1 = el('button',{className:'ca p',innerText:'Open Measure'});
      a1.onclick = function(){ localStorage.setItem('activeJobId', JSON.stringify(ev.id)); window.location.href='measure.html'; };
      var a2 = el('button',{className:'ca',innerText: isExp ? 'Less' : 'More'});
      a2.onclick = function(){ expandId = isExp ? null : ev.id; render(); };
      acts.appendChild(a1); acts.appendChild(a2); card.appendChild(acts); main.appendChild(card);
    });
  }
  app.appendChild(main); root.appendChild(app);
}
function el(t,p){ var e=document.createElement(t); for(var k in p) e[k]=p[k]; return e; }
window.onload = render;
</script>
</body>
</html>
